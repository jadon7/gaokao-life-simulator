<!doctype html>
<html lang="zh-CN" data-flow="entry">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" id="themeColor" content="#ffffff" />
  <title>高考人生模拟器 · 十八张牌的人生</title>
  <style>
    @property --play-top {
      syntax: "<color>";
      inherits: true;
      initial-value: #5fecd4;
    }

    :root {
      --screen-h: calc(var(--vh, 1vh) * 100);
      --font-display: "MiSans VF", "MiSans", "PingFang SC", "HarmonyOS Sans SC", "Source Han Sans SC", "Noto Sans SC", system-ui, sans-serif;
      --font-ui: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      --font-num: "DIN Alternate", "Bahnschrift", "Arial Narrow", system-ui, sans-serif;
      --ink-strong: rgba(26, 35, 52, 0.96);
      --ink-soft: rgba(84, 96, 118, 0.76);
      --blue-hi: #3698ff;
      --blue-lo: #1677ff;
      --shell-w: 430px;
      font-family: var(--font-ui);
    }

    @supports (height: 100dvh) {
      :root {
        --screen-h: 100dvh;
      }
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      overflow-x: clip;
    }

    /* iOS Safari：把完整渐变铺到画布(html)上，状态栏区域接渐变顶色、底部工具栏/回弹区接渐变底色 */
    html {
      background: #ffffff;
    }

    html[data-flow="entry"] {
      background:
        radial-gradient(722px 915px at calc(50% + 165px) 60px, rgba(52, 125, 245, 0.14), rgba(52, 125, 245, 0) 24%),
        radial-gradient(1000px 1160px at calc(50% - 144px) 60px, rgba(81, 199, 174, 0.5), rgba(81, 199, 174, 0) 27%),
        #ffffff;
    }

    html[data-flow="setup"] {
      background: linear-gradient(180deg, #62cfec 0%, #ffffff 91.26%);
    }

    html[data-flow="play"] {
      background: linear-gradient(180deg, var(--play-top, #5fecd4) 0%, #ffffff 100%);
      transition: --play-top 1.6s ease;
    }

    html[data-flow="result"] {
      background: linear-gradient(191.79deg, #ffc465 18.99%, #5fc9d3 58.8%, #e9f9e6 99.67%);
    }

    body {
      min-height: var(--screen-h);
      color: var(--ink-strong);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      /* 禁用移动端双击放大，同时消除 300ms 点击延迟 */
      touch-action: manipulation;
    }

    button {
      font-family: inherit;
      border: 0;
      background: none;
      cursor: pointer;
      color: inherit;
      padding: 0;
    }

    input {
      font-family: inherit;
      outline: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    body[data-dev-tools="false"] .dev-only {
      display: none !important;
    }

    .legacy-hidden {
      display: none !important;
    }

    /* iOS 触感 hack：隐藏的 switch 控件，click() 触发系统触感 */
    .haptic-switch {
      position: fixed;
      left: -20px;
      top: -20px;
      width: 1px;
      height: 1px;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
    }

    /* ====== flow visibility ====== */
    .screen {
      display: none;
      width: 100%;
      max-width: var(--shell-w);
      margin: 0 auto;
      min-height: var(--screen-h);
      padding: 64px 24px calc(24px + env(safe-area-inset-bottom, 0px));
      position: relative;
      flex-direction: column;
      gap: 24px;
      overflow-x: clip;
      isolation: isolate;
    }

    body[data-flow="entry"] .entry-screen {
      display: flex;
    }

    body[data-flow="setup"] .setup-screen {
      display: flex;
    }

    body[data-flow="play"] .play-screen {
      display: flex;
    }

    .result-sheet {
      display: none;
    }

    body[data-flow="result"] .result-sheet {
      display: block;
    }

    body[data-flow="result"] .app {
      display: none;
    }

    /* page backgrounds follow the active flow */
    body[data-flow="entry"] {
      background:
        radial-gradient(722px 915px at calc(50% + 165px) 60px, rgba(52, 125, 245, 0.14), rgba(52, 125, 245, 0) 24%),
        radial-gradient(1000px 1160px at calc(50% - 144px) 60px, rgba(81, 199, 174, 0.5), rgba(81, 199, 174, 0) 27%),
        #ffffff;
    }

    body[data-flow="setup"] {
      background: linear-gradient(180deg, #62cfec 0%, #ffffff 91.26%) fixed;
    }

    body[data-flow="play"] {
      background: linear-gradient(180deg, var(--play-top, #5fecd4) 0%, #ffffff 100%) fixed;
      transition: --play-top 1.6s ease;
    }

    /* 顶部颜色的环境光呼吸动画 */
    .play-screen::before {
      content: "";
      position: absolute;
      inset: -10% -30% 40%;
      z-index: -1;
      background: radial-gradient(56% 44% at 32% 14%, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0) 70%);
      animation: play-glow 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes play-glow {
      from {
        transform: translate3d(-7%, 0, 0) scale(1);
        opacity: 0.55;
      }
      to {
        transform: translate3d(9%, 3%, 0) scale(1.12);
        opacity: 0.95;
      }
    }

    /* 除结果页外禁用页面上下滚动（小屏内容超高时退化为内部滚动） */
    body[data-flow="entry"],
    body[data-flow="setup"],
    body[data-flow="play"] {
      height: var(--screen-h);
      overflow: hidden;
      overscroll-behavior: none;
    }

    .entry-screen,
    .setup-screen {
      height: var(--screen-h);
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    body[data-flow="result"] {
      background: linear-gradient(191.79deg, #ffc465 18.99%, #5fc9d3 58.8%, #e9f9e6 99.67%) fixed;
    }

    /* ====== shared atoms ====== */
    .badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 13px;
      line-height: 13px;
      font-weight: 900;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .badge-dark {
      background: rgba(28, 37, 55, 0.94);
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(28, 37, 55, 0.1);
    }

    .badge-white {
      background: #ffffff;
      color: #6fd3ee;
      filter: drop-shadow(0 10px 10px rgba(28, 37, 55, 0.1));
    }

    .screen-head {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .display-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(31px, 9.3vw, 38px);
      font-weight: 500;
      line-height: 1.2;
      color: var(--ink-strong);
    }

    .display-title.on-blue {
      color: #ffffff;
      font-weight: 500;
    }

    .entry-screen .display-title {
      display: flex;
      flex-direction: column;
    }

    .entry-screen .display-title span {
      white-space: nowrap;
    }

    .display-sub {
      margin: 4px 0 0;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 500;
      line-height: 26.7px;
      color: var(--ink-soft);
    }

    .flow-hint {
      display: block;
      text-align: center;
      font-size: 14px;
      font-weight: 400;
      color: rgba(84, 96, 118, 0.72);
      opacity: 0.7;
      position: relative;
      z-index: 260;
    }

    .persona-flow .flow-hint {
      margin-top: 28px;
    }

    .major-flow .flow-hint {
      margin-top: 0;
    }

    .pill-input {
      width: 100%;
      height: 58px;
      min-height: 48px;
      padding: 1px 25px;
      border-radius: 64px;
      border: 1px solid rgba(67, 82, 111, 0.1);
      background: rgba(67, 82, 111, 0.08);
      font-size: 16px;
      font-weight: 500;
      color: #1c2537;
      -webkit-appearance: none;
      appearance: none;
    }

    .pill-input::placeholder {
      color: rgba(117, 117, 117, 0.55);
      font-weight: 500;
    }

    .pill-input:focus {
      border-color: rgba(52, 125, 245, 0.45);
      background: rgba(67, 82, 111, 0.1);
    }

    .cta-button {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 58px;
      padding: 17.78px 18px 18.22px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--blue-hi) 0%, var(--blue-lo) 100%);
      box-shadow:
        0 18px 18px rgba(22, 119, 255, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.32);
      color: #ffffff;
      font-size: 18px;
      font-weight: 500;
      line-height: 21.96px;
      text-align: center;
      transition: transform 0.15s ease, filter 0.2s ease;
    }

    .cta-button:active {
      transform: translateY(1px) scale(0.99);
    }

    .cta-button:disabled {
      filter: saturate(0.4) brightness(1.04);
      cursor: default;
    }

    /* ============================================================
       ENTRY
       ============================================================ */
    .entry-screen .head-copy {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .persona-flow {
      flex: 1 0 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px 0;
      width: 100%;
    }

    .persona-coverflow {
      position: relative;
      width: 100%;
      height: 196px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .persona-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 130px;
      height: 176px;
      transform: translate(-50%, -50%);
      border: 3px dashed #ffffff;
      border-radius: 26px;
      box-shadow: 0 0 0 7px rgba(67, 82, 111, 0.04);
      pointer-events: none;
      z-index: 0;
    }

    .persona-card {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 128px;
      height: 174px;
      margin: -87px 0 0 -64px;
      border-radius: 26px;
      border: 3px solid #ffffff;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 18px 38px rgba(53, 68, 96, 0.11);
      overflow: hidden;
      transition: transform 0.42s cubic-bezier(0.22, 0.85, 0.3, 1), opacity 0.3s ease, box-shadow 0.3s ease;
      will-change: transform;
    }

    .persona-card.no-anim {
      transition: none;
    }

    .persona-card.is-active {
      box-shadow: 0 24px 54px rgba(0, 53, 62, 0.24);
    }

    .persona-card .persona-photo {
      position: absolute;
      inset: -3px;
      border-radius: 24px;
      background-color: rgba(151, 170, 200, 0.14);
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      filter: var(--persona-filter, none);
      transform: scale(1.05);
    }

    .persona-card .persona-photo:not(.is-img-ready) {
      animation: sk-pulse 1.6s ease-in-out infinite;
    }

    .persona-card .persona-photo.img-reveal {
      animation: img-fade-in 0.5s ease;
    }

    .persona-card .persona-body {
      display: none;
    }

    .entry-bottom {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .entry-disclaimer {
      margin: 0 auto;
      max-width: 329px;
      padding-top: 0;
      font-size: 12px;
      font-weight: 500;
      line-height: 20.4px;
      text-align: center;
      color: rgba(84, 96, 118, 0.4);
    }

    /* ============================================================
       SETUP
       ============================================================ */
    .setup-screen {
      padding-top: 40px;
      padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
      gap: 16px;
    }

    .setup-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1 0 auto;
      min-height: 0;
    }

    .major-flow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
    }

    .major-coverflow {
      position: relative;
      width: 100%;
      height: 156px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .major-chip {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 180px;
      height: 150px;
      margin: -75px 0 0 -90px;
      display: flex;
      flex-direction: column;
      border-radius: 24px;
      border: 3px solid #ffffff;
      background: rgba(255, 255, 255, 0.86);
      -webkit-backdrop-filter: blur(11px);
      backdrop-filter: blur(11px);
      box-shadow: 0 30px 64px rgba(31, 45, 76, 0.1);
      overflow: hidden;
      text-align: left;
      transition: transform 0.42s cubic-bezier(0.22, 0.85, 0.3, 1), opacity 0.3s ease;
      will-change: transform;
    }

    .major-chip.no-anim {
      transition: none;
    }

    .major-chip .cf-art {
      flex: 1 0 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(140% 120% at 50% 24%, var(--mj-a, #f0f9ff) 0%, var(--mj-b, #c6deff) 100%);
      border-radius: 0;
    }

    .major-chip .cf-art img,
    .major-chip .cf-art svg {
      width: 53px;
      height: 47px;
      object-fit: contain;
      overflow: visible;
    }

    .major-chip .cf-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px;
    }

    .major-chip .cf-body b {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      line-height: 1;
      color: rgba(28, 37, 55, 0.94);
      white-space: nowrap;
    }

    .major-chip .cf-body span {
      font-family: var(--font-display);
      font-size: 10.5px;
      font-weight: 500;
      line-height: 14.7px;
      color: rgba(84, 96, 118, 0.72);
    }

    .setup-fields {
      display: flex;
      flex-direction: column;
      gap: 30px;
      padding: 12px 0;
      width: 100%;
    }

    .field-row {
      display: flex;
      gap: 13px;
      width: 100%;
    }

    .field-row .pill-input {
      flex: 1 1 0;
      min-width: 0;
      background: rgba(67, 82, 111, 0.12);
      font-size: 15px;
    }

    .field-row .pill-input::placeholder {
      color: #7095a1;
    }

    .hope-block {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hope-label {
      width: 100%;
      font-size: 14px;
      font-weight: 400;
      text-align: center;
      color: rgba(84, 96, 118, 0.72);
    }

    .hope-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .hope-options button {
      height: 48px;
      min-height: 44px;
      border-radius: 14px;
      background: #f7f9fc;
      border: 1px solid rgba(67, 82, 111, 0.1);
      font-size: 14px;
      font-weight: 700;
      line-height: 16.52px;
      color: rgba(36, 47, 66, 0.76);
      text-align: center;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    .hope-options button.is-active {
      background: #e7f0ff;
      border-color: rgba(52, 125, 245, 0.5);
      color: #176de4;
    }

    .setup-spacer {
      flex: 1 0 0;
      min-height: 0;
    }

    .setup-error {
      display: none;
      font-size: 13px;
      line-height: 1.5;
      color: #c2412d;
      background: rgba(255, 235, 230, 0.92);
      border: 1px solid rgba(194, 65, 45, 0.22);
      border-radius: 14px;
      padding: 10px 14px;
    }

    .setup-error.is-visible {
      display: block;
    }

    /* ============================================================
       PLAY
       ============================================================ */
    .play-screen {
      height: var(--screen-h);
      overflow: hidden;
      gap: 24px;
      padding-top: 40px;
      padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
    }

    .play-head {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      flex: 0 0 auto;
    }

    .play-head-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      width: 100%;
    }

    .play-brand {
      display: flex;
      flex-direction: column;
      min-width: 0;
      color: #ffffff;
    }

    .play-brand small {
      font-size: 11px;
      font-weight: 700;
      line-height: 12px;
    }

    .play-brand .play-year {
      font-family: var(--font-display);
      font-size: 38px;
      font-weight: 400;
      line-height: 1.2;
      white-space: nowrap;
      display: inline-flex;
      align-items: baseline;
    }

    .play-brand .play-year-count {
      font-size: 16px;
      font-weight: 500;
      line-height: 1;
      margin-left: 1px;
    }

    .undo-button {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      min-width: 86px;
      padding: 10px 13px;
      border-radius: 999px;
      border: 1px solid rgba(253, 254, 254, 0.55);
      background: rgba(255, 255, 255, 0);
      -webkit-backdrop-filter: blur(7px);
      backdrop-filter: blur(7px);
      color: #f7fdfe;
      font-size: 11px;
      font-weight: 700;
      line-height: 13.42px;
      white-space: nowrap;
      transition: opacity 0.2s ease, background 0.2s ease;
    }

    .undo-button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .undo-button:not(:disabled):active {
      background: rgba(255, 255, 255, 0.18);
    }

    .play-track {
      width: 100%;
      height: 5px;
      border-radius: 999px;
      background: rgba(26, 41, 66, 0.08);
      overflow: hidden;
    }

    .play-track span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: #ffffff;
      box-shadow: 0 1px 3px rgba(16, 56, 50, 0.18);
      transition: width 0.4s ease;
    }

    .deck-shell {
      flex: 1 1 0;
      min-height: 0;
      position: relative;
      width: 100%;
    }

    .card-stack {
      position: relative;
      width: 100%;
      height: 100%;
      isolation: isolate;
    }

    .life-card {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 17px;
      border-radius: 34px;
      border: 1px solid rgba(255, 255, 255, 0.86);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94) 0%, rgba(248, 251, 255, 0.9) 100%);
      box-shadow:
        0 18px 44px rgba(48, 64, 92, 0.15),
        inset 0 1px 0 1px rgba(255, 255, 255, 0.9);
      overflow: visible;
      touch-action: none;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .life-card.behind-one {
      transform: rotate(3.87deg);
      z-index: -1;
      pointer-events: none;
    }

    .life-card.behind-two {
      transform: rotate(-2.6deg) scale(0.985);
      z-index: -2;
      opacity: 0.85;
      pointer-events: none;
    }

    .life-card .previous-note {
      transition: opacity 0.3s ease 0.12s;
    }

    .life-card.behind-one .previous-note,
    .life-card.behind-two .previous-note {
      opacity: 0;
    }

    .life-card.is-exiting-left {
      animation: card-exit-left 0.38s ease forwards;
      z-index: 10;
    }

    .life-card.is-exiting-right {
      animation: card-exit-right 0.38s ease forwards;
      z-index: 10;
    }

    @keyframes card-content-in {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes card-exit-left {
      to {
        transform: translate(-130%, -6%) rotate(-14deg);
        opacity: 0;
      }
    }

    @keyframes card-exit-right {
      to {
        transform: translate(130%, -6%) rotate(14deg);
        opacity: 0;
      }
    }

    .card-head {
      display: flex;
      flex-direction: column;
      gap: 0;
      flex: 0 0 auto;
    }

    .year-badge {
      position: relative;
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: 100%;
      padding: 5.5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      background: #253041;
      box-shadow:
        0 6px 7px rgba(16, 24, 36, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.55);
      color: #feffff;
      font-size: 10.5px;
      font-weight: 900;
      line-height: 12px;
      letter-spacing: 0.21px;
      white-space: nowrap;
    }

    .card-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 38px;
      font-weight: 500;
      line-height: 1.2;
      color: var(--ink-strong);
    }

    .card-illustration {
      flex: 1 1 120px;
      min-height: 72px;
      border-radius: 27px;
      border: 1px solid rgba(255, 255, 255, 0.54);
      box-shadow: inset 0 1px 0 1px rgba(255, 255, 255, 0.46);
      background-color: rgba(151, 170, 200, 0.14);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .life-card.layout-balanced .card-illustration {
      flex-basis: 96px;
      min-height: 56px;
    }

    .life-card.layout-reading .card-illustration {
      flex-basis: 64px;
      min-height: 38px;
    }

    .card-illustration:not(.is-img-ready) {
      animation: sk-pulse 1.6s ease-in-out infinite;
    }

    /* 文案永不截断：空间不够时压缩插画（flex 1）而不是裁文字 */
    .card-prompt {
      margin: 0;
      flex: 0 0 auto;
      min-height: max-content;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.6;
      color: #182235;
    }

    .life-card.layout-reading .card-prompt {
      font-size: 14px;
      line-height: 1.48;
    }

    .choice-preview {
      display: flex;
      gap: 12px;
      width: 100%;
      flex: 0 0 auto;
      min-height: max-content;
    }

    .choice-pill {
      flex: 1 1 0;
      min-width: 0;
      min-height: max-content;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px;
      border-radius: 22px;
      text-align: left;
      transition: transform 0.18s ease, background-color 0.26s ease, color 0.26s ease;
    }

    .choice-pill.left {
      background: rgba(26, 145, 255, 0.1);
      color: #1a91ff;
    }

    .choice-pill.right {
      background: rgba(46, 185, 150, 0.1);
      color: #2eb996;
      align-items: flex-end;
      text-align: right;
    }

    .choice-pill b {
      font-size: 15px;
      font-weight: 700;
      line-height: 20.74px;
      overflow-wrap: anywhere;
    }

    .choice-pill span,
    .choice-pill strong {
      font-size: 11px;
      font-weight: 400;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .choice-pill.left:not(:disabled):active,
    .choice-pill.left.is-active {
      background: #1a91ff;
      color: #ffffff;
    }

    .choice-pill.right:not(:disabled):active,
    .choice-pill.right.is-active {
      background: #2eb996;
      color: #ffffff;
    }

    .choice-pill:disabled {
      opacity: 0.55;
      cursor: default;
    }

    /* 滑动方向的卡面淡色染色 */
    .life-card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 34px;
      background: transparent;
      opacity: 0;
      transition: opacity 0.28s ease, background-color 0.28s ease;
      pointer-events: none;
      z-index: 5;
    }

    .life-card.tilt-left::after {
      background: #1a91ff;
      opacity: 0.1;
    }

    .life-card.tilt-right::after {
      background: #2eb996;
      opacity: 0.1;
    }

    .previous-note {
      position: absolute;
      top: 76px;
      right: -14px;
      width: 152px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid #ffffff;
      background: #faf9f4;
      transform: rotate(9.36deg);
      box-shadow: -20px 22px 10.55px rgba(0, 0, 0, 0.18);
      z-index: 8;
      pointer-events: none;
    }

    .previous-note .pin {
      position: absolute;
      top: -5px;
      left: 30px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2eb996;
      transform: rotate(-9.36deg);
    }

    .previous-note b {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.2;
      color: #2f362d;
    }

    .previous-note span {
      font-size: 10px;
      font-weight: 500;
      line-height: 1.6;
      color: #8b8f89;
      overflow-wrap: anywhere;
    }

    /* loading card */
    .loading-card .card-illustration {
      position: relative;
      overflow: hidden;
    }

    .stream-placeholder {
      display: inline-block;
      height: 1em;
      border-radius: 999px;
      background: rgba(47, 54, 45, 0.12);
      color: transparent;
      overflow: hidden;
      vertical-align: middle;
    }

    .card-title .stream-placeholder {
      width: min(8em, 68%);
    }

    .card-prompt .stream-placeholder {
      width: 100%;
      height: 5.2em;
      border-radius: 14px;
    }

    .choice-pill .stream-placeholder {
      width: min(8em, 100%);
    }

    .stream-field.is-stream-new {
      animation: stream-field-in 0.42s ease both;
    }

    @keyframes stream-field-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loading-card .card-illustration::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, rgba(255, 255, 255, 0) 30%, rgba(255, 255, 255, 0.5) 50%, rgba(255, 255, 255, 0) 70%);
      transform: translateX(-100%);
      animation: card-sheen 1.4s ease infinite;
    }

    @keyframes card-sheen {
      to {
        transform: translateX(100%);
      }
    }

    .card-loading-orbit {
      position: absolute;
      right: 22px;
      top: 22px;
      display: flex;
      gap: 5px;
      z-index: 5;
    }

    .card-loading-orbit i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #2eb996;
      animation: orbit-bounce 1s ease-in-out infinite;
    }

    .card-loading-orbit i:nth-child(2) {
      animation-delay: 0.16s;
      background: #1a91ff;
    }

    .card-loading-orbit i:nth-child(3) {
      animation-delay: 0.32s;
      background: #ffc465;
    }

    @keyframes orbit-bounce {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.6;
      }
      50% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    /* 占位骨架卡：内容未加载时垫在牌堆后面 */
    .ghost-card {
      pointer-events: none;
    }

    .sk {
      display: block;
      border-radius: 999px;
      background: rgba(151, 170, 200, 0.16);
      animation: sk-pulse 1.6s ease-in-out infinite;
    }

    .sk-badge {
      width: 132px;
      height: 23px;
    }

    .sk-title-bar {
      width: 62%;
      height: 34px;
      border-radius: 12px;
      animation-delay: 0.1s;
    }

    .sk-illus {
      flex: 1 1 0;
      min-height: 0;
      border-radius: 27px;
      animation-delay: 0.2s;
    }

    .sk-line {
      height: 14px;
      width: 100%;
      animation-delay: 0.3s;
    }

    .sk-line.short {
      width: 62%;
    }

    @keyframes sk-pulse {
      0%, 100% {
        opacity: 0.5;
      }
      50% {
        opacity: 1;
      }
    }

    /* ============================================================
       RESULT
       ============================================================ */
    .result-sheet {
      position: fixed;
      inset: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      /* 渐变固定在一屏内，不随滚动变化 */
      background: linear-gradient(191.79deg, #ffc465 18.99%, #5fc9d3 58.8%, #e9f9e6 99.67%);
      z-index: 40;
    }

    .result-card {
      width: 100%;
      max-width: var(--shell-w);
      margin: 0 auto;
      padding: 64px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* 仅在导出结果长图时给卡片自身铺上渐变背景 */
    .result-card.is-capturing {
      background: linear-gradient(191.79deg, #ffc465 18.99%, #5fc9d3 58.8%, #e9f9e6 99.67%);
    }

    .result-title .sk {
      display: block;
      width: 46%;
      height: 30px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.45);
    }

    .result-title .sk + .sk {
      width: 72%;
      margin-top: 8px;
      animation-delay: 0.15s;
    }

    .result-eyebrow {
      background: #11161e;
      color: rgba(255, 255, 255, 0.92);
      font-size: 12px;
      letter-spacing: 0.48px;
      padding: 8px 12px;
      box-shadow: none;
    }

    .result-title {
      margin: 0;
      font-size: 33px;
      font-weight: 700;
      line-height: 1.1;
      color: #ffffff;
    }

    .result-title span {
      display: inline;
    }

    .result-title span:first-child {
      display: block;
    }

    .result-hero {
      position: relative;
      width: 100%;
      height: 398px;
      border-radius: 30px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 4px;
      padding: 16px;
    }

    .result-hero {
      background: rgba(17, 22, 30, 0.16);
    }

    .result-hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .result-hero.is-img-ready .result-hero-img {
      opacity: 1;
    }

    /* 结果就绪后：hero 形象与各段文案一起错峰淡入 */
    .result-card.is-loading .result-eyebrow,
    .result-card.is-loading .result-actions {
      display: none;
    }

    .result-card.is-revealed .result-eyebrow,
    .result-card.is-revealed .result-title {
      animation: card-content-in 0.45s ease backwards;
    }

    .result-card.is-revealed .result-hero {
      animation: card-content-in 0.45s ease 0.06s backwards;
    }

    .result-card.is-revealed .result-block {
      animation: card-content-in 0.45s ease backwards;
    }

    .result-card.is-revealed #resultOverview {
      animation-delay: 0.12s;
    }

    .result-card.is-revealed #resultInsights {
      animation-delay: 0.18s;
    }

    .result-card.is-revealed #resultHighlights {
      animation-delay: 0.24s;
    }

    .result-card.is-revealed #resultGuides {
      animation-delay: 0.3s;
    }

    .result-card.is-revealed .result-actions {
      animation: card-content-in 0.45s ease 0.36s backwards;
    }

    .result-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15, 20, 28, 0.04) 0%, rgba(15, 20, 28, 0.04) 75%, rgba(15, 20, 28, 0.62) 100%);
    }

    .result-hero > * {
      position: relative;
      z-index: 2;
    }

    .result-hero .result-hero-img {
      position: absolute;
      z-index: 0;
    }

    .result-portrait {
      display: none;
    }

    .result-status-text {
      margin: 0;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.2;
      letter-spacing: -0.15px;
      color: rgba(255, 255, 255, 0.92);
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.22);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .result-chips {
      display: flex;
      gap: 8px;
      height: 26px;
      overflow: hidden;
    }

    .result-chips .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 11px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: rgba(12, 16, 25, 0.5);
      white-space: nowrap;
    }

    .result-chips .tag:nth-child(3n + 1) {
      background: linear-gradient(270deg, #e9ff79 0%, #79ffa8 100%);
    }

    .result-chips .tag:nth-child(3n + 2) {
      background: linear-gradient(270deg, #a6ff8f 0%, #49ffed 100%);
    }

    .result-chips .tag:nth-child(3n) {
      background: linear-gradient(270deg, #ffd1ac 0%, #ffbe69 100%);
    }

    .result-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* glass section card */
    .glass-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 17px;
      border-radius: 28px;
      border: 1px solid rgba(84, 100, 130, 0.12);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.86) 0%, rgba(244, 248, 255, 0.68) 100%);
      -webkit-backdrop-filter: blur(11px);
      backdrop-filter: blur(11px);
      box-shadow:
        0 18px 44px rgba(52, 68, 98, 0.12),
        0 2px 8px rgba(52, 68, 98, 0.05);
    }

    .glass-section > h3 {
      margin: 0;
      font-size: 21px;
      font-weight: 400;
      line-height: 26.25px;
      color: #000000;
    }

    /* career probability */
    .career-probability {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .career-summary {
      margin: 0;
      font-size: 13.5px;
      font-weight: 500;
      line-height: 22.28px;
      color: #4d5a70;
    }

    .career-cards {
      display: flex;
      gap: 8px;
    }

    .career-card {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      justify-content: center;
      padding: 13px;
      border-radius: 16px;
      border: 1px solid rgba(84, 100, 130, 0.12);
      text-align: center;
    }

    .career-card b {
      font-family: var(--font-num);
      font-size: 29px;
      font-weight: 700;
      line-height: 28.98px;
    }

    .career-card span {
      font-size: 11.5px;
      font-weight: 900;
      line-height: 14.38px;
      color: #4d5a70;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .career-card:nth-child(1) {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.86) 0%, rgba(244, 248, 255, 0.68) 100%);
    }

    .career-card:nth-child(1) b {
      color: #1478ff;
    }

    .career-card:nth-child(2) {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.88) 0%, rgba(228, 247, 236, 0.78) 100%);
    }

    .career-card:nth-child(2) b {
      color: #00c774;
    }

    .career-card:nth-child(3) {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.88) 0%, rgba(239, 235, 255, 0.78) 100%);
    }

    .career-card:nth-child(3) b {
      color: #0000e5;
    }

    /* RIASEC ability card */
    .ability-section {
      background: #ffffff;
      border: 1px solid rgba(84, 100, 130, 0.12);
      border-radius: 28px;
      padding: 17px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      filter: drop-shadow(0 18px 22px rgba(52, 68, 98, 0.12)) drop-shadow(0 2px 4px rgba(52, 68, 98, 0.05));
    }

    .ability-top {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      width: 100%;
    }

    .ability-copy {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ability-copy h4 {
      margin: 0;
      font-size: 33px;
      font-weight: 700;
      line-height: 1;
      color: var(--ability-accent, #0f8b8d);
    }

    .ability-summary {
      margin: 0;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
      color: #433e38;
    }

    .ability-note {
      margin: 0;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      color: #8a95a8;
    }

    .ability-art {
      flex: 0 0 auto;
      width: 104px;
      height: 156px;
      margin-bottom: -37px;
      object-fit: contain;
      object-position: center bottom;
      filter: drop-shadow(0 12px 18px rgba(31, 45, 76, 0.2));
      position: relative;
      z-index: 3;
    }

    .ability-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      border-radius: 24px;
      background: linear-gradient(180deg, var(--ability-tint, #d0fff3) 0%, #ffffff 100%);
    }

    .ability-intro {
      margin: 0;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.7;
      color: #3a4150;
    }

    .ability-radar-wrap {
      display: flex;
      justify-content: center;
    }

    .ability-radar {
      width: 248px;
      max-width: 100%;
      height: auto;
    }

    .ability-radar-grid {
      fill: none;
      stroke: rgba(36, 48, 68, 0.16);
      stroke-width: 1;
    }

    .ability-radar-axis {
      stroke: rgba(36, 48, 68, 0.14);
      stroke-width: 1;
    }

    .ability-radar-label {
      font-family: Inter, var(--font-ui);
      font-size: 10.6px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .ability-radar-word {
      font-family: var(--font-display);
      font-size: 10.6px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .ability-radar-shape {
      fill: var(--ability-accent, #0f8b8d);
      fill-opacity: 0.34;
      stroke: var(--ability-accent, #0f8b8d);
      stroke-width: 1.6;
      stroke-linejoin: round;
    }

    .ability-radar-dot {
      fill: var(--ability-accent, #0f8b8d);
      stroke: #ffffff;
      stroke-width: 1.4;
    }

    .ability-score-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .ability-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .ability-row label {
      flex: 0 0 60px;
      font-size: 13px;
      font-weight: 400;
      line-height: 18.2px;
      color: #172033;
      white-space: nowrap;
    }

    .ability-track {
      flex: 1 1 0;
      min-width: 0;
      height: 9px;
      border-radius: 999px;
      background: rgba(36, 48, 68, 0.09);
      overflow: hidden;
    }

    .ability-track span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--ability-color, #0f8b8d) 55%, #1c2430) 0%, var(--ability-color, #0f8b8d) 100%);
    }

    .ability-score {
      flex: 0 0 auto;
      min-width: 32px;
      font-size: 13px;
      font-weight: 700;
      text-align: right;
      color: var(--ability-color, #0f8b8d);
    }

    .ability-trend-body {
      margin: 0;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.7;
      color: #313847;
    }

    /* famous scenes */
    .result-scene {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5.3px;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid rgba(84, 100, 130, 0.12);
    }

    .result-scene b {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      padding: 3.5px 10px;
      border-radius: 999px;
      background: #fbfcfd;
      font-size: 16px;
      font-weight: 700;
      line-height: 21.44px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-scene span {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
    }

    .result-scene:nth-child(3n + 1) {
      background: #bed1ff;
    }

    .result-scene:nth-child(3n + 1) b {
      color: #527ad7;
    }

    .result-scene:nth-child(3n + 1) span {
      color: #2d3b5d;
    }

    .result-scene:nth-child(3n + 2) {
      background: #bce9ff;
    }

    .result-scene:nth-child(3n + 2) b {
      color: #4fb2e2;
    }

    .result-scene:nth-child(3n + 2) span {
      color: #1d475a;
    }

    .result-scene:nth-child(3n) {
      background: #ffddd7;
    }

    .result-scene:nth-child(3n) b {
      color: #c45c47;
    }

    .result-scene:nth-child(3n) span {
      color: #612a1f;
    }

    /* chronicle */
    .result-chronicle-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      padding: 2px 0 2px 17px;
      border-left: 3px solid #51b8a6;
    }

    .result-chronicle-item b {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      padding: 3.3px 10px 4px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 700;
      line-height: 21.24px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-chronicle-item p {
      margin: 0;
      font-size: 14px;
      font-weight: 500;
      line-height: 23.8px;
      color: #3c4049;
      opacity: 0.7;
    }

    .result-chronicle-item:nth-of-type(3n + 1) b {
      background: #bed1ff;
      color: #527ad7;
    }

    .result-chronicle-item:nth-of-type(3n + 2) b {
      background: #bce9ff;
      color: #308bb7;
    }

    .result-chronicle-item:nth-of-type(3n) b {
      background: #ffddd7;
      color: #c45c47;
    }

    /* share hooks */
    .result-hook {
      width: 100%;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(70, 84, 110, 0.11);
      background: rgba(22, 119, 255, 0.11);
      font-size: 13px;
      font-weight: 900;
      line-height: 17.55px;
      color: #1677ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* guides */
    .result-guide-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      padding: 15px 16px;

      state.fixedQuestionBank = buildFixedQuestionBank(state.profile, state.major);
    }

    function isFixedSlot(yearNumber) {
      return yearNumber > 1 && yearNumber % fixedInsertEvery === 0;
    }

    function usedFixedKeys(ignoreYear = 0) {
      const keys = new Set();
      state.deck.forEach(card => {
        if (!card || Number(card.yearNumber) === Number(ignoreYear)) return;
        if (card.fixedKey) keys.add(card.fixedKey);
      });
      state.history.forEach(item => {
        if (!item || Number(item.year) === Number(ignoreYear)) return;
        if (item.fixedKey) keys.add(item.fixedKey);
      });
      return keys;
    }

    function pickFixedTemplate(yearNumber, purpose = "fixed") {
      prepareFixedQuestionBank();
      const bank = state.fixedQuestionBank.length ? state.fixedQuestionBank : buildFixedQuestionBank(state.profile, state.major);
      if (!bank.length) return null;
      const used = usedFixedKeys(yearNumber);
      const baseIndex = purpose === "fixed"
        ? Math.max(0, Math.floor(yearNumber / fixedInsertEvery) - 1)
        : Math.max(0, yearNumber - 2);
      for (let offset = 0; offset < bank.length; offset += 1) {
        const template = bank[(baseIndex + offset) % bank.length];
        if (!used.has(template.fixedKey)) return template;
      }
      return bank[baseIndex % bank.length];
    }

    function fixedSummaryForTemplate(yearNumber, template, tracks) {
      const otherTrack = tracks.mainTrack === "relationship" ? tracks.lifeTrack : tracks.relationshipTrack;
      const cast = getStoryCast();
      const options = [
        `${otherTrack}；${cast.relationName}也把上次那件事记进了聊天里`,
        `${otherTrack}；家里少催了两句，却开始盯你的下一步`,
        `${otherTrack}；朋友群把前一次选择改成了新梗`
      ];
      return shortFeedbackText(options[hashString(`${template.fixedKey}:${yearNumber}`) % options.length]);
    }

    function readableFixedOption(label, tag) {
      const text = String(label || "").trim();
      if (text.length >= 12) return text;
      return `${text}，按${String(tag || "当前判断").slice(0, 6)}处理`;
    }

    function buildFixedCard(yearNumber) {
      const template = pickFixedTemplate(yearNumber, "fixed");
      if (!template) return null;
      const leftOption = readableFixedOption(template.left, template.tagA);
      const rightOption = readableFixedOption(template.right, template.tagB);
      const tracks = buildFixedTracks(yearNumber, template);
      return applyPreviousInfoToCard(normalizeRemoteCard({

        callbackSeeds: [template.title, tracks.mainTrack === "relationship" ? tracks.lifeTrack : tracks.relationshipTrack].slice(0, 2),

    function countRemoteYearsFrom(startYear, limit) {
      let count = 0;
      for (let year = startYear; year <= state.totalYears && count < limit; year += 1) {

      renderMajorGrid();

    function buildMajorCoverflowCards() {
      els.majorGrid.innerHTML = majorKeys.map((key, index) => {
        const major = majors[key];
        const icon = majorIconMeta[key] || { h: 265, sym: "<circle cx='12' cy='12' r='6'/>" };
        const pastel = majorPastels[key] || majorPastelFromHue(icon.h);

        const art = majorIconFiles[key]
          ? `<img src="${majorIconFiles[key]}" alt="" draggable="false" />`

        return `
          <button type="button" class="major-chip${active}" role="radio" aria-checked="${key === state.major}" data-major="${key}" data-index="${index}" style="--mj-a:${pastel[0]};--mj-b:${pastel[1]}">
            <span class="cf-art" aria-hidden="true">${art}</span>

      const dots = document.querySelector("#cfDots");
      if (dots) {
        dots.innerHTML = majorKeys.map((_, index) => `<button type="button" class="cf-dot" data-index="${index}" aria-label="第 ${index + 1} 个方向"></button>`).join("");

    function renderAvatarGrid() {
      if (!els.avatarGrid) return;
      document.querySelector("#avatarCount")?.replaceChildren(document.createTextNode(`${avatarOptions.length} 张形象卡`));
      if (els.avatarGrid.children.length !== avatarOptions.length) {
        buildAvatarCoverflowCards();
        initAvatarCoverflowControls();
      }
      avatarCenter = Math.max(0, avatarOptions.findIndex(item => item.id === state.avatar));
      layoutAvatarCoverflow(avatarCenter, false);
    }

    function buildAvatarCoverflowCards() {
      els.avatarGrid.innerHTML = avatarOptions.map((avatar, index) => {
        const active = avatar.id === state.avatar ? " is-active" : "";
        return `
          <button type="button" class="persona-card${active}" role="radio" aria-checked="${avatar.id === state.avatar}" aria-label="${escapeHTML(avatar.title)} ${escapeHTML(avatar.desc)}" data-avatar="${escapeHTML(avatar.id)}" data-index="${index}" style="--persona-h:${avatar.hue};--persona-filter:saturate(${avatar.sat}) hue-rotate(${avatar.rotate});">
            <span class="persona-photo" aria-hidden="true"></span>
          </button>
        `;
      }).join("");
      Array.from(els.avatarGrid.querySelectorAll(".persona-card")).forEach((cardEl, index) => {
        const photoUrl = avatarOptions[index]?.photoUrl;
        if (photoUrl) applyCardArt(cardEl.querySelector(".persona-photo"), [photoUrl]);
      });
      const dots = document.querySelector("#avatarDots");
      if (dots) {
        dots.innerHTML = avatarOptions.map((_, index) => `<button type="button" class="persona-dot" data-index="${index}" aria-label="第 ${index + 1} 个形象"></button>`).join("");
      }
    }

    function layoutAvatarCoverflow(centerFloat, animate = true) {
      if (!els.avatarGrid) return;
      const cards = Array.from(els.avatarGrid.children);
      const total = cards.length;
      cards.forEach((card, index) => {
        const offset = shortestLoopOffset(index, centerFloat, total);
        const abs = Math.abs(offset);
        card.classList.toggle("no-anim", !animate);
        if (abs > 3.4) {
          card.style.opacity = "0";
          card.style.pointerEvents = "none";
          card.style.transform = `translate3d(${Math.sign(offset) * 420}px, 70px, 0) scale(0.62)`;
          card.style.zIndex = "0";
          card.classList.remove("is-active");
          return;
        }
        const tx = offset * avatarStep;
        const ty = abs * 20 - Math.max(0, 1 - abs) * 6;
        const rotate = Math.max(-3, Math.min(3, offset)) * 6;
        const scale = (1 - abs * 0.08) + Math.max(0, 1 - abs) * 0.08;
        card.style.transform = `translate3d(${tx}px, ${ty}px, 0) rotate(${rotate}deg) scale(${scale})`;
        card.style.opacity = abs > 2.4 ? "0.42" : "1";
        card.style.pointerEvents = "auto";
        card.style.zIndex = String(200 - Math.round(abs * 10));
        card.classList.toggle("is-active", abs < 0.5);
        card.setAttribute("aria-checked", abs < 0.5 ? "true" : "false");
      });
      const activeIndex = wrapIndex(Math.round(centerFloat), avatarOptions.length);
      document.querySelectorAll("#avatarDots .persona-dot").forEach((dot, index) => {
        dot.classList.toggle("is-active", index === activeIndex);
      });
    }

    function selectAvatarByIndex(index, animate = true) {
      const nextIndex = wrapIndex(Math.round(index), avatarOptions.length);
      const nextId = avatarOptions[nextIndex]?.id || avatarOptions[0].id;
      if (animate && nextId !== state.avatar) hapticTap(20);
      avatarCenter = index;
      state.avatar = nextId;
      layoutAvatarCoverflow(index, animate);
      applyProfile(readProfile());
      scheduleWarmup();
    }

    // ====== 触感与抛手惯性 ======
    const flingFrames = new Map();

    function hapticTap(ms = 12) {
      let handled = false;
      try {
        handled = Boolean(navigator.vibrate?.(ms));
      } catch (_) {}
      if (!handled) {
        // iOS Safari 没有 vibrate API，点击隐藏 switch 触发系统触感
        try {
          document.querySelector(".haptic-switch input")?.click();
        } catch (_) {}
      }
    }

    function trackDragVelocity(drag, floatIndex) {
      const now = performance.now();
      if (drag.lastTime != null && now > drag.lastTime) {
        const instant = (floatIndex - drag.lastFloat) / (now - drag.lastTime);
        drag.velocity = drag.velocity == null ? instant : instant * 0.7 + drag.velocity * 0.3;
      }
      drag.lastTime = now;
      drag.lastFloat = floatIndex;
    }

    function flingTarget(floatIndex, velocity) {
      const projected = floatIndex + (velocity || 0) * 170;
      return Math.round(clamp(projected, floatIndex - 4, floatIndex + 4));
    }

    function cancelFling(layoutFn) {
      const active = flingFrames.get(layoutFn);
      if (active) window.cancelAnimationFrame(active.id);
      flingFrames.delete(layoutFn);
      return active ? active.value : null;
    }

    function animateFling(from, to, layoutFn, settleFn) {
      cancelFling(layoutFn);
      if (Math.abs(to - from) < 0.01) {
        settleFn(to);
        return;
      }
      const distance = to - from;
      const duration = Math.max(220, Math.min(720, 240 + Math.abs(distance) * 110));
      const start = performance.now();
      let lastTick = Math.round(from);
      const frame = now => {
        const t = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - t, 3);
        const value = from + distance * eased;
        layoutFn(value, false);
        const rounded = Math.round(value);
        if (rounded !== lastTick) {
          lastTick = rounded;
          hapticTap(12);
        }
        if (t < 1) {
          flingFrames.set(layoutFn, { id: window.requestAnimationFrame(frame), value });
        } else {
          flingFrames.delete(layoutFn);
          settleFn(to);
        }
      };
      flingFrames.set(layoutFn, { id: window.requestAnimationFrame(frame), value: from });
    }

    function initAvatarCoverflowControls() {
      const coverflow = els.avatarCoverflow;
      if (!coverflow || coverflow.dataset.ready === "true") return;
      coverflow.dataset.ready = "true";
      coverflow.addEventListener("pointerdown", event => {
        if (event.target.closest(".persona-nav")) return;
        const flingValue = cancelFling(layoutAvatarCoverflow);
        avatarDrag = { id: event.pointerId, startX: event.clientX, base: flingValue ?? avatarCenter, moved: false };
        try { coverflow.setPointerCapture(event.pointerId); } catch (_) {}
      });
      coverflow.addEventListener("pointermove", event => {
        if (!avatarDrag || avatarDrag.id !== event.pointerId) return;
        const dx = event.clientX - avatarDrag.startX;
        if (Math.abs(dx) > 4) avatarDrag.moved = true;
        const floatIndex = avatarDrag.base - dx / avatarStep;
        trackDragVelocity(avatarDrag, floatIndex);
        layoutAvatarCoverflow(floatIndex, false);
      });
      const finishDrag = event => {
        if (!avatarDrag || avatarDrag.id !== event.pointerId) return;
        const dx = event.clientX - avatarDrag.startX;
        const moved = avatarDrag.moved;
        const floatIndex = avatarDrag.base - dx / avatarStep;
        const velocity = avatarDrag.velocity || 0;
        avatarDrag = null;
        if (!moved) return;
        animateFling(floatIndex, flingTarget(floatIndex, velocity), layoutAvatarCoverflow, value => selectAvatarByIndex(value, false));
      };
      coverflow.addEventListener("pointerup", finishDrag);
      coverflow.addEventListener("pointercancel", finishDrag);
      document.querySelector("#avatarPrev")?.addEventListener("click", event => {
        event.preventDefault();
        selectAvatarByIndex(avatarOptions.findIndex(item => item.id === state.avatar) - 1, true);
      });
      document.querySelector("#avatarNext")?.addEventListener("click", event => {
        event.preventDefault();
        selectAvatarByIndex(avatarOptions.findIndex(item => item.id === state.avatar) + 1, true);
      });
      document.querySelector("#avatarDots")?.addEventListener("click", event => {
        const dot = event.target.closest(".persona-dot");
        if (!dot) return;
        selectAvatarByIndex(Number(dot.dataset.index || 0), true);
      });
    }

    function glassMajorIcon(key, hue, inner) {
      const safeKey = String(key).replace(/[^a-z0-9_-]/gi, "");
      const gid = `gb_${safeKey}`;
      const sid = `gs_${safeKey}`;
      const hid = `gh_${safeKey}`;
      return `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <linearGradient id="${gid}" x1="0.18" y1="0" x2="0.82" y2="1">
              <stop offset="0" stop-color="oklch(0.91 0.1 ${hue})"></stop>
              <stop offset="0.55" stop-color="oklch(0.64 0.25 ${hue})"></stop>
              <stop offset="1" stop-color="oklch(0.47 0.2 ${hue})"></stop>
            </linearGradient>
            <filter id="${sid}" x="-60%" y="-60%" width="220%" height="220%"><feDropShadow dx="0" dy="1.1" stdDeviation="1.1" flood-color="oklch(0.4 0.16 ${hue})" flood-opacity="0.55"></feDropShadow></filter>
            <filter id="${hid}"><feGaussianBlur stdDeviation="0.5"></feGaussianBlur></filter>
          </defs>
          <g filter="url(#${sid})" fill="none" stroke="url(#${gid})" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round">${inner}</g>
          <g fill="none" stroke="white" stroke-opacity="0.6" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#${hid})" transform="translate(-0.5,-0.7)">${inner}</g>
        </svg>
      `;
    }

    function layoutMajorCoverflow(centerFloat, animate = true) {
      const cards = Array.from(els.majorGrid.children);
      const total = cards.length;
      cards.forEach((card, index) => {
        const offset = shortestLoopOffset(index, centerFloat, total);
        const abs = Math.abs(offset);
        card.classList.toggle("no-anim", !animate);
        if (abs > 3.4) {
          card.style.opacity = "0";
          card.style.pointerEvents = "none";
          card.style.transform = `translate3d(${Math.sign(offset) * 470}px, 88px, 0) scale(0.6)`;
          card.style.zIndex = "0";
          card.classList.remove("is-active");
          return;
        }
        const tx = offset * majorCoverflowStep();
        const ty = abs * 22 + Math.max(0, abs - 1) * 18;
        const clamped = Math.max(-3, Math.min(3, offset));
        const rotate = Math.sign(clamped) * (Math.min(Math.abs(clamped), 1) * 6 + Math.max(0, Math.abs(clamped) - 1) * 9);
        const scale = 1 - abs * 0.1;
        card.style.transform = `translate3d(${tx}px, ${ty}px, 0) rotate(${rotate}deg) scale(${scale})`;
        card.style.opacity = abs > 2.4 ? "0.4" : "1";
        card.style.pointerEvents = "auto";
        card.style.zIndex = String(200 - Math.round(abs * 10));
        card.classList.toggle("is-active", abs < 0.5);
        card.setAttribute("aria-checked", abs < 0.5 ? "true" : "false");
      });
      const activeIndex = wrapIndex(Math.round(centerFloat), majorKeys.length);
      document.querySelectorAll("#cfDots .cf-dot").forEach((dot, index) => {
        dot.classList.toggle("is-active", index === activeIndex);
      });

    function selectMajorByIndex(index, animate = true) {

    function initCoverflowControls() {
      const coverflow = document.querySelector(".coverflow");
      if (!coverflow || coverflow.dataset.ready === "true") return;
      coverflow.dataset.ready = "true";
      coverflow.addEventListener("pointerdown", event => {
        if (event.target.closest(".cf-nav")) return;
        const flingValue = cancelFling(layoutMajorCoverflow);
        coverflowDrag = { id: event.pointerId, startX: event.clientX, base: flingValue ?? coverflowCenter, moved: false };
        try { coverflow.setPointerCapture(event.pointerId); } catch (_) {}
      });
      coverflow.addEventListener("pointermove", event => {
        if (!coverflowDrag || coverflowDrag.id !== event.pointerId) return;
        const dx = event.clientX - coverflowDrag.startX;
        if (Math.abs(dx) > 4) coverflowDrag.moved = true;
        const floatIndex = coverflowDrag.base - dx / majorCoverflowStep();
        trackDragVelocity(coverflowDrag, floatIndex);
        layoutMajorCoverflow(floatIndex, false);
      });
      const finishDrag = event => {
        if (!coverflowDrag || coverflowDrag.id !== event.pointerId) return;
        const dx = event.clientX - coverflowDrag.startX;
        const moved = coverflowDrag.moved;
        const floatIndex = coverflowDrag.base - dx / majorCoverflowStep();
        const velocity = coverflowDrag.velocity || 0;
        coverflowDrag = null;
        if (!moved) return;
        animateFling(floatIndex, flingTarget(floatIndex, velocity), layoutMajorCoverflow, value => selectMajorByIndex(value, false));
      };
      coverflow.addEventListener("pointerup", finishDrag);
      coverflow.addEventListener("pointercancel", finishDrag);
      document.querySelector("#cfPrev")?.addEventListener("click", event => {
        event.preventDefault();
        selectMajorByIndex(majorKeys.indexOf(state.major) - 1, true);
      });
      document.querySelector("#cfNext")?.addEventListener("click", event => {
        event.preventDefault();
        selectMajorByIndex(majorKeys.indexOf(state.major) + 1, true);

      document.querySelector("#cfDots")?.addEventListener("click", event => {

    const artStatus = new Map();

    function probeArt(url) {
      const cached = artStatus.get(url);
      if (cached === true || cached === false) return Promise.resolve(cached);
      if (cached) return cached;
      const pending = new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          artStatus.set(url, true);
          resolve(true);
        };
        img.onerror = () => {
          artStatus.set(url, false);
          resolve(false);
        };
        img.src = url;
      });
      artStatus.set(url, pending);
      return pending;
    }

    function pickReadyArt(urls) {
      for (const url of urls) {
        const status = artStatus.get(url);
        if (status === true) return url;
        if (status !== false) return null;
      }
      return "";
    }

    function resolveFirstArt(urls, apply) {
      (async () => {
        for (const url of urls) {
          if (await probeArt(url)) {
            apply(url);
            return;
          }
        }
        apply("");
      })();
    }

    async function apiPost(path, payload) {
      if (runtimeFlags.pilot) {
        return handlePilotApi(path, payload);
      }
      const controller = new AbortController();
      const timeout = window.setTimeout(() => controller.abort(), 45000);
      try {
        const response = await fetch(path, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
          signal: controller.signal
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok) {
          const ray = response.headers.get("cf-ray");
          throw new Error(data.error || `请求失败：${response.status}${ray ? `（Ray: ${ray}）` : "（非 Cloudflare 响应）"}`);
        }
        logApiModel(path, payload, data, "fetch");
        return data;
      } catch (error) {
        if (error.name === "AbortError") throw new Error("生成超时，请重试");
        if (isNetworkFetchError(error)) {
          return apiPostXHR(path, payload);
        }
        throw new Error(normalizeFetchError(error, "请求失败"));
      } finally {
        window.clearTimeout(timeout);
      }
    }

    async function apiPostStream(path, payload, onDelta) {
      if (runtimeFlags.pilot || !window.ReadableStream) return apiPost(path, payload);
      const streamPath = `${path}/stream`;
      const controller = new AbortController();
      const timeout = window.setTimeout(() => controller.abort(), 55000);
      try {
        const response = await fetch(streamPath, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
          signal: controller.signal
        });
        if (!response.ok || !response.body) return apiPost(path, payload);
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let finalData = null;
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split(/\r?\n/);
          buffer = lines.pop() || "";
          for (const line of lines) {
            const data = parseStreamLine(line);
            if (!data) continue;
            if (data.type === "delta" && data.text) onDelta?.(data.text);
            if (data.type === "reset") onDelta?.("", { reset: true });
            if (data.type === "done") finalData = data;
            if (data.type === "error") throw new Error(data.error || "生成失败");
          }
        }
        const trailing = parseStreamLine(buffer);
        if (trailing?.type === "done") finalData = trailing;
        if (!finalData?.ok) {
          onDelta?.("", { reset: true });
          return apiPost(path, payload);
        }
        logApiModel(path, payload, finalData, "stream");
        return finalData;
      } catch (error) {
        if (error.name === "AbortError") throw new Error("生成超时，请重试");
        if (isNetworkFetchError(error)) return apiPost(path, payload);
        throw new Error(normalizeFetchError(error, "请求失败"));
      } finally {
        window.clearTimeout(timeout);
      }
    }

    function parseStreamLine(line) {
      const text = String(line || "").trim();
      if (!text) return null;
      try {
        return JSON.parse(text);
      } catch {
        return null;
      }
    }

    function apiPostXHR(path, payload) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("POST", path, true);
        xhr.timeout = 45000;
        xhr.setRequestHeader("content-type", "application/json");
        xhr.onload = () => {
          let data = {};
          try {
            data = JSON.parse(xhr.responseText || "{}");
          } catch {
            reject(new Error("接口返回不是合法 JSON"));
            return;
          }
          if (xhr.status < 200 || xhr.status >= 300 || !data.ok) {
            const ray = xhr.getResponseHeader && xhr.getResponseHeader("cf-ray");
            reject(new Error(data.error || `请求失败：${xhr.status}${ray ? `（Ray: ${ray}）` : "（非 Cloudflare 响应）"}`));
            return;
          }
          logApiModel(path, payload, data, "xhr");
          resolve(data);
        };
        xhr.onerror = () => reject(new Error("XHR 网络连接失败"));
        xhr.ontimeout = () => reject(new Error("生成超时，请重试"));
        xhr.send(JSON.stringify(payload));
      });
    }

    function logApiModel(path, payload, data, transport) {
      if (!path.startsWith("/api/game/")) return;
      const model = data?.model || payload?.model;
      if (!model) return;
      const degraded = data?.degraded || data?.result?.degraded;
      console.info(`[gaokao] ${path} model: ${model}${degraded ? " (degraded)" : ""}`, { transport });
    }

    function updateStreamPreview(delta, event = {}) {
      if (event.reset) {
        resetStreamState();
        if (state.isLoading && !state.deck[state.index]) render();
        return;
      }
      state.streamText += delta;
      const nextFields = extractStreamFields(state.streamText);
      Object.keys(nextFields).forEach(key => {
        if (nextFields[key] && !state.streamFields[key]) state.streamNewFields[key] = performance.now() + 450;
      });
      state.streamFields = nextFields;
      if (state.streamRenderPending) return;
      state.streamRenderPending = true;
      window.requestAnimationFrame(() => {
        state.streamRenderPending = false;
        if (state.isLoading && !state.deck[state.index]) render();
      });
    }

    function extractStreamFields(text) {
      const sceneSection = extractPartialObjectSection(text, "scene", ["a"]);
      const leftSection = extractPartialObjectSection(text, "a", ["b"]);
      const rightSection = extractPartialObjectSection(text, "b", ["callbacks"]);
      const leftTitle = normalizeStreamChoiceTitle(extractPartialJsonString(leftSection, "title"), "A");
      const rightTitle = normalizeStreamChoiceTitle(extractPartialJsonString(rightSection, "title"), "B");
      return {
        summary: clampStreamTextBySentence(extractPartialJsonString(text, "summary"), 52, 2),
        lifeTrack: clampStreamTextBySentence(extractPartialJsonString(text, "lifeTrack"), 26, 1),
        relationshipTrack: clampStreamTextBySentence(extractPartialJsonString(text, "relationshipTrack"), 34, 1),
        sceneTitle: clampStreamTextBySentence(extractPartialJsonString(sceneSection, "title"), 10, 1),
        sceneBody: clampStreamTextBySentence(extractPartialJsonString(sceneSection, "body"), 130, 3),
        leftTitle,
        leftDesc: normalizeStreamChoiceDesc(extractPartialJsonString(leftSection, "desc"), leftTitle, "A"),
        rightTitle,
        rightDesc: normalizeStreamChoiceDesc(extractPartialJsonString(rightSection, "desc"), rightTitle, "B")
      };
    }

    function clampStreamTextBySentence(value, maxLength, maxSentences = 1) {
      const text = String(value || "").replace(/\s+/g, "").trim();
      if (!text) return "";
      const parts = text.match(/[^。！？!?；;]+[。！？!?；;]?/g) || [text];
      const joined = parts.slice(0, maxSentences).join("").replace(/[。！？!?；;]+$/g, "");
      if (joined.length <= maxLength) return joined;
      const clipped = joined.slice(0, maxLength);
      const boundary = Math.max(clipped.lastIndexOf("，"), clipped.lastIndexOf("、"), clipped.lastIndexOf("："));
      return (boundary >= Math.floor(maxLength * 0.55) ? clipped.slice(0, boundary) : clipped).replace(/[，、：。！？!?；;]+$/g, "");
    }

    function normalizeStreamChoiceTitle(value, fallback) {
      const text = String(value || "")
        .replace(new RegExp(`^${fallback}[.。]\\s*`), "")
        .replace(/[，,。.!！?？；;].*$/g, "")
        .replace(/\s+/g, "");
      return (text || fallback).slice(0, 5);
    }

    function normalizeStreamChoiceDesc(value, title, fallback) {
      const text = String(value || "")
        .replace(new RegExp(`^${fallback}[.。]\\s*`), "")
        .replace(title || "", "")
        .replace(/^[，,。.!！?？；;\s]+/, "")
        .trim();
      return text.length >= 8 ? clampStreamTextBySentence(text, 22, 1) : "";
    }

    function extractPartialObjectSection(text, key, nextKeys = []) {
      const source = String(text || "");
      const start = source.indexOf(`"${key}"`);
      if (start < 0) return "";
      const brace = source.indexOf("{", start);
      if (brace < 0) return source.slice(start);
      const nextStarts = nextKeys
        .map(nextKey => source.indexOf(`"${nextKey}"`, brace + 1))
        .filter(index => index > brace);
      const end = nextStarts.length ? Math.min(...nextStarts) : source.length;
      return source.slice(brace, end);
    }

    function extractPartialJsonString(text, key) {
      const pattern = new RegExp(`"${key}"\\s*:\\s*"((?:\\\\.|[^"\\\\])*)`);
      const match = String(text || "").match(pattern);
      if (!match) return "";
      return match[1]
        .replace(/\\"/g, "\"")
        .replace(/\\\\/g, "\\")
        .replace(/\\n/g, " ")
        .replace(/\\r/g, " ")
        .replace(/\\t/g, " ")
        .trim();
    }

    function isNetworkFetchError(error) {
      const message = error && error.message ? error.message : "";
      return message === "Failed to fetch" || message === "Load failed" || message === "NetworkError when attempting to fetch resource.";
    }

    function setSetupPending(isPending) {
      els.applyProfileButton.disabled = isPending;
      els.applyProfileButton.textContent = isPending ? "发牌中" : "开始验牌";

    function normalizeFetchError(error, fallback) {
      const message = error && error.message ? error.message : fallback;
      if (message === "Failed to fetch" || message === "Load failed") {
        return "请求没有连上当前页面服务。请确认地址是 127.0.0.1:8765，并按 Cmd+Shift+R 强刷新后重试。";
      }
      return message || fallback;
    }

    async function loadPilotCards() {
      if (state.pilotCards.length) return state.pilotCards;
      if (!state.pilotCardsPromise) {
        state.pilotCardsPromise = fetch(pilotCardsUrl, { cache: "no-store" })
          .then(response => {
            if (!response.ok) throw new Error(`试播数据加载失败：${response.status}`);
            return response.json();
          })
          .then(data => {
            const cards = Array.isArray(data.cards) ? data.cards : [];
            state.pilotCards = cards;
            state.totalYears = cards.length || 6;
            return cards;
          })
          .finally(() => {
            state.pilotCardsPromise = null;
          });
      }
      return state.pilotCardsPromise;
    }

    async function handlePilotApi(path, payload) {
      const cards = await loadPilotCards();
      if (path === "/api/game/batch") {
        const startYear = Math.max(1, Number(payload?.startYear || 1));
        const count = Math.max(1, Number(payload?.count || 1));
        return {
          ok: true,
          cards: cards.slice(startYear - 1, startYear - 1 + count)
        };
      }
      if (path === "/api/game/result") {
        return {
          ok: true,
          result: buildPilotResult()
        };
      }
      if (path === "/api/game/start") {
        return {
          ok: true,
          card: cards[0] || null
        };
      }
      if (path === "/api/game/next") {
        const year = Math.max(1, Number(payload?.year || (payload?.history?.length || 0) + 1));
        return {
          ok: true,
          card: cards[year - 1] || null
        };
      }
      throw new Error("试播模式下不支持这个接口");
    }
