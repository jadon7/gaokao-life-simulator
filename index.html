<!doctype html>
<html lang="zh-CN" data-flow="entry">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" id="themeColor" content="#ffffff" />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="apple-touch-icon" href="assets/favicon.png" />
  <!-- Noto Sans SC：从 Google Fonts CDN 加载，加载不到则按字体栈回退系统字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300..700&display=swap" />
  <title>人生扭蛋机 · 十八张牌的人生</title>
  <style>
    @property --play-top {
      syntax: "<color>";
      inherits: true;
      initial-value: #5fecd4;
    }

    :root {
      --screen-h: calc(var(--vh, 1vh) * 100);
      --font-display: "Noto Sans SC", "PingFang SC", "HarmonyOS Sans SC", "Source Han Sans SC", system-ui, sans-serif;
      --font-ui: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
      --font-num: "Noto Sans SC", "PingFang SC", system-ui, sans-serif;
      --ink-strong: rgba(26, 35, 52, 0.96);
      --ink-soft: rgba(84, 96, 118, 0.76);
      --blue-hi: #3698ff;
      --blue-lo: #1677ff;
      --shell-w: 430px;
      font-family: var(--font-ui);
    }

    @supports (height: 100dvh) {
      :root {
        --screen-h: 100dvh;
      }
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      overflow-x: clip;
    }

    /* iOS Safari：把完整渐变铺到画布(html)上，状态栏区域接渐变顶色、底部工具栏/回弹区接渐变底色 */
    html {
      background: #ffffff;
    }

    html[data-flow="entry"] {
      background:
        radial-gradient(722px 915px at calc(50% + 165px) 60px, rgba(52, 125, 245, 0.14), rgba(52, 125, 245, 0) 24%),
        radial-gradient(1000px 1160px at calc(50% - 144px) 60px, rgba(81, 199, 174, 0.5), rgba(81, 199, 174, 0) 27%),
        #ffffff;
    }

    html[data-flow="setup"] {
      background: linear-gradient(180deg, #62cfec 0%, #ffffff 91.26%);
    }

    html[data-flow="play"] {
      background: linear-gradient(180deg, var(--play-top, #5fecd4) 0%, #ffffff 100%);
      transition: --play-top 1.6s ease;
    }

    html[data-flow="result"] {
      background: var(--result-bg, linear-gradient(191.79deg, #ffc465 18.99%, #5fc9d3 58.8%, #e9f9e6 99.67%));
    }

    body {
      min-height: var(--screen-h);
      color: var(--ink-strong);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      /* 禁用移动端双击放大，同时消除 300ms 点击延迟 */
      touch-action: manipulation;
    }

    button {
      font-family: inherit;
      border: 0;
      background: none;
      cursor: pointer;
      color: inherit;
      padding: 0;
    }

    input {
      font-family: inherit;
      outline: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    body[data-dev-tools="false"] .dev-only {
      display: none !important;
    }

    .legacy-hidden {
      display: none !important;
    }

    /* iOS 触感 hack：隐藏的 switch 控件，click() 触发系统触感 */
    .haptic-switch {
      position: fixed;
      left: -20px;
      top: -20px;
      width: 1px;
      height: 1px;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
    }

    /* ====== flow visibility ====== */
    .screen {
      display: none;
      width: 100%;
      max-width: var(--shell-w);
      margin: 0 auto;
      min-height: var(--screen-h);
      padding: 64px 24px calc(24px + env(safe-area-inset-bottom, 0px));
      position: relative;
      flex-direction: column;
      gap: 24px;
      overflow-x: clip;
      isolation: isolate;
    }

    body[data-flow="entry"] .entry-screen {
      display: flex;
    }

    body[data-flow="setup"] .setup-screen {
      display: flex;
    }

    body[data-flow="play"] .play-screen {
      display: flex;
    }

    .result-sheet {
      display: none;
    }

    body[data-flow="result"] .result-sheet {
      display: block;
    }

    body[data-flow="result"] .app {
      display: none;
    }

    /* page backgrounds follow the active flow */
    body[data-flow="entry"] {
      background:
        radial-gradient(722px 915px at calc(50% + 165px) 60px, rgba(52, 125, 245, 0.14), rgba(52, 125, 245, 0) 24%),
        radial-gradient(1000px 1160px at calc(50% - 144px) 60px, rgba(81, 199, 174, 0.5), rgba(81, 199, 174, 0) 27%),
        #ffffff;
    }

    body[data-flow="setup"] {
      background: linear-gradient(180deg, #62cfec 0%, #ffffff 91.26%) fixed;
    }

    body[data-flow="play"] {
      background: linear-gradient(180deg, var(--play-top, #5fecd4) 0%, #ffffff 100%) fixed;
      transition: --play-top 1.6s ease;
    }

    /* 顶部颜色的环境光呼吸动画 */
    .play-screen::before {
      content: "";
      position: absolute;
      inset: -10% -30% 40%;
      z-index: -1;
      background: radial-gradient(56% 44% at 32% 14%, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0) 70%);
      animation: play-glow 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes play-glow {
      from {
        transform: translate3d(-7%, 0, 0) scale(1);
        opacity: 0.55;
      }
      to {
        transform: translate3d(9%, 3%, 0) scale(1.12);
        opacity: 0.95;
      }
    }

    /* 除结果页外禁用页面上下滚动（小屏内容超高时退化为内部滚动） */
    body[data-flow="entry"],
    body[data-flow="setup"],
    body[data-flow="play"] {
      height: var(--screen-h);
      overflow: hidden;
      overscroll-behavior: none;
    }

    .entry-screen,
    .setup-screen {
      height: var(--screen-h);
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    body[data-flow="result"] {
      background: var(--result-bg, linear-gradient(191.79deg, #ffc465 18.99%, #5fc9d3 58.8%, #e9f9e6 99.67%)) fixed;
      height: var(--screen-h);
      overflow: hidden;
      overscroll-behavior: none;
    }

    html[data-result-primary="R"] {
      --result-bg: linear-gradient(193.81deg, #91c6fb 19.38%, #99ffb7 55.3%, #eeffea 80.27%);
      --result-head-color: #113365;
      --result-theme-color: #eeffea;
    }

    html[data-result-primary="C"] {
      --result-bg: linear-gradient(193.81deg, #b2f99c 19.38%, #fff899 55.3%, #ebffea 80.27%);
      --result-head-color: #293b01;
      --result-theme-color: #ebffea;
    }

    html[data-result-primary="E"] {
      --result-bg: linear-gradient(193.81deg, #ff9090 19.38%, #cf99ff 55.3%, #fff3ea 80.27%);
      --result-head-color: #4e1300;
      --result-theme-color: #fff3ea;
    }

    html[data-result-primary="I"] {
      --result-bg: linear-gradient(193.81deg, #d694ef 19.38%, #99a3ff 55.3%, #fff3ea 80.27%);
      --result-head-color: #350049;
      --result-theme-color: #fff3ea;
    }

    html[data-result-primary="S"] {
      --result-bg: linear-gradient(193.81deg, #94efe2 19.38%, #999cff 55.3%, #eaf8ff 80.27%);
      --result-head-color: #00494b;
      --result-theme-color: #eaf8ff;
    }

    /* ====== shared atoms ====== */
    .badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 13px;
      line-height: 13px;
      font-weight: 900;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .badge-dark {
      background: rgba(28, 37, 55, 0.94);
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(28, 37, 55, 0.1);
    }

    .badge-white {
      background: #ffffff;
      color: #6fd3ee;
      filter: drop-shadow(0 10px 10px rgba(28, 37, 55, 0.1));
    }

    .screen-head {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .display-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(31px, 9.3vw, 38px);
      font-weight: 500;
      line-height: 1.2;
      color: var(--ink-strong);
    }

    .display-title.on-blue {
      color: #ffffff;
      font-weight: 500;
    }

    .entry-screen .display-title {
      display: flex;
      flex-direction: column;
    }

    .entry-screen .display-title span {
      white-space: nowrap;
    }

    .display-sub {
      margin: 4px 0 0;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 500;
      line-height: 26.7px;
      color: var(--ink-soft);
    }

    .flow-hint {
      display: block;
      text-align: center;
      font-size: 14px;
      font-weight: 400;
      color: rgba(84, 96, 118, 0.72);
      opacity: 0.7;
      position: relative;
      z-index: 260;
    }

    .persona-flow .flow-hint {
      display: none;
    }

    .major-flow .flow-hint {
      margin-top: 0;
    }

    .pill-input {
      width: 100%;
      height: 58px;
      min-height: 48px;
      padding: 1px 25px;
      border-radius: 64px;
      border: 1px solid rgba(67, 82, 111, 0.1);
      background: rgba(67, 82, 111, 0.08);
      font-size: 16px;
      font-weight: 500;
      color: #1c2537;
      -webkit-appearance: none;
      appearance: none;
    }

    .pill-input::placeholder {
      color: rgba(117, 117, 117, 0.55);
      font-weight: 500;
    }

    .pill-input:focus {
      border-color: rgba(52, 125, 245, 0.45);
      background: rgba(67, 82, 111, 0.1);
    }

    .cta-button {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 58px;
      padding: 17.78px 18px 18.22px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--blue-hi) 0%, var(--blue-lo) 100%);
      box-shadow:
        0 18px 18px rgba(22, 119, 255, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.32);
      color: #ffffff;
      font-size: 18px;
      font-weight: 500;
      line-height: 21.96px;
      text-align: center;
      transition: transform 0.15s ease, filter 0.2s ease;
    }

    .cta-button:active {
      transform: translateY(1px) scale(0.99);
    }

    .cta-button:disabled {
      background: #dde1e8;
      color: rgba(60, 70, 90, 0.4);
      box-shadow: none;
      filter: none;
      cursor: not-allowed;
    }

    .cta-button:disabled:active {
      transform: none;
    }

    /* ============================================================
       ENTRY
       ============================================================ */
    .entry-screen .head-copy {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .persona-flow {
      flex: 0 0 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 0;
      padding: 8px 0 0;
      width: 100%;
    }

    .persona-coverflow {
      position: relative;
      width: 100%;
      height: auto;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .persona-ring {
      display: none;
    }

    .persona-grid {
      display: flex;
      justify-content: center;
      gap: 12px;
      width: 100%;
    }

    .gender-card {
      flex: 1 1 0;
      min-width: 0;
      height: auto;
      min-height: 0;
      padding: 4px;
      border: 3px solid #f4f4f4;
      border-radius: 24px;
      background: #f4f4f4;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #000000;
      transition: transform 0.16s ease, border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .gender-card:active {
      transform: translateY(1px) scale(0.99);
    }

    .gender-card.is-active {
      border: 3px solid #2485ff;
      background: rgba(36, 133, 255, 0.1);
      box-shadow: none;
    }

    .gender-head {
      width: 100%;
      height: 158px;
      flex: 0 0 158px;
      border-radius: 20px;
      background: rgba(151, 170, 200, 0.14) var(--gender-photo) center top / cover no-repeat;
      box-shadow: inset 0 0 0 1px rgba(67, 82, 111, 0.08);
    }

    .gender-card b {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 450;
      line-height: 19px;
      color: #000000;
    }

    .gender-card span:last-child {
      display: none;
    }

    .persona-card {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 128px;
      height: 174px;
      margin: -87px 0 0 -64px;
      border-radius: 26px;
      border: 3px solid #ffffff;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 18px 38px rgba(53, 68, 96, 0.11);
      overflow: hidden;
      transition: transform 0.42s cubic-bezier(0.22, 0.85, 0.3, 1), opacity 0.3s ease, box-shadow 0.3s ease;
      will-change: transform;
    }

    .persona-card.no-anim {
      transition: none;
    }

    .persona-card.is-active {
      box-shadow: 0 24px 54px rgba(0, 53, 62, 0.24);
    }

    .persona-card .persona-photo {
      position: absolute;
      inset: -3px;
      border-radius: 24px;
      background-color: rgba(151, 170, 200, 0.14);
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      filter: var(--persona-filter, none);
      transform: scale(1.05);
    }

    .persona-card .persona-photo:not(.is-img-ready) {
      animation: sk-pulse 1.6s ease-in-out infinite;
    }

    .persona-card .persona-photo.img-reveal {
      animation: img-fade-in 0.5s ease;
    }

    .persona-card .persona-body {
      display: none;
    }

    .entry-bottom {
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      min-height: 0;
      gap: 8px;
      width: 100%;
    }

    .entry-bottom .cta-button {
      margin-top: auto;
    }

    .entry-disclaimer {
      margin: 0 auto;
      max-width: 329px;
      padding-top: 0;
      font-size: 12px;
      font-weight: 500;
      line-height: 20.4px;
      text-align: center;
      color: rgba(84, 96, 118, 0.4);
    }

    /* ============================================================
       SETUP
       ============================================================ */
    .setup-screen {
      padding-top: 40px;
      padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
      gap: 16px;
    }

    .setup-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1 0 auto;
      min-height: 0;
    }

    .major-flow {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
    }

    .major-coverflow {
      position: relative;
      width: 100%;
      height: 156px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* 提示卡：不分上下区，整卡居中，图标 + 文案 */
    .major-chip.major-chip-hint {
      justify-content: center;
      align-items: center;
      padding: 0;
      gap: 16px;
    }
    .major-chip.major-chip-hint .hint-arrow { width: 42px; height: 42px; flex: none; }
    .major-chip.major-chip-hint .hint-text {
      font-family: "Noto Sans SC", sans-serif;
      font-weight: 600;
      font-size: 17px;
      line-height: 130%;
      text-align: center;
      color: #1c2537;
      opacity: 0.5;
    }

    .major-chip {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 180px;
      height: 150px;
      margin: -75px 0 0 -90px;
      display: flex;
      flex-direction: column;
      border-radius: 24px;
      border: 3px solid #ffffff;
      background: rgba(255, 255, 255, 0.86);
      -webkit-backdrop-filter: blur(11px);
      backdrop-filter: blur(11px);
      box-shadow: 0 30px 64px rgba(31, 45, 76, 0.1);
      overflow: hidden;
      text-align: left;
      transition: transform 0.42s cubic-bezier(0.22, 0.85, 0.3, 1), opacity 0.3s ease;
      will-change: transform;
    }

    .major-chip.no-anim {
      transition: none;
    }

    .major-chip .cf-art {
      flex: 1 0 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(140% 120% at 50% 24%, var(--mj-a, #f0f9ff) 0%, var(--mj-b, #c6deff) 100%);
      border-radius: 0;
    }

    .major-chip .cf-art img,
    .major-chip .cf-art svg {
      width: 60px;
      height: 66px;
      object-fit: contain;
      overflow: visible;
    }

    .major-chip .cf-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px;
    }

    .major-chip .cf-body b {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      line-height: 1;
      color: rgba(28, 37, 55, 0.94);
      white-space: nowrap;
    }

    .major-chip .cf-body span {
      font-family: var(--font-display);
      font-size: 10.5px;
      font-weight: 500;
      line-height: 14.7px;
      color: rgba(84, 96, 118, 0.72);
    }

    .setup-fields {
      display: flex;
      flex-direction: column;
      gap: 30px;
      padding: 12px 0;
      width: 100%;
    }

    .field-row {
      display: flex;
      gap: 13px;
      width: 100%;
      padding-top: 36px;
    }

    .field-row .pill-input {
      flex: 1 1 0;
      min-width: 0;
      background: rgba(67, 82, 111, 0.12);
      font-size: 15px;
    }

    .field-row .pill-input::placeholder {
      color: #7095a1;
    }

    .hope-block {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hope-label {
      width: 100%;
      font-size: 14px;
      font-weight: 400;
      text-align: center;
      color: rgba(84, 96, 118, 0.72);
    }

    .hope-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .hope-options button {
      height: 48px;
      min-height: 44px;
      border-radius: 14px;
      background: #f7f9fc;
      border: 1px solid rgba(67, 82, 111, 0.1);
      font-size: 14px;
      font-weight: 700;
      line-height: 16.52px;
      color: rgba(36, 47, 66, 0.76);
      text-align: center;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }

    .hope-options button.is-active {
      background: #e7f0ff;
      border-color: rgba(52, 125, 245, 0.5);
      color: #176de4;
    }

    .setup-spacer {
      flex: 1 0 0;
      min-height: 0;
    }

    .setup-error {
      display: none;
      font-size: 13px;
      line-height: 1.5;
      color: #c2412d;
      background: rgba(255, 235, 230, 0.92);
      border: 1px solid rgba(194, 65, 45, 0.22);
      border-radius: 14px;
      padding: 10px 14px;
    }

    .setup-error.is-visible {
      display: block;
    }

    /* ============================================================
       PLAY
       ============================================================ */
    .play-screen {
      height: var(--screen-h);
      overflow: hidden;
      gap: 24px;
      padding-top: 24px;
      padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
    }

    .play-head {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      flex: 0 0 auto;
    }

    .play-head-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      width: 100%;
    }

    .play-brand {
      display: flex;
      flex-direction: column;
      min-width: 0;
      color: #ffffff;
    }

    .play-brand small {
      font-size: 11px;
      font-weight: 700;
      line-height: 12px;
    }

    .play-brand .play-year {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 400;
      line-height: 1.2;
      white-space: nowrap;
      display: inline-flex;
      align-items: baseline;
    }

    .play-brand .play-year-count {
      font-size: 16px;
      font-weight: 500;
      line-height: 1;
      margin-left: 1px;
    }

    .undo-button {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      min-width: 86px;
      padding: 10px 13px;
      border-radius: 999px;
      border: 1px solid rgba(253, 254, 254, 0.55);
      background: rgba(255, 255, 255, 0);
      -webkit-backdrop-filter: blur(7px);
      backdrop-filter: blur(7px);
      color: #f7fdfe;
      font-size: 11px;
      font-weight: 700;
      line-height: 13.42px;
      white-space: nowrap;
      transition: opacity 0.2s ease, background 0.2s ease;
    }

    .undo-button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .undo-button:not(:disabled):active {
      background: rgba(255, 255, 255, 0.18);
    }

    .play-track {
      width: 100%;
      height: 5px;
      border-radius: 999px;
      background: rgba(26, 41, 66, 0.08);
      overflow: hidden;
    }

    .play-track span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: #ffffff;
      box-shadow: 0 1px 3px rgba(16, 56, 50, 0.18);
      transition: width 0.4s ease;
    }

    .deck-shell {
      flex: 1 1 0;
      min-height: 0;
      position: relative;
      width: 100%;
    }

    .card-stack {
      position: relative;
      width: 100%;
      height: 100%;
      isolation: isolate;
    }

    .life-card {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 17px;
      border-radius: 34px;
      border: 1px solid rgba(255, 255, 255, 0.86);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94) 0%, rgba(248, 251, 255, 0.9) 100%);
      box-shadow:
        0 18px 44px rgba(48, 64, 92, 0.15),
        inset 0 1px 0 1px rgba(255, 255, 255, 0.9);
      overflow: visible;
      touch-action: none;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .life-card.behind-one {
      transform: rotate(3.87deg);
      z-index: -1;
      pointer-events: none;
    }

    .life-card.behind-two {
      transform: rotate(-2.6deg) scale(0.985);
      z-index: -2;
      opacity: 0.85;
      pointer-events: none;
    }

    .life-card .previous-note {
      transition: opacity 0.3s ease 0.12s;
    }

    .life-card.behind-one .previous-note,
    .life-card.behind-two .previous-note {
      opacity: 0;
    }

    .life-card.is-exiting-left {
      animation: card-exit-left 0.38s ease forwards;
      z-index: 10;
    }

    .life-card.is-exiting-right {
      animation: card-exit-right 0.38s ease forwards;
      z-index: 10;
    }

    @keyframes card-content-in {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes card-exit-left {
      to {
        transform: translate(-130%, -6%) rotate(-14deg);
        opacity: 0;
      }
    }

    @keyframes card-exit-right {
      to {
        transform: translate(130%, -6%) rotate(14deg);
        opacity: 0;
      }
    }

    .card-head {
      display: flex;
      flex-direction: column;
      gap: 0;
      flex: 0 0 auto;
    }

    .year-badge {
      position: relative;
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: 100%;
      padding: 5.5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      background: #253041;
      box-shadow:
        0 6px 7px rgba(16, 24, 36, 0.06),
        inset 0 1px 0 rgba(255, 255, 255, 0.55);
      color: #feffff;
      font-size: 10.5px;
      font-weight: 900;
      line-height: 12px;
      letter-spacing: 0.21px;
      white-space: nowrap;
    }

    .card-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 450;
      line-height: 1.2;
      color: var(--ink-strong);
    }

    .card-illustration {
      flex: 1 1 120px;
      min-height: 72px;
      border-radius: 27px;
      border: 1px solid rgba(255, 255, 255, 0.54);
      box-shadow: inset 0 1px 0 1px rgba(255, 255, 255, 0.46);
      background-color: rgba(227, 235, 246, 0.78);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .life-card .card-illustration:not(.is-img-ready) {
      background-image: linear-gradient(135deg, rgba(238, 244, 252, 0.92), rgba(218, 228, 241, 0.72));
    }

    .life-card.layout-balanced .card-illustration {
      flex-basis: 96px;
      min-height: 56px;
    }

    .life-card.layout-reading .card-illustration {
      flex-basis: 64px;
      min-height: 38px;
    }

    /* 文案永不截断：空间不够时压缩插画（flex 1）而不是裁文字 */
    .card-prompt {
      margin: 0;
      flex: 0 0 auto;
      min-height: max-content;
      font-size: 16px;
      font-weight: 500;
      line-height: 1.6;
      color: #182235;
    }

    .choice-preview {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      flex: 0 0 auto;
      min-height: max-content;
    }

    .choice-pill {
      flex: 1 1 0;
      min-width: 0;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 11px 14px;
      border-radius: 22px;
      text-align: left;
      transition: transform 0.18s ease, background-color 0.26s ease, color 0.26s ease;
    }

    .choice-pill.left {
      background: rgba(26, 145, 255, 0.1);
      color: #1a91ff;
    }

    .choice-pill.right {
      background: rgba(46, 185, 150, 0.1);
      color: #2eb996;
      text-align: right;
    }

    .choice-pill b {
      display: block;
      max-width: 100%;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.35;
      white-space: nowrap;
    }

    .choice-pill span,
    .choice-pill strong {
      font-size: 11px;
      font-weight: 400;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .choice-pill.left:not(:disabled):active,
    .choice-pill.left.is-active {
      background: #1a91ff;
      color: #ffffff;
    }

    .choice-pill.right:not(:disabled):active,
    .choice-pill.right.is-active {
      background: #2eb996;
      color: #ffffff;
    }

    .choice-pill:disabled {
      opacity: 0.55;
      cursor: default;
    }

    /* 滑动方向的卡面淡色染色 */
    .life-card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 34px;
      background: transparent;
      opacity: 0;
      transition: opacity 0.28s ease, background-color 0.28s ease;
      pointer-events: none;
      z-index: 5;
    }

    .life-card.tilt-left::after {
      background: #1a91ff;
      opacity: 0.1;
    }

    .life-card.tilt-right::after {
      background: #2eb996;
      opacity: 0.1;
    }

    .previous-note {
      position: absolute;
      top: 28px;
      right: -14px;
      width: 152px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid #ffffff;
      background: #faf9f4;
      transform: rotate(9.36deg);
      box-shadow: -20px 22px 10.55px rgba(0, 0, 0, 0.18);
      z-index: 8;
      pointer-events: none;
    }

    .previous-note .pin {
      position: absolute;
      top: -5px;
      left: 30px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2eb996;
      transform: rotate(-9.36deg);
    }

    .previous-note b {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.2;
      color: #2f362d;
    }

    .previous-note span {
      font-size: 10px;
      font-weight: 500;
      line-height: 1.6;
      color: #8b8f89;
      overflow-wrap: anywhere;
    }

    /* loading card */
    .loading-card .card-illustration {
      position: relative;
      overflow: hidden;
    }

    .stream-placeholder {
      display: inline-block;
      height: 1em;
      border-radius: 999px;
      background: rgba(224, 230, 239, 0.54);
      color: transparent;
      overflow: hidden;
      vertical-align: middle;
    }

    .card-title .stream-placeholder {
      width: min(8em, 68%);
    }

    .card-prompt .stream-placeholder {
      width: 100%;
      height: 5.2em;
      border-radius: 14px;
    }

    .choice-pill .stream-placeholder {
      width: min(8em, 100%);
    }

    .stream-field.is-stream-new {
      animation: stream-field-in 0.42s ease both;
    }

    @keyframes stream-field-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .loading-card .card-illustration::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, rgba(255, 255, 255, 0) 30%, rgba(255, 255, 255, 0.5) 50%, rgba(255, 255, 255, 0) 70%);
      transform: translateX(-100%);
      animation: card-sheen 1.4s ease infinite;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes card-sheen {
      to {
        transform: translateX(100%);
      }
    }

    .card-loading-orbit {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 5px;
      z-index: 2;
    }

    .card-loading-orbit i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #2eb996;
      animation: orbit-bounce 1s ease-in-out infinite;
    }

    .card-loading-orbit i:nth-child(2) {
      animation-delay: 0.16s;
      background: #1a91ff;
    }

    .card-loading-orbit i:nth-child(3) {
      animation-delay: 0.32s;
      background: #ffc465;
    }

    @keyframes orbit-bounce {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.6;
      }
      50% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    /* 占位骨架卡：内容未加载时垫在牌堆后面 */
    .ghost-card {
      pointer-events: none;
    }

    .sk {
      display: block;
      border-radius: 999px;
      background: rgba(224, 230, 239, 0.54);
      animation: sk-pulse 1.6s ease-in-out infinite;
    }

    .sk-badge {
      width: 132px;
      height: 23px;
    }

    .sk-title-bar {
      width: 62%;
      height: 34px;
      border-radius: 12px;
      animation-delay: 0.1s;
    }

    .sk-illus {
      flex: 1 1 0;
      min-height: 0;
      border-radius: 27px;
      animation-delay: 0.2s;
    }

    .sk-line {
      height: 14px;
      width: 100%;
      animation-delay: 0.3s;
    }

    .sk-line.short {
      width: 62%;
    }

    @keyframes sk-pulse {
      0%, 100% {
        opacity: 0.5;
      }
      50% {
        opacity: 1;
      }
    }

    /* ============================================================
       RESULT
       ============================================================ */
    .result-sheet {
      position: relative;
      height: var(--screen-h);
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      z-index: 40;
    }

    .result-card {
      width: 100%;
      max-width: var(--shell-w);
      min-height: var(--screen-h);
      margin: 0 auto;
      padding: 64px 24px calc(118px + env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* 仅在导出结果长图时给卡片自身铺上渐变背景 */
    .result-card.is-capturing {
      background: var(--result-bg, linear-gradient(191.79deg, #ffc465 18.99%, #5fc9d3 58.8%, #e9f9e6 99.67%));
    }

    /* 截图时隐藏按钮 */
    .result-card.is-capturing .result-actions { display: none; }

    .result-card.is-capturing,
    .result-card.is-capturing * {
      animation: none !important;
      transition: none !important;
    }

    .result-card.is-capturing .glass-section {
      -webkit-backdrop-filter: none !important;
      backdrop-filter: none !important;
      background: linear-gradient(180deg, #ffffff 0%, #f7faff 100%);
      box-shadow: 0 10px 24px rgba(52, 68, 98, 0.08);
    }

    .result-card.is-capturing .ability-section {
      filter: none;
      box-shadow: 0 10px 24px rgba(52, 68, 98, 0.08);
    }

    .result-card.is-capturing .ability-art {
      filter: none;
    }

    /* 流式生成期间隐藏操作按钮，避免分享到不完整结果 */
    .result-card.is-streaming .result-actions { display: none; }

    /* 结果页卡片轻微倾斜，自上而下依次 +1° / -1° */
    #resultOverview .glass-section { transform: rotate(1deg); }
    #resultInsights .ability-section { transform: rotate(-1deg); }
    #resultInsights .yearning-section { transform: rotate(1deg); }
    #resultHighlights .glass-section:nth-of-type(1) { transform: rotate(-1deg); }
    #resultHighlights .glass-section:nth-of-type(2) { transform: rotate(1deg); }
    #resultHighlights .glass-section:nth-of-type(3) { transform: rotate(-1deg); }
    #resultGuides .glass-section:nth-of-type(1) { transform: rotate(1deg); }
    #resultGuides .glass-section:nth-of-type(2) { transform: rotate(-1deg); }

    /* 人格卡（六维）是本地数据，用渐显 + 柱状逐条生长伪装成流式生成 */
    @keyframes faux-fade-up { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes faux-bar-grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    .ability-section.is-faux-stream .ability-top { animation: faux-fade-up 0.4s ease 0.05s backwards; }
    .ability-section.is-faux-stream .ability-intro { animation: faux-fade-up 0.4s ease 0.12s backwards; }
    .ability-section.is-faux-stream .ability-radar-wrap { animation: faux-fade-up 0.45s ease 0.18s backwards; }
    .ability-section.is-faux-stream .ability-trend-body { animation: faux-fade-up 0.4s ease 1s backwards; }
    .ability-section.is-faux-stream .ability-row { animation: faux-fade-up 0.4s ease backwards; }
    .ability-section.is-faux-stream .ability-track span { transform-origin: left center; animation: faux-bar-grow 0.7s cubic-bezier(0.2, 0.7, 0.2, 1) backwards; }
    .ability-section.is-faux-stream .ability-row:nth-child(1),
    .ability-section.is-faux-stream .ability-row:nth-child(1) .ability-track span { animation-delay: 0.30s; }
    .ability-section.is-faux-stream .ability-row:nth-child(2),
    .ability-section.is-faux-stream .ability-row:nth-child(2) .ability-track span { animation-delay: 0.40s; }
    .ability-section.is-faux-stream .ability-row:nth-child(3),
    .ability-section.is-faux-stream .ability-row:nth-child(3) .ability-track span { animation-delay: 0.50s; }
    .ability-section.is-faux-stream .ability-row:nth-child(4),
    .ability-section.is-faux-stream .ability-row:nth-child(4) .ability-track span { animation-delay: 0.60s; }
    .ability-section.is-faux-stream .ability-row:nth-child(5),
    .ability-section.is-faux-stream .ability-row:nth-child(5) .ability-track span { animation-delay: 0.70s; }
    .ability-section.is-faux-stream .ability-row:nth-child(6),
    .ability-section.is-faux-stream .ability-row:nth-child(6) .ability-track span { animation-delay: 0.80s; }

    /* 「保存关键信息」：只保留到六维图（ability-section）那张卡 */
    .result-card.capture-key .yearning-section,
    .result-card.capture-key #resultHighlights,
    .result-card.capture-key #resultGuides { display: none; }

    .result-title .sk {
      display: block;
      width: 46%;
      height: 30px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.45);
    }

    .result-title .sk + .sk {
      width: 72%;
      margin-top: 8px;
      animation-delay: 0.15s;
    }

    .result-eyebrow {
      background: #11161e;
      color: rgba(255, 255, 255, 0.92);
      font-size: 12px;
      letter-spacing: 0.48px;
      padding: 8px 12px;
      box-shadow: none;
    }

    .result-title {
      margin: 0;
      font-size: 33px;
      font-weight: 700;
      line-height: 1.1;
      color: var(--result-head-color, #6c4507);
    }

    .result-title span {
      display: block;
    }

    .result-hero {
      position: relative;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      /* 副标题与标签直接落在渐变背景上，不再包玻璃卡 */
      padding: 0;
      border: 0;
      background: none;
      box-shadow: none;
      border-radius: 0;
      overflow: visible;
    }

    .result-hero-img {
      display: none;
    }

    /* 结果就绪后：结果信息与各段文案一起错峰淡入 */
    .result-card.is-loading .result-eyebrow,
    .result-card.is-loading .result-actions {
      display: none;
    }

    .result-card.is-revealed .result-eyebrow,
    .result-card.is-revealed .result-title {
      animation: card-content-in 0.45s ease backwards;
    }

    .result-card.is-revealed .result-hero {
      animation: card-content-in 0.45s ease 0.06s backwards;
    }

    .result-card.is-revealed .result-block {
      animation: card-content-in 0.45s ease backwards;
    }

    .result-card.is-revealed #resultOverview {
      animation-delay: 0.12s;
    }

    .result-card.is-revealed #resultInsights {
      animation-delay: 0.18s;
    }

    .result-card.is-revealed #resultHighlights {
      animation-delay: 0.24s;
    }

    .result-card.is-revealed #resultGuides {
      animation-delay: 0.3s;
    }

    .result-card.is-revealed .result-actions {
      animation: card-content-in 0.45s ease 0.36s backwards;
    }

    .result-hero::after {
      display: none;
    }

    .result-hero > * {
      position: relative;
      z-index: 2;
    }

    .result-hero .result-hero-img {
      display: none;
    }

    .result-portrait {
      display: none;
    }

    .result-status-text {
      margin: 0;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.4;
      letter-spacing: -0.15px;
      color: var(--result-head-color, #6c4507);
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.22);
    }

    .result-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      height: auto;
      overflow: visible;
    }

    body[data-flow="result"] .result-chips .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 11px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: var(--result-head-color, #6c4507);
      background: #fff;
      white-space: nowrap;
    }

    .result-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* glass section card */
    .glass-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 17px;
      border-radius: 28px;
      border: 1px solid rgba(84, 100, 130, 0.12);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.86) 0%, rgba(244, 248, 255, 0.68) 100%);
      -webkit-backdrop-filter: blur(11px);
      backdrop-filter: blur(11px);
      box-shadow:
        0 18px 44px rgba(52, 68, 98, 0.12),
        0 2px 8px rgba(52, 68, 98, 0.05);
    }

    .glass-section > h3 {
      margin: 0;
      font-size: 21px;
      font-weight: 400;
      line-height: 26.25px;
      color: #000000;
    }

    /* career probability */
    .career-probability {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .career-summary {
      margin: 0;
      font-size: 13.5px;
      font-weight: 500;
      line-height: 22.28px;
      color: #4d5a70;
    }

    .career-cards {
      display: flex;
      gap: 8px;
    }

    .career-card {
      flex: 1 1 0;
      min-width: 0;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      justify-content: center;
      padding: 13px;
      border-radius: 16px;
      border: 1px solid rgba(84, 100, 130, 0.12);
      text-align: center;
    }

    .career-card b {
      font-family: var(--font-num);
      font-size: 29px;
      font-weight: 700;
      line-height: 28.98px;
    }

    .career-card span {
      font-size: var(--career-label-size, 11.5px);
      font-weight: 900;
      line-height: 14.38px;
      color: #4d5a70;
      white-space: nowrap;
    }

    .career-card:nth-child(1) {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.86) 0%, rgba(244, 248, 255, 0.68) 100%);
    }

    .career-card:nth-child(1) b {
      color: #1478ff;
    }

    .career-card:nth-child(2) {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.88) 0%, rgba(228, 247, 236, 0.78) 100%);
    }

    .career-card:nth-child(2) b {
      color: #00c774;
    }

    .career-card:nth-child(3) {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.88) 0%, rgba(239, 235, 255, 0.78) 100%);
    }

    .career-card:nth-child(3) b {
      color: #0000e5;
    }

    /* RIASEC ability card */
    .ability-section {
      background: #ffffff;
      border: 1px solid rgba(84, 100, 130, 0.12);
      border-radius: 28px;
      padding: 17px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      filter: drop-shadow(0 18px 22px rgba(52, 68, 98, 0.12)) drop-shadow(0 2px 4px rgba(52, 68, 98, 0.05));
    }

    .ability-top {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      width: 100%;
    }

    .ability-copy {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ability-copy h4 {
      margin: 0;
      font-size: 33px;
      font-weight: 700;
      line-height: 1;
      color: var(--ability-accent, #0f8b8d);
      white-space: nowrap;
    }

    .ability-summary {
      margin: 0;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
      color: #433e38;
    }

    .ability-note {
      margin: 0;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.4;
      color: #8a95a8;
    }

    .ability-art {
      flex: 0 0 auto;
      width: 104px;
      height: 156px;
      margin-bottom: -37px;
      object-fit: contain;
      object-position: center bottom;
      filter: drop-shadow(0 12px 18px rgba(31, 45, 76, 0.2));
      position: relative;
      z-index: 3;
    }

    .ability-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      border-radius: 24px;
      background: linear-gradient(180deg, var(--ability-tint, #d0fff3) 0%, #ffffff 100%);
    }

    .ability-intro {
      margin: 0;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.7;
      color: #3a4150;
    }

    .ability-radar-wrap {
      display: flex;
      justify-content: center;
    }

    .ability-radar {
      width: 292px;
      max-width: 100%;
      height: auto;
    }

    .ability-radar-grid {
      fill: none;
      stroke: rgba(36, 48, 68, 0.16);
      stroke-width: 1;
    }

    .ability-radar-axis {
      stroke: rgba(36, 48, 68, 0.14);
      stroke-width: 1;
    }

    .ability-radar-label {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .ability-radar-shape {
      fill: var(--ability-accent, #0f8b8d);
      fill-opacity: 0.34;
      stroke: var(--ability-accent, #0f8b8d);
      stroke-width: 1.6;
      stroke-linejoin: round;
    }

    .ability-radar-dot {
      fill: var(--ability-accent, #0f8b8d);
      stroke: #ffffff;
      stroke-width: 1.4;
    }

    .ability-score-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .ability-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .ability-row label {
      flex: 0 0 60px;
      font-size: 13px;
      font-weight: 400;
      line-height: 18.2px;
      color: #172033;
      white-space: nowrap;
    }

    .ability-track {
      flex: 1 1 0;
      min-width: 0;
      height: 9px;
      border-radius: 999px;
      background: rgba(36, 48, 68, 0.09);
      overflow: hidden;
    }

    .ability-track span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--ability-color, #0f8b8d) 55%, #1c2430) 0%, var(--ability-color, #0f8b8d) 100%);
    }

    .ability-score {
      flex: 0 0 auto;
      min-width: 32px;
      font-size: 13px;
      font-weight: 700;
      text-align: right;
      color: var(--ability-color, #0f8b8d);
    }

    .ability-trend-body {
      margin: 0;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.7;
      color: #313847;
    }

    /* 真实的你：复用玻璃卡 + 蓝色标题 + 三张带标签小卡 */
    .yearning-head {
      display: flex;
      flex-direction: column;
    }

    .yearning-kicker {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
      color: #313847;
      opacity: 0.3;
      white-space: nowrap;
    }

    .yearning-headline {
      margin: 0;
      font-size: 21px;
      font-weight: 600;
      line-height: 26.25px;
      color: #2486ff;
    }

    .yearning-core {
      margin: 0;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.7;
      color: #313847;
    }

    .yearning-card {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
    }

    .yearning-card .yearning-label {
      flex: none;
      white-space: nowrap;
      font-weight: 600;
      line-height: 1.7;
    }

    .yearning-card p {
      margin: 0;
      flex: 1 1 0;
      min-width: 0;
      font-weight: 400;
      line-height: 1.7;
      color: #313847;
    }

    .yearning-card-choice { background: #edf6f4; }
    .yearning-card-choice .yearning-label { color: #0f8688; }
    .yearning-card-give { background: #f6f1ed; }
    .yearning-card-give .yearning-label { color: #e77f10; }
    .yearning-card-base { background: #f2edf6; }
    .yearning-card-base .yearning-label { color: #7a2ea2; }

    /* famous scenes */
    .result-scene {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5.3px;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid rgba(84, 100, 130, 0.12);
    }

    .result-scene b {
      display: inline-block;
      max-width: 100%;
      padding: 3.5px 10px;
      border-radius: 999px;
      background: #fbfcfd;
      font-size: 16px;
      font-weight: 700;
      line-height: 21.44px;
      white-space: nowrap;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    .result-scene span {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
    }

    .result-scene:nth-child(3n + 1) {
      background: #bed1ff;
    }

    .result-scene:nth-child(3n + 1) b {
      color: #527ad7;
    }

    .result-scene:nth-child(3n + 1) span {
      color: #2d3b5d;
    }

    .result-scene:nth-child(3n + 2) {
      background: #bce9ff;
    }

    .result-scene:nth-child(3n + 2) b {
      color: #4fb2e2;
    }

    .result-scene:nth-child(3n + 2) span {
      color: #1d475a;
    }

    .result-scene:nth-child(3n) {
      background: #ffddd7;
    }

    .result-scene:nth-child(3n) b {
      color: #c45c47;
    }

    .result-scene:nth-child(3n) span {
      color: #612a1f;
    }

    /* chronicle */
    .result-chronicle-item {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      padding: 2px 0 2px 17px;
      border-left: 3px solid #51b8a6;
    }

    .result-chronicle-item b {
      display: inline-block;
      max-width: 100%;
      padding: 3.3px 10px 4px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      line-height: 20.8px;
      white-space: nowrap;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    .result-chronicle-item p {
      margin: 0;
      font-size: 14px;
      font-weight: 500;
      line-height: 23.8px;
      color: #3c4049;
      opacity: 0.7;
    }

    .result-chronicle-item:nth-of-type(3n + 1) b {
      background: #bed1ff;
      color: #527ad7;
    }

    .result-chronicle-item:nth-of-type(3n + 2) b {
      background: #bce9ff;
      color: #308bb7;
    }

    .result-chronicle-item:nth-of-type(3n) b {
      background: #ffddd7;
      color: #c45c47;
    }

    /* share hooks */
    .result-hook {
      width: 100%;
      padding: 10px 14px;
      border-radius: 18px;
      border: 1px solid rgba(70, 84, 110, 0.11);
      background: rgba(22, 119, 255, 0.11);
      font-size: 13px;
      font-weight: 900;
      line-height: 17.55px;
      color: #1677ff;
      white-space: normal;
    }

    /* guides */
    .result-guide-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      padding: 15px 16px;
      border-radius: 16px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .result-guide-card b {
      display: inline-block;
      max-width: 100%;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      line-height: 19.5px;
      color: #172033;
      white-space: nowrap;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    .result-guide-card p {
      margin: 0;
      font-size: 14px;
      font-weight: 500;
      line-height: 23.52px;
      color: #3c4049;
    }

    .result-guide-card:nth-of-type(3n + 1) {
      border: 1px solid rgba(95, 141, 241, 0.18);
      background: linear-gradient(180deg, rgba(95, 141, 241, 0.09) 0%, rgba(95, 141, 241, 0.04) 100%);
    }

    .result-guide-card:nth-of-type(3n + 1) b {
      background: rgba(95, 141, 241, 0.14);
    }

    .result-guide-card:nth-of-type(3n + 2) {
      border: 1px solid rgba(96, 184, 166, 0.18);
      background: linear-gradient(180deg, rgba(96, 184, 166, 0.1) 0%, rgba(96, 184, 166, 0.04) 100%);
    }

    .result-guide-card:nth-of-type(3n + 2) b {
      background: rgba(96, 184, 166, 0.16);
    }

    .result-guide-card:nth-of-type(3n) {
      border: 1px solid rgba(244, 188, 120, 0.18);
      background: linear-gradient(180deg, rgba(244, 188, 120, 0.11) 0%, rgba(244, 188, 120, 0.04) 100%);
    }

    .result-guide-card:nth-of-type(3n) b {
      background: rgba(244, 188, 120, 0.18);
    }

    /* actions */
    .result-actions {
      display: flex;
      gap: 8px;
      position: fixed;
      left: 50%;
      bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      z-index: 55;
      width: min(calc(100vw - 32px), calc(var(--shell-w) - 32px));
      padding: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 40px rgba(31, 68, 116, 0.16);
      transform: translateX(-50%);
    }

    .result-actions button {
      flex: 1 1 0;
      min-width: 0;
      min-height: 54px;
      padding: 15px 10px;
      border-radius: 999px;
      font-size: clamp(15px, 4.1vw, 18px);
      font-weight: 500;
      line-height: 1.15;
      text-align: center;
      white-space: nowrap;
      transition: transform 0.15s ease;
    }

    .result-actions button:active {
      transform: translateY(1px);
    }

    .result-actions #saveResult {
      background: linear-gradient(180deg, var(--blue-hi) 0%, var(--blue-lo) 100%);
      color: #ffffff;
      box-shadow:
        0 18px 18px rgba(22, 119, 255, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    .result-actions #copyDebugFlow {
      background: #ffffff;
      color: #4b5870;
      box-shadow:
        0 18px 18px rgba(0, 0, 0, 0.07),
        inset 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    .result-actions #restartResult {
      background: #ffffff;
      color: #2a8cff;
      box-shadow:
        0 18px 18px rgba(0, 0, 0, 0.07),
        inset 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    /* 分享：两选项底部面板 */
    .share-sheet[hidden] { display: none; }
    .share-sheet {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .share-sheet-mask {
      position: absolute;
      inset: 0;
      background: rgba(10, 14, 20, 0.45);
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
    }
    .share-sheet-panel {
      position: relative;
      width: 100%;
      max-width: var(--shell-w);
      margin: 0 12px 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 18px 44px rgba(52, 68, 98, 0.22);
      animation: card-content-in 0.28s ease;
    }
    .share-sheet-title { margin: 4px 4px 2px; font-size: 15px; font-weight: 700; color: var(--ink-strong); }
    .share-opt {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      padding: 14px 18px;
      border-radius: 16px;
      text-align: left;
      background: linear-gradient(180deg, rgba(54, 152, 255, 0.10), rgba(22, 119, 255, 0.06));
      border: 1px solid rgba(84, 100, 130, 0.12);
      transition: transform 0.15s ease;
    }
    .share-opt b { font-size: 16px; font-weight: 600; color: var(--ink-strong); }
    .share-opt span { font-size: 12px; color: var(--ink-soft); }
    .share-opt:active { transform: translateY(1px); }
    .share-cancel { padding: 13px; border-radius: 16px; font-size: 15px; color: var(--ink-soft); background: #f3f5f8; }

    /* 分享图底部：产品域名二维码 */
    .share-qr-footer {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 8px;
      padding: 16px 18px;
      border-radius: 24px;
      border: 1px solid rgba(84, 100, 130, 0.12);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(244, 248, 255, 0.72));
    }
    .share-qr-img { width: 92px; height: 92px; flex: none; border-radius: 10px; background: #fff; }
    .share-qr-text { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .share-qr-text b { font-size: 18px; font-weight: 800; color: var(--ink-strong); }
    .share-qr-text span { font-size: 13px; color: var(--ink-soft); }
    .share-qr-domain { font-weight: 700; color: var(--blue-lo) !important; letter-spacing: 0.2px; }

    /* 分享图二级页面：全屏展示完整图片，长按保存 */
    .share-viewer[hidden] { display: none; }
    .share-viewer {
      position: fixed;
      inset: 0;
      z-index: 70;
      background: #0d0f14;
      display: flex;
      flex-direction: column;
    }
    .share-viewer-bar {
      flex: none;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top));
      color: rgba(255, 255, 255, 0.82);
    }
    .share-viewer-tip { flex: 1; min-width: 0; font-size: 14px; }
    .share-viewer-save {
      flex: none;
      color: #fff;
      font-size: 14px;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
    }
    .share-viewer-close {
      flex: none;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 18px;
      background: rgba(255, 255, 255, 0.12);
    }
    .share-viewer-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      text-align: center;
      padding: 0 12px calc(40px + env(safe-area-inset-bottom));
    }
    .share-viewer-body img { width: 100%; max-width: 480px; height: auto; display: block; margin: 0 auto; border-radius: 12px; }
    .share-viewer-loading { color: rgba(255, 255, 255, 0.7); font-size: 15px; padding: 48px 16px; }

    /* process viewer */
    .process-sheet[hidden] {
      display: none;
    }

    .process-sheet {
      position: fixed;
      inset: 0;
      z-index: 80;
      overflow-y: auto;
      padding: 20px 14px;
      background: rgba(232, 237, 246, 0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .process-panel {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 18px;
      border-radius: 24px;
      background: #f7f9fc;
      color: var(--ink);
      box-shadow: 0 24px 70px rgba(38, 54, 80, 0.2);
    }

    .process-head {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: -18px -18px 16px;
      padding: 16px 18px;
      border-radius: 24px 24px 0 0;
      background: rgba(247, 249, 252, 0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .process-head h2 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .process-head p {
      margin: 4px 0 0;
      color: #768197;
      font-size: 13px;
      line-height: 1.4;
    }

    .process-actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .process-actions button {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      background: #ffffff;
      color: #3b465c;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 10px 22px rgba(40, 56, 82, 0.1);
    }

    .process-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .process-stat {
      padding: 12px;
      border: 1px solid rgba(119, 134, 160, 0.16);
      border-radius: 14px;
      background: #ffffff;
    }

    .process-stat b {
      display: block;
      font-size: 18px;
      line-height: 1.2;
    }

    .process-stat span {
      color: #768197;
      font-size: 12px;
    }

    .process-list {
      display: grid;
      gap: 12px;
    }

    .process-item {
      overflow: hidden;
      border: 1px solid rgba(119, 134, 160, 0.16);
      border-radius: 18px;
      background: #ffffff;
    }

    .process-item-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid rgba(119, 134, 160, 0.12);
    }

    .process-item-head b {
      font-size: 16px;
      line-height: 1.35;
    }

    .process-item-head span {
      color: #7d8798;
      font-size: 12px;
      white-space: nowrap;
    }

    .process-io {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 14px;
    }

    .process-box {
      min-width: 0;
      padding: 12px;
      border-radius: 14px;
      background: #f5f7fb;
    }

    .process-box h3 {
      margin: 0 0 8px;
      font-size: 13px;
      color: #61708a;
    }

    .process-box p {
      margin: 0 0 6px;
      font-size: 13px;
      line-height: 1.55;
      color: #263043;
    }

    .process-mini {
      display: grid;
      gap: 8px;
    }

    .process-line {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      font-size: 13px;
      line-height: 1.55;
    }

    .process-label {
      color: #77839a;
      font-weight: 700;
    }

    .process-value {
      min-width: 0;
      color: #263043;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .process-chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .process-chip {
      padding: 4px 8px;
      border-radius: 999px;
      background: #eaf0f8;
      color: #526078;
      font-size: 12px;
      font-weight: 700;
    }

    .process-visual {
      display: grid;
      gap: 8px;
      max-height: 420px;
      overflow: auto;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 12px;
      background: #f5f7fb;
    }

    .process-visual .process-visual {
      max-height: none;
      margin: 6px 0 0;
      padding: 8px;
      border: 1px solid rgba(119, 134, 160, 0.12);
      background: #ffffff;
    }

    .process-array {
      display: grid;
      gap: 8px;
    }

    .process-array-item {
      padding: 8px;
      border-radius: 10px;
      background: #ffffff;
      border: 1px solid rgba(119, 134, 160, 0.12);
    }

    .process-details {
      padding: 0 14px 14px;
    }

    .process-details details {
      border-top: 1px solid rgba(119, 134, 160, 0.12);
    }

    .process-details summary {
      cursor: pointer;
      padding: 12px 0;
      color: #526078;
      font-size: 13px;
      font-weight: 600;
    }

    .process-details pre {
      max-height: 280px;
      overflow: auto;
      margin: 0 0 12px;
      padding: 12px;
      border-radius: 12px;
      background: #111827;
      color: #dbeafe;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 720px) {
      .process-panel {
        padding: 14px;
        border-radius: 20px;
      }

      .process-head {
        align-items: flex-start;
        margin: -14px -14px 14px;
        padding: 14px;
        border-radius: 20px 20px 0 0;
      }

      .process-actions {
        flex-direction: column;
      }

      .process-summary,
      .process-io {
        grid-template-columns: 1fr;
      }
    }

    /* result error */
    .result-error-card {
      gap: 16px;
      align-items: stretch;
      text-align: center;
    }

    .result-error-card p {
      margin: 0;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.7;
      color: #3c4049;
    }

    /* result loading */
    .result-loader {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;

    ];

    function getOpeningFrame(majorText) {
      const value = String(majorText || "");
      return openingFrames.find(frame => frame.match.test(value)) || openingFrames[openingFrames.length - 1];
    }

    function applyCastToTemplateText(value, cast = getStoryCast()) {
      return String(value || "")
        .replaceAll("__RELATION__", cast.relationName)
        .replaceAll("__ROOMMATE__", "室友")
        .replaceAll("__MENTOR__", "老师");
    }

    function fixedMainTrack(template) {
      const text = `${template.title}${template.prompt}`;
      if (/婚礼|搭子|借钱|破冰|朋友圈|同学突然爆红|饭局点名|朋友|家里|亲戚/.test(text)) return "relationship";
      if (/体检|作息|熬夜/.test(text)) return "health";
      return "life";
    }

    function buildFixedTracks(yearNumber, template) {
      const cast = getStoryCast();
      const scoreBands = ["前25%", "前20%", "前15%", "前12%"];
      const lifeTemplates = [
        `专业主线没掉，成绩稳在${scoreBands[yearNumber % scoreBands.length]}`,
        "专业课老师记住了你的名字，开始把细活交给你",
        `你把课表重新排过，作息终于没再一路失控`
      ];
      const relationshipTemplates = [
        `${cast.relationIntro}记住了你下课时间，偶尔给你留座`,
        `${cast.relationIntro}说你太忙，却还是会给你留消息`,
        `${cast.relationIntro}没催你回复，但开始把你排进周末`
      ];
      const mainTrack = fixedMainTrack(template);
      return {
        mainTrack: mainTrack === "relationship" ? "relationship" : "life",
        lifeTrack: lifeTemplates[yearNumber % lifeTemplates.length],
        relationshipTrack: relationshipTemplates[(yearNumber + 1) % relationshipTemplates.length]
      };
    }

    function buildFixedQuestionBank(profile, majorKey) {
      const majorText = (majors[majorKey] && majors[majorKey].label) || "你的专业";
      const cast = getStoryCast();
      const uniqueSeeds = fixedQuestionSeeds.map((seed, seedIndex) => ({
        ...seed,
        title: seed.title,
        summary: "",
        prompt: applyCastToTemplateText(seed.prompt.replaceAll("这个专业", majorText), cast),
        consequenceA: applyCastToTemplateText(seed.consequenceA, cast),
        consequenceB: applyCastToTemplateText(seed.consequenceB, cast),
        bankIndex: seedIndex,
        fixedKey: `${seedIndex}:${seed.title}:${hashString(seed.prompt)}`
      }));
      return shuffledCopy(uniqueSeeds, `${profileSignature(profile)}:${majorKey}:fixed-bank`);
    }

    function prepareFixedQuestionBank() {
      const signature = `${profileSignature(state.profile)}:${state.major}`;
      if (state.fixedSignature === signature && state.fixedQuestionBank.length) return;
      state.fixedSignature = signature;
      state.fixedQuestionBank = buildFixedQuestionBank(state.profile, state.major);
    }

    function isFixedSlot(yearNumber) {
      return yearNumber > 1 && yearNumber % fixedInsertEvery === 0;
    }

    function usedFixedKeys(ignoreYear = 0) {
      const keys = new Set();
      state.deck.forEach(card => {
        if (!card || Number(card.yearNumber) === Number(ignoreYear)) return;
        if (card.fixedKey) keys.add(card.fixedKey);
      });
      state.history.forEach(item => {
        if (!item || Number(item.year) === Number(ignoreYear)) return;
        if (item.fixedKey) keys.add(item.fixedKey);
      });
      return keys;
    }

    function pickFixedTemplate(yearNumber, purpose = "fixed") {
      prepareFixedQuestionBank();
      const bank = state.fixedQuestionBank.length ? state.fixedQuestionBank : buildFixedQuestionBank(state.profile, state.major);
      if (!bank.length) return null;
      const used = usedFixedKeys(yearNumber);
      const baseIndex = purpose === "fixed"
        ? Math.max(0, Math.floor(yearNumber / fixedInsertEvery) - 1)
        : Math.max(0, yearNumber - 2);
      for (let offset = 0; offset < bank.length; offset += 1) {
        const template = bank[(baseIndex + offset) % bank.length];
        if (!used.has(template.fixedKey)) return template;
      }
      return bank[baseIndex % bank.length];
    }

    function fixedSummaryForTemplate(yearNumber, template, tracks) {
      const otherTrack = tracks.mainTrack === "relationship" ? tracks.lifeTrack : tracks.relationshipTrack;
      const cast = getStoryCast();
      const options = [
        `${otherTrack}；${cast.relationIntro}也把上次那件事记进了聊天里`,
        `${otherTrack}；家里少催了两句，却开始盯你的下一步`,
        `${otherTrack}；朋友群把前一次选择改成了新梗`
      ];
      return shortFeedbackText(options[hashString(`${template.fixedKey}:${yearNumber}`) % options.length]);
    }

    function readableFixedOption(label, tag) {
      const text = String(label || "").trim();
      if (text.length >= 12) return text;
      return `${text}，按${String(tag || "当前判断")}处理`;
    }

    function buildFixedCard(yearNumber) {
      const template = pickFixedTemplate(yearNumber, "fixed");
      if (!template) return null;
      const leftOption = readableFixedOption(template.left, template.tagA);
      const rightOption = readableFixedOption(template.right, template.tagB);
      const tracks = buildFixedTracks(yearNumber, template);
      return applyPreviousInfoToCard(normalizeRemoteCard({
        source: "fixed",
        fixedKey: template.fixedKey,
        yearNumber,
        question: `第 ${yearNumber} 年 / ${state.totalYears}`,
        summary: fixedSummaryForTemplate(yearNumber, template, tracks),
        mainTrack: tracks.mainTrack,
        lifeTrack: tracks.lifeTrack,
        relationshipTrack: tracks.relationshipTrack,
        callbackSeeds: [template.title, tracks.mainTrack === "relationship" ? tracks.lifeTrack : tracks.relationshipTrack].slice(0, 2),
        scene: `事件：${template.title}\n情境：${template.prompt}`,
        a: {
          title: template.leftHint,
          desc: leftOption,
          tag: template.tagA,
          consequence: template.consequenceA,
          riasec: template.riasecA
        },
        b: {
          title: template.rightHint,
          desc: rightOption,
          tag: template.tagB,
          consequence: template.consequenceB,
          riasec: template.riasecB
        },
        left: {
          label: leftOption,
          tag: template.tagA,
          consequence: template.consequenceA,
          riasec: template.riasecA,
          delta: template.deltaA,
          feedback: template.consequenceA || draftChoiceFeedback(template.title, { title: template.left, label: leftOption, tag: template.tagA }, "A")
        },
        right: {
          label: rightOption,
          tag: template.tagB,
          consequence: template.consequenceB,
          riasec: template.riasecB,
          delta: template.deltaB,
          feedback: template.consequenceB || draftChoiceFeedback(template.title, { title: template.right, label: rightOption, tag: template.tagB }, "B")
        }
      }));
    }

    function buildInstantFirstCard() {
      const profile = state.profile || readProfile();
      const displayName = profile.name && profile.name !== "未命名考生" ? profile.name : "你";
      const majorText = profile.majorLabel || majorLabel();
      const cast = getStoryCast();

      return normalizeRemoteCard({

        left: {

          tag: frame.leftTag,
          riasec: frame.riasecA,

          feedback: `你接下了第一波活，室友和老师都记住你这个开学就敢上桌的人。${cast.relationIntro}也开始在群里顺手接你的话。`

        }
      });
    }

    function buildBridgeCard(yearNumber) {
      const template = pickFixedTemplate(yearNumber, "fallback");
      if (!template) return buildInstantFirstCard();
      const leftOption = readableFixedOption(template.left, template.tagA);
      const rightOption = readableFixedOption(template.right, template.tagB);

          label: leftOption,

          consequence: template.consequenceA,
          riasec: template.riasecA,
          delta: template.deltaA,
          feedback: template.consequenceA || draftChoiceFeedback(template.title, { title: template.left, label: leftOption, tag: template.tagA }, "A")
        },

    function countRemoteYearsFrom(startYear, limit) {
      let count = 0;
      for (let year = startYear; year <= state.totalYears && count < limit; year += 1) {
        if (isFixedSlot(year)) break;
        count += 1;
      }
      return count;
    }

    let riveRuntimePromise = null;
    function loadRiveRuntime() {
      if (riveRuntimePromise) return riveRuntimePromise;
      riveRuntimePromise = new Promise((resolve, reject) => {
        if (window.rive?.Rive) return resolve(window.rive);
        const s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/npm/@rive-app/canvas@2";
        s.onload = () => (window.rive?.Rive ? resolve(window.rive) : reject(new Error("rive missing")));
        s.onerror = () => reject(new Error("rive load failed"));
        document.head.appendChild(s);
      });
      return riveRuntimePromise;
    }

    let hintRiveInstance = null;
    function initHintRive() {
      const canvas = document.querySelector("#hintRiveCanvas");
      if (!canvas || canvas.dataset.riveInit) return;
      canvas.dataset.riveInit = "1";
      const fallback = () => {
        const svg = `<svg class="hint-arrow" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="#2486ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16M8 7l-4 5 4 5M16 7l4 5-4 5"/></svg>`;
        if (canvas.isConnected) canvas.outerHTML = svg;
      };
      loadRiveRuntime().then(rive => {
        try { rive.RuntimeLoader.setWasmUrl("https://cdn.jsdelivr.net/npm/@rive-app/canvas@2/rive.wasm"); } catch (e) {}
        hintRiveInstance = new rive.Rive({
          src: "assets/arrow2.riv",
          canvas,
          autoplay: true,
          onLoad: () => requestAnimationFrame(() => { try { if (canvas.clientWidth > 0) hintRiveInstance.resizeDrawingSurfaceToCanvas(); } catch (e) {} }),
          onLoadError: fallback
        });
      }).catch(fallback);
    }

    function renderMajorGrid() {
      document.querySelector("#pathCount")?.replaceChildren(document.createTextNode(`${majorKeys.length} 条路径`));
      if (els.majorGrid.children.length !== majorCardKeys.length) {
        buildMajorCoverflowCards();
        initCoverflowControls();
        initHintRive();
      }
      coverflowCenter = Math.max(0, majorCardKeys.indexOf(state.major));
      layoutMajorCoverflow(coverflowCenter, false);
    }

    function currentAvatarOption() {
      return avatarOptions.find(item => item.id === state.avatar) || avatarOptions[0];
    }

    function hollandTypeArtUrl(primary = "I") {
      const code = String(primary || "I").trim().charAt(0).toUpperCase();
      const safeCode = hollandTypes[code] ? code : "I";
      const fileMap = {
        R: "R_realistic.webp",
        I: "I_investigative.webp",
        A: "A_artistic.webp",
        S: "S_social.webp",
        E: "E_enterprising.webp",
        C: "C_conventional.webp"
      };
      return `${riasecTypeBasePath}/${fileMap[safeCode]}`;
    }

    function hollandTypeArt(primary = "I") {
      return `url('${hollandTypeArtUrl(primary)}')`;
    }

    function avatarFilter(avatar = currentAvatarOption()) {
      return `saturate(${avatar.sat || 1}) hue-rotate(${avatar.rotate || "0deg"})`;
    }

    function applyProfile(profile = readProfile()) {
      state.profile = profile;
      // 只有在确有性别选择时才回填 state.avatar，未选时保持空（性别为必选项）
      const requestedAvatar = profile.avatar || state.avatar;
      const matchedAvatar = requestedAvatar ? avatarOptions.find(item => item.id === requestedAvatar) : null;
      if (matchedAvatar) {
        state.avatar = genderAvatarOptions.find(item => item.gender === matchedAvatar.gender)?.id || matchedAvatar.id;
      }
      if (profile.major && majors[profile.major]) state.major = profile.major;
      const shownMajor = profile.majorLabel || majorLabel();
      const avatar = currentAvatarOption();
      const seedParts = [
        avatar.gender || "",
        profile.province !== "未知省份" ? profile.province : "",
        profile.score !== "未知分数" ? `${profile.score} 分` : "",
        `意向「${shownMajor}」`,
        profile.dream !== "暂未填写" ? `想成为 ${profile.dream}` : ""
      ].filter(Boolean);
      els.seedLine.textContent = seedParts.join("，") || "等待填写开局信息。";
      els.profileName.textContent = profile.name;
      els.profileSummary.textContent = `${avatar.gender || "性别随形象"} · ${profile.province !== "未知省份" ? profile.province : "地区未知"} · ${profile.score !== "未知分数" ? `${profile.score} 分` : "分数未知"} · ${shownMajor}`;
      els.portrait.style.setProperty("--portrait-art", avatar.art);
      els.portrait.style.setProperty("--portrait-filter", avatarFilter(avatar));
      els.profilePreviewPortrait.parentElement?.style.setProperty("--portrait-art", avatar.art);
      els.profilePreviewPortrait.style.setProperty("--portrait-art", avatar.art);
      els.profilePreviewPortrait.style.setProperty("--portrait-filter", avatarFilter(avatar));
      els.profilePreviewName.textContent = shownMajor;
      els.profilePreviewLine.textContent = `选了「${shownMajor}」方向${profile.keywords !== "观察中" ? `，带着「${profile.keywords}」` : ""}，等待第一张人生卡牌。`;
      renderMajorGrid();
      renderAvatarGrid();
      renderTags();
    }

    function buildMajorCoverflowCards() {
      els.majorGrid.innerHTML = majorCardKeys.map((key, index) => {
        if (!key) {
          const active = state.major === "" ? " is-active" : "";
          return `
            <button type="button" class="major-chip major-chip-hint${active}" role="radio" aria-checked="${state.major === ""}" data-major="" data-index="${index}">
              <canvas class="hint-arrow" id="hintRiveCanvas" width="120" height="120" aria-hidden="true"></canvas>
              <span class="hint-text">滑动选择<br>你的期望专业</span>
            </button>
          `;
        }
        const major = majors[key];
        const icon = majorIconMeta[key] || { h: 265, sym: "<circle cx='12' cy='12' r='6'/>" };
        const pastel = majorPastels[key] || majorPastelFromHue(icon.h);
        const active = key === state.major ? " is-active" : "";
        const art = majorIconFiles[key]
          ? `<img src="${majorIconFiles[key]}" alt="" draggable="false" />`
          : glassMajorIcon(key, icon.h, icon.sym);
        return `
          <button type="button" class="major-chip${active}" role="radio" aria-checked="${key === state.major}" data-major="${key}" data-index="${index}" style="--mj-a:${pastel[0]};--mj-b:${pastel[1]}">
            <span class="cf-art" aria-hidden="true">${art}</span>
            <span class="cf-body">
              <b>${escapeHTML(major.label)}</b>
              <span>${escapeHTML(major.tagline)}</span>
            </span>
          </button>
        `;
      }).join("");
      const dots = document.querySelector("#cfDots");
      if (dots) {
        dots.innerHTML = majorCardKeys.map((_, index) => `<button type="button" class="cf-dot" data-index="${index}" aria-label="第 ${index + 1} 个方向"></button>`).join("");
      }
    }

    function renderAvatarGrid() {
      if (!els.avatarGrid) return;
      if (els.avatarGrid.children.length !== genderAvatarOptions.length) {
        buildAvatarCoverflowCards();
      }
      updateGenderSelection();
    }

    function buildAvatarCoverflowCards() {
      els.avatarGrid.innerHTML = genderAvatarOptions.map((avatar, index) => {
        const active = avatar.id === state.avatar ? " is-active" : "";
        return `
          <button type="button" class="gender-card${active}" role="radio" aria-checked="${avatar.id === state.avatar}" aria-label="${escapeHTML(avatar.gender)}" data-avatar="${escapeHTML(avatar.id)}" data-index="${index}" style="--gender-photo:url('${avatar.photoUrl}')">
            <span class="gender-head" aria-hidden="true"></span>
            <b>${escapeHTML(avatar.gender)}</b>
            <span>${avatar.gender === "男生" ? "使用男性玩家开局" : "使用女性玩家开局"}</span>
          </button>
        `;
      }).join("");

    function updateGenderSelection() {
      if (!els.avatarGrid) return;
      Array.from(els.avatarGrid.querySelectorAll(".gender-card")).forEach(card => {
        const active = card.dataset.avatar === state.avatar;
        card.classList.toggle("is-active", active);
        card.setAttribute("aria-checked", active ? "true" : "false");

    function layoutAvatarCoverflow(centerFloat, animate = true) {

    // ====== 触感与抛手惯性 ======
    const flingFrames = new Map();

    function hapticTap(ms = 12) {
      let handled = false;
      try {
        handled = Boolean(navigator.vibrate?.(ms));
      } catch (_) {}
      if (!handled) {
        // iOS Safari 没有 vibrate API，点击隐藏 switch 触发系统触感
        try {
          document.querySelector(".haptic-switch input")?.click();
        } catch (_) {}
      }
    }

    function trackDragVelocity(drag, floatIndex) {
      const now = performance.now();
      if (drag.lastTime != null && now > drag.lastTime) {
        const instant = (floatIndex - drag.lastFloat) / (now - drag.lastTime);
        drag.velocity = drag.velocity == null ? instant : instant * 0.7 + drag.velocity * 0.3;
      }
      drag.lastTime = now;
      drag.lastFloat = floatIndex;
    }

    function flingTarget(floatIndex, velocity) {
      const projected = floatIndex + (velocity || 0) * 170;
      return Math.round(clamp(projected, floatIndex - 4, floatIndex + 4));
    }

    function cancelFling(layoutFn) {
      const active = flingFrames.get(layoutFn);
      if (active) window.cancelAnimationFrame(active.id);
      flingFrames.delete(layoutFn);
      return active ? active.value : null;
    }

    function animateFling(from, to, layoutFn, settleFn) {
      cancelFling(layoutFn);
      if (Math.abs(to - from) < 0.01) {
        settleFn(to);
        return;
      }
      const distance = to - from;
      const duration = Math.max(220, Math.min(720, 240 + Math.abs(distance) * 110));
      const start = performance.now();
      let lastTick = Math.round(from);
      const frame = now => {
        const t = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - t, 3);
        const value = from + distance * eased;
        layoutFn(value, false);
        const rounded = Math.round(value);
        if (rounded !== lastTick) {
          lastTick = rounded;
          hapticTap(12);
        }
        if (t < 1) {
          flingFrames.set(layoutFn, { id: window.requestAnimationFrame(frame), value });
        } else {
          flingFrames.delete(layoutFn);
          settleFn(to);
        }
      };
      flingFrames.set(layoutFn, { id: window.requestAnimationFrame(frame), value: from });
    }

    const artStatus = new Map();
