    function traitTimelineSeries(key) {
      let value = 50;
      const series = [value];
      state.history.forEach(item => {
        value = clamp(value + Number(item.delta?.[key] || 0), 0, 100);
        series.push(value);
      });
      return series;
    }

    function sampleTraitTimeline(key) {
      const ages = [18, 22, 30, 35];
      const steps = [0, 4, 12, state.totalYears];
      const series = traitTimelineSeries(key);
      return steps.map((step, index) => ({
        age: ages[index],
        value: series[Math.min(step, series.length - 1)] ?? series[series.length - 1] ?? 50
      }));
    }

    function trendPath(points, width, height, padding) {
      const xSpan = width - padding * 2;
      const ySpan = height - padding * 2;
      return points.map((point, index) => {
        const x = padding + (xSpan * index) / Math.max(1, points.length - 1);
        const y = height - padding - (ySpan * clamp(point.value, 0, 100)) / 100;
        return `${index === 0 ? "M" : "L"} ${x.toFixed(2)} ${y.toFixed(2)}`;
      }).join(" ");
    }

    function abilityLevelText(value) {
      if (value >= 82) return "很强";
      if (value >= 68) return "偏强";
      if (value >= 54) return "在线";
      if (value >= 40) return "待补";
      return "偏弱";
    }

    function addHollandScore(scores, code, value) {
      if (!Object.prototype.hasOwnProperty.call(scores, code)) return;
      scores[code] += value;
    }

    function scoreHollandText(scores, text, weight = 1) {
      const source = String(text || "");
      const keywordMap = {
        R: ["动手", "工具", "原型", "做出来", "修", "现场", "设备", "硬件", "工程", "落地", "实践", "实操", "搭建", "测试", "上手", "制作", "焊", "施工", "亲自"],
        I: ["分析", "研究", "证据", "数据", "规律", "验证", "实验", "推理", "问题", "复盘", "算法", "模型", "调查", "原因", "求证", "论文", "结构", "拆解", "观察"],
        A: ["表达", "创意", "设计", "作品", "内容", "故事", "审美", "风格", "写", "展示", "策划", "视频", "画", "讲清楚", "创作", "灵感", "品牌", "拍摄"],
        S: ["帮助", "沟通", "陪伴", "同学", "用户", "学生", "家人", "团队", "服务", "倾听", "公益", "咨询", "关系", "理解", "照顾", "支持", "安抚", "协作", "接住"],
        E: ["争取", "组织", "推动", "说服", "带队", "资源", "机会", "汇报", "谈", "管理", "商业", "客户", "负责", "主动", "冲", "公开", "带人", "经营", "市场", "影响"],
        C: ["规则", "流程", "计划", "表", "清单", "稳定", "证书", "整理", "标准", "秩序", "备份", "节点", "按步骤", "风险", "边界", "确认", "保底", "谨慎", "止损", "守住"]
      };
      Object.entries(keywordMap).forEach(([code, words]) => {
        words.forEach(word => {
          if (source.includes(word)) addHollandScore(scores, code, weight);
        });
      });
    }

    function scoreHollandDelta(scores, delta = {}, scale = 1) {
      const map = {
        explore: { I: 1.2, A: 1 },
        discipline: { C: 1.2, I: 0.7 },
        empathy: { S: 1.5 },
        stability: { C: 1.2 },
        ambition: { E: 1.4 },
        pressure: { R: 0.7, C: 0.6 }
      };
      Object.entries(delta || {}).forEach(([traitKey, value]) => {
        const positive = Math.max(0, Number(value) || 0);
        if (!positive || !map[traitKey]) return;
        Object.entries(map[traitKey]).forEach(([code, factor]) => addHollandScore(scores, code, positive * factor * scale));
      });
    }

    function mergeHollandScores(target, extra) {
      Object.entries(extra || {}).forEach(([code, value]) => addHollandScore(target, code, Number(value) || 0));
    }

    function inferChoiceHolland(choice = {}, direction = "") {
      const scores = { R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 };
      const text = [choice.title, choice.desc, choice.tag, choice.label].filter(Boolean).join(" ");
      scoreHollandText(scores, text, 1.4);

      const weightedPatterns = [
        ["R", /动手|上手|搭建|实操|制作|现场|施工|亲自|硬扛|落地|修好|焊出来/],
        ["I", /研究|分析|求证|验证|观察|拆解|复盘|读论文|做模型|先想清楚/],
        ["A", /创意|表达|设计|作品|风格|写出来|讲出来|做内容|拍出来/],
        ["S", /沟通|帮助|陪伴|支持|安抚|照顾|协作|接住|带人|一起扛/],
        ["E", /争取|推动|冲上去|主动拿下|公开表达|带队|谈下来|拉资源|报名|拍板/],
        ["C", /稳住|保底|按计划|先确认|整理清楚|守住|边界|止损|按流程|谨慎/]
      ];
      weightedPatterns.forEach(([code, pattern]) => {
        if (pattern.test(text)) addHollandScore(scores, code, 2.8);
      });

      if (!Object.values(scores).some(value => value > 0)) {
        scoreHollandDelta(scores, choice.delta || {}, 0.18);
        if (direction === "left") addHollandScore(scores, "C", 0.6);
        if (direction === "right") addHollandScore(scores, "E", 0.6);
      }

      return scores;
    }

    function getHollandScoresFromHistory() {
      const scores = { R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 };
      const usePureRiasec = state.history.length > 0 && state.history.every(item => item.holland && Object.values(item.holland || {}).some(value => Number(value) > 0));
      state.history.forEach(item => {
        if (item.holland) {
          mergeHollandScores(scores, item.holland);
        } else if (!usePureRiasec) {
          scoreHollandText(scores, [item.choice, item.choiceText, item.tag].join(" "), 1.4);
          scoreHollandDelta(scores, item.delta, 0.18);
        }
      });
      const total = Object.values(scores).reduce((sum, value) => sum + value, 0);
      if (!total) Object.keys(scores).forEach(code => { scores[code] = 1; });
      return normalizeHollandScoresByOffer(scores);
    }

    function normalizeHollandScoresByOffer(scores) {
      const keys = ["R", "I", "A", "S", "E", "C"];
      const offered = Object.fromEntries(keys.map(key => [key, 0]));
      state.history.forEach(item => {
        const choices = item.offeredHolland
          ? [item.offeredHolland.left, item.offeredHolland.right]
          : [item.holland];
        choices.forEach(choiceScores => mergeHollandScores(offered, choiceScores));
      });
      const offeredTotal = Object.values(offered).reduce((sum, value) => sum + value, 0);
      if (!offeredTotal) return scores;
      const averageOffer = offeredTotal / keys.length;
      return Object.fromEntries(keys.map(key => {
        const availability = Math.max(Number(offered[key]) || 0, averageOffer * 0.45);
        return [key, scores[key] * (averageOffer / availability)];
      }));
    }

    function getHollandRank(scores = getHollandScoresFromHistory()) {
      return Object.entries(scores).sort((a, b) => b[1] - a[1]);
    }

    function getHollandPercent(code, scores) {
      const total = Math.max(Object.values(scores).reduce((sum, value) => sum + value, 0), 1);
      return Math.round((scores[code] / total) * 100);
    }

    function getHollandVisualPercents(scores) {
      const order = ["R", "I", "A", "S", "E", "C"];
      const values = order.map(key => Math.max(0, Number(scores?.[key] || 0)));
      const min = Math.min(...values);
      const max = Math.max(...values);
      if (max <= 0 || max === min) {
        return Object.fromEntries(order.map((key, index) => [key, index === 0 ? 76 : 58]));
      }
      const ranked = order
        .map((key, index) => ({ key, value: values[index] }))
        .sort((a, b) => b.value - a.value);
      const rankBoost = new Map(ranked.map((item, index) => [item.key, [16, 10, 6, 2, -2, -5][index] || 0]));
      return Object.fromEntries(order.map((key, index) => {
        const normalized = (values[index] - min) / (max - min);
        const curved = Math.pow(normalized, 0.7);
        const visual = 42 + curved * 42 + (rankBoost.get(key) || 0);
        return [key, clamp(Math.round(visual), 36, 96)];
      }));
    }

    function getHollandDirections(code) {
      const seen = new Set();
      code.split("").forEach(key => {
        (hollandTypes[key]?.directions || []).forEach(item => seen.add(item));
      });
      return Array.from(seen).join("、");
    }

    function formatHollandTypeLabel(code) {
      const meta = hollandTypes[code];
      return meta ? `${code}${meta.label}` : code;
    }

    function joinNaturalChinese(items) {
      const list = items.filter(Boolean);
      if (!list.length) return "";
      if (list.length === 1) return list[0];
      if (list.length === 2) return `${list[0]}和${list[1]}`;
      return `${list.slice(0, -1).join("、")}和${list[list.length - 1]}`;
    }

    function buildHollandNarrative(code) {
      const summary = typeof code === "string" ? getHollandSummaryData() : code;
      const { rank, scores } = summary;
      const keys = rank.slice(0, 3).map(([key]) => key).filter(key => hollandTypes[key]);
      const labelText = joinNaturalChinese(keys.map(formatHollandTypeLabel));
      const tendencyMap = {
        R: "先上手，把问题落到真实场景里",
        I: "先分析清楚，再决定怎么做",
        A: "把表达、风格和作品感做出来",
        S: "先顾到人，再推动事情往前",
        E: "把局面推开，把资源组织起来",
        C: "先把流程理顺，再稳稳落地"
      };
      const [first, second] = rank;
      const firstPercent = getHollandPercent(first?.[0] || "I", scores);
      const secondPercent = getHollandPercent(second?.[0] || "A", scores);
      const firstLabel = formatHollandTypeLabel(first?.[0] || "I");
      const mixText = firstPercent - secondPercent >= 12
        ? `${firstLabel}更突出`
        : `${firstLabel}和${formatHollandTypeLabel(second?.[0] || "A")}都很明显`;
      const tendencyText = joinNaturalChinese(keys.map(key => tendencyMap[key]));
      return `${mixText}。你的兴趣更偏向${labelText}，做选择时往往会自然靠近“${tendencyText}”这类路子。它不是专业判决书，还要结合学科能力、分数段、家庭风险承受力和就业目标一起看。`;
    }

    function hollandHeadline(code) {
      const primary = code.split("").find(key => hollandTypes[key]) || "I";
      const meta = hollandTypes[primary] || hollandTypes.I;
      return `${primary}${meta.label}-${meta.nick}`;
    }

    function hollandIntroText() {
      return "RIASEC 将人格分为 6 种类型，每一种人格类型都有相对应的职业兴趣，大家总是根据自己的人格类型所赋予的职业兴趣去选择职业。";
    }

    function radarPoint(index, value, center, radius) {
      const angle = -Math.PI / 2 + (Math.PI * 2 * index) / 6;
      const currentRadius = radius * (clamp(value, 0, 100) / 100);
      return {
        x: center + Math.cos(angle) * currentRadius,
        y: center + Math.sin(angle) * currentRadius
      };
    }

    function polygonPath(points) {
      return points.map((point, index) => `${index === 0 ? "M" : "L"} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ") + " Z";
    }

    function buildHollandRadarSVG(scores) {
      const size = 292;
      const center = size / 2;
      const radius = 70;
      const order = ["R", "I", "A", "S", "E", "C"];
      const gridLevels = [0.28, 0.5, 0.72, 1];
      // 显式 SVG 呈现属性：CSS 在线上页面仍生效，截图(html-to-image 不内联 SVG 子元素样式)时靠属性正确渲染
      const accent = getHollandSummaryData().primaryMeta?.color || "#0f8b8d";
      const visualPercents = getHollandVisualPercents(scores);
      const points = order.map((key, index) => radarPoint(index, visualPercents[key], center, radius));
      const axes = order.map((key, index) => {
        const outer = radarPoint(index, 100, center, radius);
        const label = radarPoint(index, 100, center, radius + 34);
        return { key, outer, label, color: hollandTypes[key]?.color || "#315c9a" };
      });
      return `
        <svg class="ability-radar" viewBox="0 0 ${size} ${size}" role="img" aria-label="RIASEC 雷达图">
          ${gridLevels.map(level => {
            const gridPoints = order.map((_, index) => radarPoint(index, level * 100, center, radius));
            return `<path d="${polygonPath(gridPoints)}" class="ability-radar-grid level-${Math.round(level * 100)}" fill="none" stroke="rgba(36,48,68,0.16)" stroke-width="1"></path>`;
          }).join("")}
          ${axes.map(axis => `
            <line x1="${center}" y1="${center}" x2="${axis.outer.x.toFixed(2)}" y2="${axis.outer.y.toFixed(2)}" class="ability-radar-axis" stroke="rgba(36,48,68,0.14)" stroke-width="1"></line>
            <text x="${axis.label.x.toFixed(2)}" y="${axis.label.y.toFixed(2)}" class="ability-radar-label" fill="${axis.color}" text-anchor="middle" font-size="11" font-weight="700">
              <tspan x="${axis.label.x.toFixed(2)}" dy="-0.55em">${escapeHTML(hollandTypes[axis.key]?.label || "")}</tspan>
              <tspan x="${axis.label.x.toFixed(2)}" dy="1.15em">${escapeHTML(axis.key)}</tspan>
            </text>
          `).join("")}
          <path d="${polygonPath(points)}" class="ability-radar-shape" fill="${accent}" fill-opacity="0.34" stroke="${accent}" stroke-width="1.6" stroke-linejoin="round"></path>
          ${points.map(point => `<path d="M ${point.x.toFixed(2)} ${(point.y - 4).toFixed(2)} L ${(point.x + 4.6).toFixed(2)} ${point.y.toFixed(2)} L ${point.x.toFixed(2)} ${(point.y + 4).toFixed(2)} L ${(point.x - 4.6).toFixed(2)} ${point.y.toFixed(2)} Z" class="ability-radar-dot" fill="${accent}" stroke="#ffffff" stroke-width="1.4"></path>`).join("")}
        </svg>
      `;
    }

    function getHollandSummaryData() {
      const scores = getHollandScoresFromHistory();
      const rank = getHollandRank(scores);
      const code = rank.slice(0, 3).map(([key]) => key).join("");
      const primary = rank[0]?.[0] || "I";
      const titleLine = code.split("").map(key => hollandTypes[key]?.word || "").filter(Boolean).join(" + ");
      const directions = getHollandDirections(code);
      const total = Math.max(Object.values(scores).reduce((sum, value) => sum + value, 0), 1);
      return {
        scores,
        rank,
        code,
        primary,
        primaryMeta: hollandTypes[primary] || hollandTypes.I,
        titleLine,
        directions,
        total
      };
    }

    function buildAbilityPortraitHTML() {
      const summary = getHollandSummaryData();
      const { scores, code, titleLine, directions, primaryMeta } = summary;
      return `
        <section class="ability-section" style="--ability-accent:${primaryMeta.color};--ability-tint:color-mix(in srgb, ${primaryMeta.color} 18%, #ffffff);">
          <div class="ability-top">
            <div class="ability-copy">
              <h4>${escapeHTML(hollandHeadline(code))}</h4>
              <p class="ability-summary">${escapeHTML(`${code}：${titleLine}`)}</p>
              <p class="ability-note">适合 ${escapeHTML(directions)} 等方向</p>
            </div>
            <img class="ability-art" src="${hollandTypeArtUrl(summary.primary)}" alt="" aria-hidden="true" />
          </div>

    const personaMeta = {
      ambition: { label: "进取机会型", note: "你一次次主动推进，总想靠近更大的舞台和资源。" },
      stability: { label: "稳健骨干型", note: "你偏好把确定的路走深，不轻易冒无谓的险。" },
      empathy: { label: "共情服务型", note: "你总从真实的人出发，在意选择对别人的意义。" },
      explore: { label: "探索跨界型", note: "你不断尝试新方向，把人生过成一条持续改写的路线。" },
      pressure: { label: "抗压现实型", note: "你习惯先扛住、先解决问题，在压力里长出韧性。" },
      balanced: { label: "复合普通型", note: "你在稳和闯之间反复校准，慢慢逼近更像自己的答案。" }
    };

    function resolvePersona() {
      const { explore, discipline, empathy, stability, ambition, pressure } = state.values;
      if (empathy > 70 && ambition > 64) return "empathy";
      if (ambition > 72 && explore > 66) return "ambition";
      if (stability > 72 && discipline > 62) return "stability";
      if (explore > 72) return "explore";
      if (pressure > 72) return "pressure";
      return "balanced";
    }

    function getIdentity() {
      const persona = resolvePersona();
      const major = majors[state.major] || majors[majorKeys[0]];
      const career = (major.careers && major.careers[persona]) || major.careers.balanced;
      const meta = personaMeta[persona];
      return {
        persona,
        personaLabel: meta.label,
        personaNote: meta.note,
        majorKey: state.major,
        majorLabel: major.label,
        majorSummary: major.summary,
        title: career.title,
        first: career.first,
        line: career.line
      };
    }

    async function showResult() {
      els.progressFill.style.width = "100%";
      // API 等待期间只预载 RIASEC 公仔图，等结果文案一起亮相
      const hollandSummary = getHollandSummaryData();
      applyResultTheme(hollandSummary.primary);
      probeArt(hollandTypeArtUrl(hollandSummary.primary));
      showFlow("result");
      renderResultLoading();
      renderResultStreaming({});
      try {
        const payload = { profile: apiProfile(), history: apiHistory(true) };
        let data;
        try {
          let buffer = "";
          let pending = false;
          data = await apiPostStream("/api/game/result", payload, (delta, event) => {
            if (event && event.reset) { buffer = ""; return; }
            buffer += delta;
            if (pending) return;
            pending = true;
            window.requestAnimationFrame(() => {
              pending = false;
              renderResultStreaming(extractResultStreamFields(buffer));
            });
          });
        } catch (streamError) {
          console.warn("result stream failed, falling back to non-stream:", streamError?.message);
          try {
            data = await apiPost("/api/game/result", payload);
          } catch (firstError) {
            await new Promise(resolve => window.setTimeout(resolve, 1500));
            data = await apiPost("/api/game/result", payload);
          }
        }
        state.result = data.result;
        renderResult(data.result);
      } catch (error) {
        renderResultError(error.message || "最终结果生成失败");
      }
      renderTimeline();
    }

    function buildPilotResult() {
      const hollandSummary = getHollandSummaryData();
      const major = majorLabel();
      const played = state.history.map(item => {
        const card = state.deck[item.year - 1];
        const choice = item.direction === "left" ? card?.left : card?.right;
        return { ...item, card, choice };
      }).filter(item => item.card && item.choice);
      const stats = getChoiceStats();
      const routeTagMap = {
        ESA: "你更像那种能把人、场子和机会一起带热的人。",
        ECI: "你既想把局面推大，也会本能地给自己留一个后手。",
        CEI: "你不是慢，你是在先把盘面理顺，再挑最值的机会出手。",
        CIE: "你会先把后果和逻辑想清，再决定要不要往前冲。",
        ESI: "你推进事情时并不冷，很多时候也会顺手把人接住。",
        AIE: "你既想把东西做出风格，也想让它真的被更多人看见。"
      };
      const sceneTargets = [played[1], played[3], played[played.length - 1]].filter(Boolean);
      const scenes = sceneTargets.map((item, index) => ({
        title: item.sceneTitle || item.card?.scene || `第 ${item.year} 年拐点`,
        body: buildPilotSceneSummary(item, index)
      }));
      const possibilityMap = hollandSummary.rank.slice(0, 3).map(([code]) => {
        const meta = hollandTypes[code] || hollandTypes.I;
        return {
          percent: `${getHollandPercent(code, hollandSummary.scores)}%`,
          label: meta.careerLabel || `${meta.word}相关方向`
        };
      });
      const relationshipForward = played
        .filter(item => item.mainTrack === "relationship")
        .reduce((sum, item) => sum + ((item.holland?.S || 0) + (item.holland?.E || 0) - (item.holland?.C || 0)), 0);
      const dominantRouteText = routeTagMap[hollandSummary.code] || `你这局最明显的底色，是${hollandSummary.code}这组三字母的混合路线。`;
      const closingTension = relationshipForward >= 0
        ? "你开始知道，往前冲这件事不只用在项目上，也要用在该回应的人身上。"
        : "你已经很会扛事了，下一阶段更难的是别把“先忙完再说”用在所有关系上。";
      const pushStyle = stats.right - stats.left >= 2
        ? "这 6 张里你多数时候会先推开局面，哪怕代价会晚一点补票。"
        : stats.left - stats.right >= 2
          ? "这 6 张里你更常先稳住手里的底盘，再决定要不要把风险放大。"
          : "这 6 张里你不是一种打法走到底，而是在机会和代价之间反复试手感。";
      return {
        title: buildShareableLifeTitle(hollandSummary, possibilityMap),
        status42: `${dominantRouteText}${pushStyle}${closingTension}`,
        majorCareerNote: `这局里你从「${major}」出发，最后更容易被${hollandSummary.code}这组三字母路线吸住。眼下最明显的三个出口是 ${possibilityMap[0]?.percent || "0%"} 的${possibilityMap[0]?.label || "研究分析"}、${possibilityMap[1]?.percent || "0%"} 的${possibilityMap[1]?.label || "内容创意"}、${possibilityMap[2]?.percent || "0%"} 的${possibilityMap[2]?.label || "组织推进"}。专业决定起点，不会把你一辈子锁死。`,
        famousScenes: scenes,
        trajectory: buildPilotTrajectory(played, hollandSummary),
        shareHooks: [
          "这不是命运定稿，是你前六集的人生试播片。",
          "项目能补版本，关系不一定总有下一个空档。"
        ],
        careerPossibilities: possibilityMap,
        timelineBlocks: buildPilotTimelineBlocks(played),
        choiceHabit: {
          title: "你会在机会和稳妥之间反复校准",
          body: getChoicePattern()
        },
        mentalPrep: {
          title: "越往前冲，越要留出关系缓冲",
          body: getRiskNode()
        },
        letter18: {
          title: "别急着把自己定型",
          body: `这 6 张只说明你在「${major}」起点下的第一段倾向，还远远不是终局。`
        }
      };
    }

    function buildPilotSceneSummary(item) {
      const title = item.sceneTitle || item.card?.scene || "这一年";
      const choice = String(item.choiceText || "").replace(/[。.!！?？]/g, "").trim();
      const summary = shortFeedbackText(item.summary || item.card?.summary || "");
      const relationHint = shortFeedbackText(item.mainTrack === "relationship" ? item.lifeTrack : item.relationshipTrack);
      const merged = [summary, relationHint].filter(Boolean).join("；");
      if (merged && merged.length <= 44) return merged;
      if (summary) return summary;
      if (choice) return `你在「${title}」这步选了${choice}，后面的节奏也从这里开始改写。`;
      return `${title}之后，很多事都不再只停在想一想。`;
    }

    function buildPilotTimelineBlocks(played) {
      const opening = played.slice(0, 2);
      const middle = played.slice(2, 4);
      const ending = played.slice(4);
      return [
        {
          title: "第 1-2 张：先被推上场",
          body: opening.length
            ? "你还没完全适应大学节奏，项目、展示和第一次小翻车已经先把你推到了人群前面。"
            : "故事刚开场，很多事就已经开始往前赶。"
        },
        {
          title: "第 3-4 张：关系线开始有镜头",
          body: middle.length
            ? "你一边被机会往前拽，一边也发现有些人已经开始记住你的节奏和嘴硬。"
            : "第二段里，主线和关系线开始同时加速。"
        },
        {
          title: "第 5-6 张：被看见，也开始付代价",
          body: ending.length
            ? "当你越来越像那个能顶事的人，真正难的题也来了：有些机会要抢，有些回应不能总说下次。"
            : "后半段不再只是赢不赢，而是你准备拿什么去换。"
        }
      ];
    }

    function buildPilotTrajectory(played, hollandSummary) {
      const code = hollandSummary.code;
      const first = played[0]?.sceneTitle || "开局";
      const last = played[played.length - 1]?.sceneTitle || "最后一步";
      const bridge = played.find(item => item.mainTrack === "relationship")?.sceneTitle || "关系线第一次露头";

    function inferCareerCodeFromLabel(label, fallbackCode = "I") {
      const text = String(label || "");
      const scored = Object.entries(careerLabelTypeRules)
        .map(([code, pattern]) => ({ code, score: (text.match(pattern) || []).length }))
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score);
      return scored[0]?.code || fallbackCode;
    }

    function careerPercentSeed() {
      return [
        majorLabel(),
        ...state.history.map(item => [
          item.year,
          item.choiceText || item.choice || item.tag || "",
          Object.entries(item.holland || {}).map(([key, value]) => `${key}${Number(value) || 0}`).join("")
        ].join(":"))
      ].join("|");
    }

    function distributeCareerPercents(weights) {
      const base = weights.map(value => Math.max(0.03, Number(value) || 0.03));
      const total = base.reduce((sum, value) => sum + value, 0) || 1;
      const raw = base.map(value => clamp((value / total) * 100, 12, 62));
      let rounded = raw.map(Math.round);
      let diff = 100 - rounded.reduce((sum, value) => sum + value, 0);
      let guard = 0;
      while (diff !== 0 && guard < 120) {
        const direction = diff > 0 ? 1 : -1;
        const candidates = rounded
          .map((value, index) => ({ index, value, weight: base[index], room: direction > 0 ? 62 - value : value - 12 }))
          .filter(item => item.room > 0)
          .sort((a, b) => direction > 0 ? b.weight - a.weight : a.weight - b.weight);
        if (!candidates.length) break;
        rounded[candidates[0].index] += direction;
        diff -= direction;
        guard += 1;
      }
      return rounded;
    }

    function normalizeCareerPercentMatches(matches = []) {
      const cleaned = matches
        .slice(0, 3)
        .map(item => ({ ...item, label: normalizeCareerLabel(item.label) }))
        .filter(item => item.label);
      if (cleaned.length < 3) return cleaned;
      const summary = getHollandSummaryData();
      const scores = summary.scores || {};
      const rankCodes = (summary.rank || []).map(([code]) => code).filter(code => hollandTypes[code]);
      const seed = careerPercentSeed();
      const totalScore = Math.max(Object.values(scores).reduce((sum, value) => sum + (Number(value) || 0), 0), 1);
      const weights = cleaned.map((item, index) => {
        const code = inferCareerCodeFromLabel(item.label, rankCodes[index] || rankCodes[0] || "I");
        const rankIndex = rankCodes.indexOf(code);
        const scoreShare = (Number(scores[code]) || 0) / totalScore;
        const rankBoost = [0.14, 0.09, 0.05, 0.02, 0, -0.01][rankIndex] || 0;
        const jitter = ((hashString(`${seed}:${item.label}:${code}:${index}`) % 17) - 8) / 100;
        return Math.max(0.05, scoreShare + rankBoost + jitter);
      });
      const percents = distributeCareerPercents(weights);
      return cleaned.map((item, index) => ({ ...item, percent: `${percents[index]}%` }));
    }

          const style = getComputedStyle(card);
          const available = card.clientWidth - parseFloat(style.paddingLeft) - parseFloat(style.paddingRight);
          if (available <= 0) return;
          const fitWidth = String(Math.round(available));
          const fitText = label.textContent || "";
          if (label.dataset.fitText === fitText && label.dataset.fitWidth === fitWidth) return;
          label.style.removeProperty("--career-label-size");
          const currentSize = parseFloat(getComputedStyle(label).fontSize) || 11.5;
          const needed = label.scrollWidth;
          if (needed > available) {
            const nextSize = Math.max(8, Math.floor((currentSize * available / needed) * 10) / 10);
            label.style.setProperty("--career-label-size", `${nextSize}px`);
          }
          label.dataset.fitText = fitText;

        });

      if (!live) return;
      const title = (String(state.result?.title || "人生扭蛋机结果").replace(/[\\/:*?"<>|\s]+/g, " ").trim().slice(0, 40)) || "人生扭蛋机";

      // 离屏克隆截图：绝不改动正在显示的结果页（避免二维码/裁剪残留到原页面）
      const holder = document.createElement("div");
      holder.style.cssText = `position:fixed;left:-99999px;top:0;width:${live.offsetWidth}px;pointer-events:none;z-index:-1;`;
      const clone = live.cloneNode(true);
      clone.classList.remove("is-streaming", "is-revealed", "is-loading");
      clone.classList.add("is-capturing");
      clone.querySelector(".result-actions")?.remove();
      clone.querySelector(".ability-section")?.classList.remove("is-faux-stream");
      if (mode === "key") {
        clone.querySelector(".yearning-section")?.remove();

        clone.querySelector("#resultGuides")?.remove();
      }
      const footer = getShareQrFooter().cloneNode(true);
      footer.removeAttribute("hidden");
      footer.hidden = false;
      if (mode === "key") {
        const ability = clone.querySelector(".ability-section");
        if (ability && ability.parentNode) ability.parentNode.insertBefore(footer, ability.nextSibling);
        else clone.appendChild(footer);
      } else {
        clone.appendChild(footer);
      }
      holder.appendChild(clone);
      document.body.appendChild(holder);
      try {
        if (!resultImageModulePromise) {
          resultImageModulePromise = import("https://esm.sh/html-to-image@1.11.13?bundle");
        }
        const mod = await resultImageModulePromise;
        if (document.fonts && document.fonts.ready) {
          await Promise.race([document.fonts.ready, new Promise(resolve => window.setTimeout(resolve, 3000))]);
        }
        await ensureImagesReady(clone);
        // skipFonts: 不内嵌网络字体（避免抓取 gstatic 跨域字体导致截图卡死/失败），截图用已就绪的系统字体渲染
        const options = { cacheBust: true, pixelRatio: Math.min(2, window.devicePixelRatio || 2), backgroundColor: "#ffffff", skipFonts: true };
        // 预热渲染一帧：让布局/图片先稳定，避免下一帧换行变化导致文字被裁切
        await mod.toPng(clone, options);
        const blob = await mod.toBlob(clone, options);
        if (!blob) throw new Error("生成结果为空");
        if (shareViewerUrl) URL.revokeObjectURL(shareViewerUrl);
        shareViewerUrl = URL.createObjectURL(blob);
        const body = document.querySelector("#shareViewerBody");
        if (body) body.innerHTML = `<img src="${shareViewerUrl}" alt="${escapeHTML(title)}" />`;
        const save = document.querySelector("#shareViewerSave");
        if (save) { save.href = shareViewerUrl; save.setAttribute("download", `${title}.png`); save.style.display = ""; }
      } catch (error) {
        console.error("share image failed", error);
        const body = document.querySelector("#shareViewerBody");
        if (body) body.innerHTML = `<div class="share-viewer-loading">图片生成失败，请重试</div>`;
      } finally {
        holder.remove();
      }
    }

    function classifyDebugTrace() {
      const chosenByYear = new Map(state.history.map(item => [Number(item.year), item]));
      return state.debugTrace.reduce((groups, item) => {
        const branch = debugTraceBranch(item, chosenByYear);
        const record = { ...safeJsonClone(item), branch };
        if (branch === "prefetch") groups.prefetch.push(record);
        else if (branch === "discarded") groups.discarded.push(record);
        else groups.chosen.push(record);
        return groups;
      }, { chosen: [], prefetch: [], discarded: [] });
    }

    function debugTraceBranch(item, chosenByYear) {
      if (item.path !== "/api/game/next") return "chosen";
      const year = Number(item.input?.year || item.output?.card?.yearNumber || 0);
      if (!year || year <= 1) return "chosen";
      const history = Array.isArray(item.input?.history) ? item.input.history : [];
      const previous = history[history.length - 1];
      const chosenPrevious = chosenByYear.get(year - 1);
      if (!debugHistoryItemMatches(previous, chosenPrevious)) return "prefetch";
      return debugTraceOutputMatchesFinalCard(item, year) ? "chosen" : "discarded";
    }

    function debugTraceOutputMatchesFinalCard(item, year) {
      const outputCard = item.output?.card;
      const finalCard = state.deck[year - 1];
      if (!outputCard || !finalCard) return false;
      return debugCardTraceKey(outputCard) === debugCardTraceKey(finalCard);
    }

      return [
        Number(card.yearNumber || card.question?.match?.(/\d+/)?.[0] || 0),
        debugCardSceneTitle(card),
        debugChoiceTraceLabel(card.left || card.a),
        debugChoiceTraceLabel(card.right || card.b)

      const scene = card.scene;
      if (scene && typeof scene === "object") return String(scene.title || "").trim();

    }

    function debugChoiceTraceLabel(choice = {}) {
      return String(choice.label || [choice.title, choice.desc].filter(Boolean).join("，") || choice.title || "").trim();
    }

    function debugHistoryItemMatches(inputItem, chosenItem) {
      if (!inputItem || !chosenItem) return false;
      const sameYear = Number(inputItem.year) === Number(chosenItem.year);
      const sameChoice = String(inputItem.choiceText || "").trim() === String(chosenItem.choiceText || "").trim();
      const sameConsequence = String(inputItem.consequence || "").trim() === String(chosenItem.consequence || "").trim();
      return sameYear && sameChoice && sameConsequence;
    }

    function debugJsonText(value) {
      if (value == null || value === "") return "";
      if (typeof value === "string") return value;
      return JSON.stringify(value, null, 2);
    }

    function debugModelName(item = {}) {
      return item.output?.model || item.input?.model || item.modelRequest?.model || "未知模型";
    }

    function debugModelInput(item = {}) {
      const content = item.modelRequest?.messages?.find(message => message.role === "user")?.content || "";
      const marker = "输入数据：";
      const start = content.indexOf(marker);
      if (start < 0) return null;
      const afterMarker = content.slice(start + marker.length).trim();
      const endMarker = "\n\n输出字段";
      const end = afterMarker.indexOf(endMarker);
      const jsonText = (end >= 0 ? afterMarker.slice(0, end) : afterMarker).trim();
      try {
        return JSON.parse(jsonText);
      } catch {
        return null;
      }
    }

    function debugLineHTML(label, value) {
      if (value == null || value === "" || (Array.isArray(value) && !value.length)) return "";
      const body = Array.isArray(value)
        ? `<div class="process-chip-list">${value.map(item => `<span class="process-chip">${escapeHTML(item)}</span>`).join("")}</div>`
        : `<span class="process-value">${escapeHTML(value)}</span>`;
      return `
        <div class="process-line">
          <span class="process-label">${escapeHTML(label)}</span>
          ${body}
        </div>
      `;
    }

    function debugMiniHTML(rows) {
      const html = rows.map(([label, value]) => debugLineHTML(label, value)).filter(Boolean).join("");
      return html ? `<div class="process-mini">${html}</div>` : "";
    }

    function debugChoiceText(choice = {}) {
      return choice.label || [choice.title, choice.desc].filter(Boolean).join("，") || choice.title || "";
    }

      return [
        storyCast.relationName && `关系：${storyCast.relationName}`,
        Array.isArray(storyCast.supportRoles) && `阶段角色：${storyCast.supportRoles.join("、")}`,
        Array.isArray(storyCast.familyRoles) && `家庭角色：${storyCast.familyRoles.join("、")}`,
        storyCast.mentorIntro && `老师：${storyCast.mentorIntro}`,
        storyCast.familyIntro && `家庭：${storyCast.familyIntro}`
      ].filter(Boolean);
    }

    };

    function debugFieldLabel(key) {
      return debugFieldLabels[key] || key;
    }

    function debugVisualValue(value, key = "") {
      if (value == null || value === "") return `<span class="process-value">空</span>`;
      if (typeof value !== "object") return `<span class="process-value">${escapeHTML(value)}</span>`;
      if (Array.isArray(value)) {
        if (!value.length) return `<span class="process-value">空数组</span>`;
        return `<div class="process-array">${value.map((item, index) => `
          <div class="process-array-item">
            <div class="process-label">${escapeHTML(`${debugFieldLabel(key)} ${index + 1}`)}</div>
            ${debugVisualValue(item)}
          </div>
        `).join("")}</div>`;
      }
      return `<div class="process-visual">${Object.entries(value).map(([childKey, childValue]) => `
        <div class="process-line">
          <span class="process-label">${escapeHTML(debugFieldLabel(childKey))}</span>
          <div class="process-value">${debugVisualValue(childValue, childKey)}</div>
        </div>
      `).join("")}</div>`;
    }

    function debugTraceTitle(item = {}, index = 0) {
      if (item.path === "/api/game/result") return "结果页";
      const year = Number(item.input?.year || item.input?.gameMeta?.currentYear || item.output?.card?.yearNumber || 0);
      if (year) return `第 ${year} 年`;
      return `请求 ${index + 1}`;
    }

    function debugInputHTML(item = {}) {
      const input = item.input || {};
      const modelInput = debugModelInput(item) || {};
      const history = Array.isArray(input.history) ? input.history : [];
      const last = history.at(-1);
      const modelHistory = Array.isArray(modelInput.history) ? modelInput.history : [];
      const stateHints = modelInput.stateHints || {};
      const outline = modelInput.outlineCard || {};
      const profile = modelInput.profile || input.profile || {};
      return debugMiniHTML([
        ["接口", item.path],
        ["模型", debugModelName(item)],
        ["专业", profile.major],
        ["年份", modelInput.gameMeta?.currentYear || input.year],
        ["历史", `${modelHistory.length || history.length} 条模型摘要 / ${history.length} 条接口记录`],
        ["时间", stateHints.timeFrame],
        ["人生路线", stateHints.careerRoute],
        ["考研选择", stateHints.educationState],
        ["阶段", stateHints.lifeStage || outline.phase],
        ["本年事故", stateHints.currentIncident],
        ["近两年事故", stateHints.recentIncidents],
        ["上一年", stateHints.lastYear],
        ["过往", stateHints.storySoFar],
        ["本年冲突", outline.conflict],
        ["近期回响", stateHints.recentCallbacks],
        ["角色", debugStoryCastText(modelInput.storyCast)],
        ["上一选项", last?.choiceText || last?.choiceTag],
        ["上一后果", last?.consequence]
      ]);
    }

    function debugOutputHTML(item = {}) {
      const output = item.output || {};
      const card = output.card || output.normalizedCard;
      const result = output.result;
      if (result) {
        return debugMiniHTML([
          ["标题", result.title],
          ["状态", result.status42],
          ["真实的你", result.innerYearning?.keyword],
          ["职业出口", Array.isArray(result.careerPossibilities) ? result.careerPossibilities.map(item => item.label).filter(Boolean).join(" / ") : ""]
        ]);
      }
      if (card) {
        return debugMiniHTML([
          ["标题", card.sceneTitle || card.eventTitle || card.scene?.title],
          ["正文", card.sceneBody || card.prompt || card.scene?.body],
          ["便签", card.summary || card.context],
          ["现实", card.lifeTrack],
          ["关系", card.relationshipTrack],
          ["A", debugChoiceText(card.left || card.a)],
          ["B", debugChoiceText(card.right || card.b)]
        ]);
      }
      return `<p>${escapeHTML(Object.keys(output).join(" / ") || "无输出摘要")}</p>`;
    }

    function debugDetailsHTML(item = {}) {
      const systemPromptText = item.modelRequest?.messages?.find(message => message.role === "system")?.content;
      const userPromptText = item.modelRequest?.messages?.find(message => message.role === "user")?.content;
      return [
        ["系统提示词", systemPromptText],
        ["用户提示词", userPromptText],
        ["输入数据（解析后）", debugModelInput(item)],
        ["模型原始输出", item.modelRawOutput],
        ["接口 payload（前端到后端）", item.input],
        ["接口输出（后端到前端）", item.output]
      ].map(([label, value]) => {
        if (value == null || value === "") return "";
        return `
          <details>
            <summary>${escapeHTML(label)}</summary>
            ${debugVisualValue(value)}
          </details>
        `;
      }).join("");
    }

    function renderProcessDebug() {
      const payload = buildDebugFlowPayload();
      const trace = Array.isArray(payload.apiTrace) ? payload.apiTrace : [];
      if (els.processSummary) {
        els.processSummary.innerHTML = [
          ["专业", payload.selectedMajor?.label || "未选专业"],
          ["卡片", `${payload.cards?.length || 0} 张`],
          ["已选", `${payload.chosenHistory?.length || 0} 次`],
          ["请求", `${trace.length} 次`]
        ].map(([label, value]) => `
          <div class="process-stat">
            <b>${escapeHTML(value)}</b>
            <span>${escapeHTML(label)}</span>
          </div>
        `).join("");
      }
      if (!els.processList) return;
      if (!trace.length) {
        els.processList.innerHTML = `<div class="process-item"><div class="process-item-head"><b>暂无过程记录</b></div></div>`;
        return;
      }
      els.processList.innerHTML = trace.map((item, index) => `
        <article class="process-item">
          <div class="process-item-head">
            <b>${escapeHTML(debugTraceTitle(item, index))}</b>
            <span>${escapeHTML(debugModelName(item))} · ${escapeHTML(item.transport || "fetch")}</span>
          </div>
          <div class="process-io">
            <section class="process-box">
              <h3>输入</h3>
              ${debugInputHTML(item)}
            </section>
            <section class="process-box">
              <h3>输出</h3>
              ${debugOutputHTML(item)}
            </section>
          </div>
          <div class="process-details">
            ${debugDetailsHTML(item)}
          </div>
        </article>
      `).join("");
    }

    function openProcessDebug() {
      if (!els.processSheet) return;
      renderProcessDebug();
      els.processSheet.hidden = false;
      els.processSheet.scrollTo(0, 0);
    }

    function closeProcessDebug() {
      if (els.processSheet) els.processSheet.hidden = true;
    }

    async function copyProcessDebug() {
      const button = els.copyProcessDebug;
      if (!button) return;
      const originalLabel = button.textContent;
      button.disabled = true;
      try {
        await copyText(JSON.stringify(buildDebugFlowPayload(), null, 2));
        button.textContent = "已复制";
        window.setTimeout(() => {
          button.disabled = false;
          button.textContent = originalLabel;
        }, 1200);
      } catch (error) {
        console.error("copy debug flow failed", error);
        button.disabled = false;
        button.textContent = originalLabel;
        window.alert("调试包复制失败，请稍后重试。");
      }
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function wrapIndex(index, total) {
      if (!total) return 0;
      return ((index % total) + total) % total;
    }

    function shortestLoopOffset(index, centerFloat, total) {
      if (!total) return 0;
      const base = index - centerFloat;
      return base - Math.round(base / total) * total;
    }

    els.entryStart.addEventListener("click", enterSetupFromCover);
    els.entryName?.addEventListener("input", refreshEntryGate);
    els.entryName?.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        enterSetupFromCover();
      }
    });
    els.entryName?.addEventListener("input", event => {
      normalizeSetupInputTarget(event.target);
      showSetupError("");
      const setupNameInput = document.querySelector("#studentName");
      if (setupNameInput && !setupNameInput.value.trim()) {
        applyProfile(readProfile());
      }
    });

    els.form.addEventListener("submit", event => {
      event.preventDefault();
      startGame();
    });
    els.applyProfileButton.addEventListener("click", event => {
      event.preventDefault();
      startGame();
    });

    document.querySelector("#randomProfile")?.addEventListener("click", event => {
      event.preventDefault();
      applyRandomProfile();
      render();
    });
    document.querySelector("#familyHopeOptions")?.addEventListener("click", event => {
      const button = event.target.closest("button[data-value]");
      if (!button) return;
      setFamilyHope(button.dataset.value);
      refreshSetupGate();
      applyProfile(readProfile());
      scheduleWarmup();
    });
    els.form.addEventListener("input", event => {
      normalizeSetupInputTarget(event.target);
      showSetupError("");
      applyProfile(readProfile());
      scheduleWarmup();
      refreshSetupGate();
    });
    els.form.addEventListener("change", () => {
      applyProfile(readProfile());
      scheduleWarmup();
      refreshSetupGate();
    });
    els.majorGrid.addEventListener("click", event => {
      const chip = event.target.closest(".major-chip");
      if (!chip) return;
      if (coverflowDrag?.moved) return;
      const index = Number(chip.dataset.index ?? majorCardKeys.indexOf(chip.dataset.major));
      selectMajorByIndex(Number.isFinite(index) ? index : 0, true);
    });
    els.avatarGrid?.addEventListener("click", event => {
      const card = event.target.closest(".gender-card");
      if (!card) return;
      selectAvatarById(card.dataset.avatar || avatarOptions[0].id, true);
    });
    document.querySelector("#randomTop")?.addEventListener("click", () => resetGame(false, "setup"));
    document.querySelector("#restartTop").addEventListener("click", () => resetGame(true, "entry"));
    document.querySelector("#restartResult").addEventListener("click", () => resetGame(true, "entry"));
    document.querySelector("#saveResult").addEventListener("click", openShareSheet);
    document.querySelector("#shareSheetMask")?.addEventListener("click", closeShareSheet);
    document.querySelector("#shareCancel")?.addEventListener("click", closeShareSheet);
    document.querySelector("#shareFull")?.addEventListener("click", () => captureShare("full"));
    document.querySelector("#shareKey")?.addEventListener("click", () => captureShare("key"));
    document.querySelector("#shareViewerClose")?.addEventListener("click", closeShareViewer);
    document.querySelector("#copyDebugFlow")?.addEventListener("click", openProcessDebug);
    els.copyProcessDebug?.addEventListener("click", copyProcessDebug);
    els.closeProcessDebug?.addEventListener("click", closeProcessDebug);
    els.processSheet?.addEventListener("click", event => {
      if (event.target === els.processSheet) closeProcessDebug();
    });
    els.leftChoice.addEventListener("click", () => choose("left"));
    els.rightChoice.addEventListener("click", () => choose("right"));
    els.undoChoice.addEventListener("click", undo);

    window.addEventListener("keydown", event => {
      if (!els.processSheet?.hidden) {
        if (event.key === "Escape") closeProcessDebug();
        return;
      }
      if (isTypingTarget(event.target)) return;
      if (document.body.dataset.flow === "play") {
        if (event.key === "ArrowLeft") choose("left");
        if (event.key === "ArrowRight") choose("right");
        if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "z") undo();
      }
    });

    function fitEntryTitle() {
      const el = document.querySelector(".entry-screen .display-title");
      if (!el) return;
      el.style.fontSize = "";
      const avail = (el.parentElement ? el.parentElement.clientWidth : el.clientWidth) || el.clientWidth;
      let size = parseFloat(getComputedStyle(el).fontSize) || 38;
      let guard = 0;
      // 任一行横向超出可用宽、或折行导致超过两行，都逐级缩字号，保证不超两行
      while ((el.scrollWidth > avail + 1 || el.scrollHeight > size * 2.7) && size > 20 && guard++ < 50) {
        size -= 1;
        el.style.fontSize = size + "px";
      }
    }

    window.addEventListener("resize", () => {
      window.requestAnimationFrame(() => {
        if (els.majorGrid?.children.length) layoutMajorCoverflow(coverflowCenter, false);
        if (els.avatarGrid?.children.length) updateGenderSelection();
        fitEntryTitle();
        fitActiveCardContent();
        fitCareerCardLabels();
      });
    });

    function isTypingTarget(target) {
      return target instanceof HTMLElement && Boolean(target.closest("input, select, textarea, [contenteditable='true']"));
    }

    // 非结果页禁止横向拖动页面（iOS 橡皮筋）
    let pageTouchStart = null;
    document.addEventListener("touchstart", event => {
      pageTouchStart = event.touches.length === 1
        ? { x: event.touches[0].clientX, y: event.touches[0].clientY }
        : null;
    }, { passive: true });
    document.addEventListener("touchmove", event => {
      if (!pageTouchStart || event.touches.length !== 1) return;
      if (document.body.dataset.flow === "result") return;
      const dx = Math.abs(event.touches[0].clientX - pageTouchStart.x);
      const dy = Math.abs(event.touches[0].clientY - pageTouchStart.y);
      if (dx > dy && event.cancelable) event.preventDefault();
    }, { passive: false });

    syncDevToolsVisibility();
    setFamilyHope(document.querySelector("#familyHope")?.value);
    applyProfile(readProfile());
    render();
    scheduleWarmup();
    fitEntryTitle();
    if (document.fonts?.ready) document.fonts.ready.then(fitEntryTitle);

    // 调试入口：?flow=setup|play|result 直接跳到对应屏幕
    if (urlParams.get("probe") === "1") {
      window.setTimeout(() => {
        const m = sel => {
          const el = document.querySelector(sel);
          if (!el) return "none";
          const r = el.getBoundingClientRect();
          return `${Math.round(r.top)},${Math.round(r.bottom)},h${Math.round(r.height)}`;
        };
        document.title = JSON.stringify({
          scrollW: document.documentElement.scrollWidth,
          bodyScrollW: document.body.scrollWidth,
          innerW: window.innerWidth,
          inner: window.innerHeight,
          screen: m(".play-screen"),
          deck: m(".deck-shell"),
          stack: m("#cardStack"),
          card: m(".life-card:not(.behind-one):not(.behind-two)"),
          prompt: m(".life-card:not(.behind-one):not(.behind-two) .card-prompt"),
          choices: m(".life-card:not(.behind-one):not(.behind-two) .choice-preview"),
          illus: m(".life-card:not(.behind-one):not(.behind-two) .card-illustration")
        });
      }, 1500);
    }
    // UI 自测探针（TDD red-green）：进入目标屏幕渲染后，把断言数据写进 document.title 供 headless 读取
    const selfTest = urlParams.get("selftest");
    if (selfTest) {
      const fontPx = el => el ? (parseFloat(getComputedStyle(el).fontSize) || 0) : 0;
      const emit = obj => { document.title = "SELFTEST:" + JSON.stringify(obj); };
      const tests = {
        jad80() {
          state.avatar = avatarOptions[0].id;
          enterSetupFromCover();
          startGame();
          window.setTimeout(() => {
            const el = document.querySelector("#cardIndex");
            const age = el && el.querySelector(".play-year-age");
            const count = el && el.querySelector(".play-year-count");
            const text = (el ? el.textContent : "").replace(/\s+/g, "");
            emit({
              test: "jad80",
              text,
              orderOk: /^\d+岁·\d+\/\d+年$/.test(text),
              ageFont: fontPx(age),
              countFont: fontPx(count),
              fontOk: fontPx(age) > 0 && fontPx(count) > 0 && fontPx(age) > fontPx(count),
              nowrap: el ? el.scrollWidth <= el.clientWidth + 1 : false
            });
          }, 1200);
        }
      };
      (tests[selfTest] || (() => emit({ error: "unknown selftest: " + selfTest })))();
    }
    const debugAvatar = urlParams.get("avatar");
    if (debugAvatar && avatarOptions.some(item => item.id === debugAvatar)) {
      state.avatar = debugAvatar;
      applyProfile(readProfile());
    }
    const debugFlow = urlParams.get("flow");
    if (debugFlow === "setup") {
      enterSetupFromCover();
    } else if (debugFlow === "play") {
      enterSetupFromCover();
      startGame();
      const advance = Number(urlParams.get("advance") || 0);
      if (advance > 0) {
        const forcedDir = urlParams.get("dir");
        let done = 0;
        const timer = window.setInterval(() => {
          if (state.isAnimating || state.isLoading || !state.deck[state.index]) return;
          if (done >= advance || state.index >= state.totalYears) {
            window.clearInterval(timer);
            return;
          }
          done += 1;
          const direction = forcedDir === "left" || forcedDir === "right" ? forcedDir : (done % 2 ? "left" : "right");
          choose(direction);
        }, 600);
      }
    } else if (debugFlow === "result") {
      enterSetupFromCover();
      showResult();
    }
  </script>
