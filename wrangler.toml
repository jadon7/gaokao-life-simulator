name = "gaokao-life-simulator"
main = "worker.js"
compatibility_date = "2026-06-08"
account_id = "0eedb61d5ddbea42f84455c9455addb0"

# Workers Logs：保留每次请求的结构化日志，可在 Dashboard 或 `npx wrangler tail` 查看
[observability]
enabled = true

[vars]
LLM_MODEL = "deepseek-v4-flash"
MAINTENANCE_MODE = "0"
MAINTENANCE_MESSAGE = "模型服务正在临时维护，前面的选择不会丢，请稍后再试。"

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[routes]]
pattern = "gaokao.dsxzai.com"
custom_domain = true
