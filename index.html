    function buildChoiceFeedback(card, chosen) {
      if (chosen.consequence) return shortFeedbackText(chosen.consequence);
      if (chosen.feedback) return shortFeedbackText(chosen.feedback);
      return draftChoiceFeedback(card.eventTitle || card.scene, chosen, chosen === card.left ? "A" : "B");
    }

    function shortChoiceFeedback(tag, label) {
      const cleanTag = String(tag || "").trim();
      if (cleanTag && cleanTag !== "A" && cleanTag !== "B") return `选了${cleanTag.slice(0, 6)}`;
      const action = String(label || "").replace(/[。.!！?？]$/g, "").slice(0, 7);
      return `选了${action || cleanTag || "这条路"}`;
    }

    function draftChoiceFeedback(eventTitle, chosen, choiceKey = "") {
      if (chosen?.consequence) return shortFeedbackText(chosen.consequence);
      const event = String(eventTitle || "这件事").replace(/[。.!！?？]/g, "").trim() || "这件事";
      const title = String(chosen?.title || "").trim();
      const label = String(chosen?.label || "").trim();
      const tag = String(chosen?.tag || "").trim();
      const text = `${title}${label}${tag}${choiceKey}`;
      if (/玄学|优化|复盘|计划|整理|学习|询问/.test(text)) {
        return `你没继续拿${event}赌运气，回头把它按系统重做了一轮，虽然慢一点，但作息和专业基本盘都稳住了`;
      }
      if (/稳|边界|止损|确认|放下|告别|沉默|低调|观望|撤|留|明早|退出/.test(text)) {
        return `${event}没再继续吞你的时间，你把节奏从边缘拽了回来，至少最近几天能正常睡觉了`;
      }
      if (/解释|安抚|支持|沟通|破冰|协商|照顾|推荐|一起|留下/.test(text)) {
        return `你先把${event}里的人接住了，场面没闹僵，对方后面也更愿意跟你说真话`;
      }
      if (/冲|接|上|表达|扩大|回应|补救|试|拍板|加入|争取|公开|推进|报名/.test(text)) {
        return `你把${event}硬推着往前走，台面上的人立刻开始按能不能扛事来记你，压力也一起追上来了`;
      }
      return `${event}没有白过，你这一步已经改掉了后面几天的安排，连身边人看你的方式都变了`;
    }

    function buildVisibleChoiceFeedback(choiceText, choiceKey = "") {
      const text = String(choiceText || "").replace(/[。.!！?？]$/g, "").trim();
      if (!text) return "上一年的事已经留下后果，这一年的麻烦不是凭空冒出来的";
      if (choiceKey === "A") return "你把那步硬顶了出去，机会是来了，但这一周的时间表也被连根拔掉";
      if (choiceKey === "B") return "你没继续乱冲，手头节奏稳回来了，可有些人也顺手把期待往回收了半步";
      return "上一年的选择已经开始收账，眼前这局不是凭空掉下来的";
    }

    function reconstructPreviousInfo(card) {
      const targetYear = Number(card?.yearNumber || 0) - 1;
      if (targetYear < 1) return null;
      const historyItem = [...state.history].reverse().find(item => Number(item.year) === targetYear);
      if (!historyItem) return null;
      const choiceKey = historyItem.direction === "left" ? "A" : "B";
      return {
        choiceKey,
        sceneTitle: historyItem.sceneTitle || historyItem.scene,
        choice: historyItem.choice,
        tag: historyItem.tag,
        choiceText: historyItem.choiceText,
        feedback: historyItem.consequence || draftChoiceFeedback(historyItem.sceneTitle || historyItem.scene, {
          title: historyItem.choice,
          label: historyItem.choiceText,
          tag: historyItem.tag
        }, choiceKey)
      };
    }

    function previousChoiceBrief(previousInfo) {
      return cleanFeedbackText(previousInfo?.choice || previousInfo?.choiceText || previousInfo?.tag || "")
        .replace(/[，,。.!！?？；;：:].*$/g, "")
        .trim()
        .slice(0, 7);
    }

    function composePreviousFeedback(card) {
      const modelFeedback = shortFeedbackText(card.modelHeader || card.summary || card.context);
      const previousInfo = card.previous || reconstructPreviousInfo(card);
      if (!previousInfo) {
        const track = chooseOffstageTrack(card, modelFeedback);
        return track || modelFeedback || buildOffstageFallback(textCategories([card.eventTitle, card.scene, card.prompt].filter(Boolean).join("")));
      }
      const choice = previousChoiceBrief(previousInfo);
      const previousOutcome = compactFeedbackPart(previousInfo.feedback || buildVisibleChoiceFeedback(previousInfo.choiceText, previousInfo.choiceKey), 44);
      return [choice ? `你选了「${choice}」` : "上一轮选择", previousOutcome].filter(Boolean).join("，");
    }

    function previousFeedbackTitle(card, feedback = "") {
      const previousInfo = card.previous || reconstructPreviousInfo(card);
      const choice = previousChoiceBrief(previousInfo);
      if (choice) return `选了${choice}`.slice(0, 8);
      const source = [previousInfo?.sceneTitle, previousInfo?.choice, previousInfo?.tag, feedback].filter(Boolean).join("，");
      const rules = [
        [/借钱|还款|钱包|金额/, "朋友借钱"],
        [/外地|远程|拆伙|搭子/, "搭子远行"],
        [/周末|回复|消息|邀约|排进/, "关系排期"],
        [/项目|版本|交付|进度/, "项目压身"],
        [/老师|导师|展示|难活/, "老师递活"],
        [/家里|家庭|亲戚|父母/, "家里开会"],
        [/比赛|路演|创业园|机会/, "机会上桌"],
        [/考试|绩点|保研|考研|论文/, "学业分岔"],
        [/实习|公司|offer|工作/, "工作岔路"],
        [/误会|晚到|解释|含糊/, "关系翻面"],
        [/合照|表白|公开|态度/, "暧昧推进"],
        [/翻车|事故|失误|补漏/, "翻车收尾"],
        [/城市|搬|租|通勤/, "城市成本"],
        [/证书|广告|报名|前辈/, "证书焦虑"]
      ];
      const matched = rules.find(([pattern]) => pattern.test(source));
      if (matched) return matched[1];
      const title = cleanFeedbackText(previousInfo?.sceneTitle || previousInfo?.choice || previousInfo?.tag || feedback)
        .replace(/^第\s*\d+\s*年[\/／、:\s-]*/g, "")
        .replace(/[，。！？!?；;：:].*$/g, "")
        .replace(/你|自己|一次|一个/g, "")
        .trim();
      return (title || "上一年回响").slice(0, 8);
    }

    function previousFeedbackHTML(card) {
      const body = composePreviousFeedback(card) || "上一年的事已经留下后果，另一条线也没停下";
      const title = previousFeedbackTitle(card, body);
      return `
        <aside class="previous-note" aria-label="上一年回响">
          <i class="pin" aria-hidden="true"></i>
          <b>${escapeHTML(title)}</b>
          <span>${escapeHTML(body)}</span>
        </aside>
      `;
    }

    function streamPreviousFeedbackHTML(stream, isNew) {
      if (state.loadError || state.index <= 0) return "";
      const streamCard = {
        yearNumber: state.index + 1,
        scene: stream.sceneTitle || "",
        eventTitle: stream.sceneTitle || "",
        prompt: stream.sceneBody || "",
        modelHeader: stream.summary || "",
        summary: stream.summary || "",
        context: stream.summary || "",
        lifeTrack: stream.lifeTrack || "",
        relationshipTrack: stream.relationshipTrack || "",
        previous: previousInfoForYear(state.index + 1)
      };
      const body = composePreviousFeedback(streamCard);
      if (!body) return "";
      const title = previousFeedbackTitle(streamCard, body);
      return `
        <aside class="previous-note stream-field${isNew("summary")}" aria-label="上一年回响">
          <i class="pin" aria-hidden="true"></i>
          <b>${escapeHTML(title)}</b>
          <span>${escapeHTML(body)}</span>
        </aside>
      `;
    }

    function chooseOffstageTrack(card, modelFeedback = "") {
      const sceneText = [card.eventTitle, card.scene, card.prompt].filter(Boolean).join("");
      const sceneCategories = textCategories(sceneText);
      const candidates = [card.relationshipTrack, card.lifeTrack, modelFeedback]
        .map(value => shortFeedbackText(value))
        .filter(Boolean);
      if (!candidates.length) return "";
      const ranked = candidates
        .map(value => ({
          value,
          score: textSimilarityScore(value, sceneText),
          categoryOverlap: hasCategoryOverlap(textCategories(value), sceneCategories)
        }))
        .filter(item => !item.categoryOverlap)
        .sort((a, b) => a.score - b.score);
      const best = ranked[0];
      if (!best || best.score > 0.62) return "";
      return best.value;
    }

    function buildOffstageFallback(sceneCategories) {
      if (sceneCategories.has("relationship")) {
        return "你们这边刚闹出动静，课表和项目那边也没停，家里还顺手把下一步安排问到了脸上";
      }
      if (sceneCategories.has("health")) {
        return "你把作息往回救了一点，家里这才没继续拿睡觉时间当审问题";
      }
      if (sceneCategories.has("work") || sceneCategories.has("study")) {
        const cast = getStoryCast();
        return `${cast.relationName}已经会顺手给你留机房靠窗的位置，你嘴上装没事，对方其实早把你排进日常了`;
      }
      return "你这边刚收完残局，另一头的人和事也开始重新按你现在的分量来对待你";
    }

    function textCategories(value) {
      const text = String(value || "");
      const categories = new Set();
      [
        ["relationship", /恋|爱|暧昧|暗恋|表白|伴侣|陪伴|对象|结婚|分手|复合|喜欢|心动|搭子|约会/],
        ["health", /健康|身体|体检|医院|医生|熬夜|作息|胸闷|心律|生病|焦虑|睡眠|运动|爬山|休息/],
        ["family", /父母|家里|家庭|亲戚|妈妈|爸爸|孩子|老人|婚礼|买房|房贷/],
        ["friend", /朋友|室友|同学|同事|群|饭搭子|兄弟|闺蜜|聚会/],
        ["work", /工作|项目|上线|老板|领导|甲方|公司|岗位|调岗|职场|代码|产品|需求|汇报|团队|加班/],
        ["study", /课程|考试|作业|社团|导师|竞赛|保研|考研|论文|实习|专业课|学校|大学/]
      ].forEach(([category, pattern]) => {
        if (pattern.test(text)) categories.add(category);
      });
      return categories;
    }

    function hasCategoryOverlap(left, right) {
      for (const item of left) {
        if (right.has(item)) return true;
      }
      return false;
    }

    function textSimilarityScore(a, b) {
      const left = uniqueTextTokens(a);
      const right = uniqueTextTokens(b);
      if (!left.size || !right.size) return 0;
      let shared = 0;
      left.forEach(token => {
        if (right.has(token)) shared += 1;
      });
      return shared / Math.max(1, Math.min(left.size, right.size));
    }

    function uniqueTextTokens(value) {
      const text = String(value || "")
        .replace(/[，。！？!?；;：:\s"'“”‘’、（）()《》]/g, "")
        .trim();
      const tokens = new Set();
      for (let size = 2; size <= 3; size += 1) {
        for (let index = 0; index <= text.length - size; index += 1) {
          const token = text.slice(index, index + size);
          if (!/[的一是在和了有就把也都而及与或你我他她它这那]/.test(token)) {
            tokens.add(token);
          }
        }
      }
      return tokens;
    }

    function cleanFeedbackText(value) {
      const raw = String(value || "").trim();
      return raw
        .replace(/^[^：:]{1,6}[:：]\s*/, "")
        .replace(/[明暗]线/g, "")
        .replace(/[。.!！?？]+$/g, "")
        .trim();
    }

    function compactFeedbackPart(value, maxLength) {
      const clean = cleanFeedbackText(value).replace(/[。.!！?？；;]+$/g, "").trim();
      if (!clean || clean.length <= maxLength) return clean;
      const clipped = clean.slice(0, maxLength);
      const boundary = Math.max(
        clipped.lastIndexOf("，"),
        clipped.lastIndexOf("、"),
        clipped.lastIndexOf("。"),
        clipped.lastIndexOf("；")
      );
      return (boundary >= Math.floor(maxLength * 0.58) ? clipped.slice(0, boundary) : clipped).trim();
    }

    function shortFeedbackText(value) {
      const maxLength = 48;
      const clean = cleanFeedbackText(value)
        .replace(/你选择了[^，。！？!?；;]{0,42}[，。！？!?；;]?/g, "")
        .replace(/选择了[^，。！？!?；;]{0,42}[，。！？!?；;]?/g, "")
        .replace(/\b[AB][.。:：]\s*/g, "")
        .replace(/\s+/g, "");
      if (!clean) return "";
      const pieces = clean.match(/[^。！？!?；;]+[。！？!?；;]?/g) || [clean];
      let result = "";
      for (const piece of pieces) {
        const next = `${result}${piece}`;
        if (result && next.length > maxLength) break;
        result = next;
        if (result.length >= 36 && /[。！？!?；;]$/.test(result)) break;
      }
      if (!result) result = clean;
      if (result.length > maxLength) {
        const clipped = result.slice(0, maxLength);
        const boundary = Math.max(
          clipped.lastIndexOf("。"),
          clipped.lastIndexOf("！"),
          clipped.lastIndexOf("？"),
          clipped.lastIndexOf("；"),
          clipped.lastIndexOf("，")
        );
        result = boundary >= 28 ? clipped.slice(0, boundary + 1) : clipped;
      }
      return result.replace(/[。.!！?？；;]+$/g, "").trim();
    }

    function composeNextHeader(choiceFeedback, modelSummary = "") {
      const summary = briefHeaderText(modelSummary);
      const choice = briefHeaderText(choiceFeedback);
      if (!summary) return `上年：${choice || "这一年留下了新后果"}`.slice(0, 48);
      const suffix = choice ? `｜${choice}` : "";
      return `上年：${summary}${suffix}`.slice(0, 96);
    }

    function briefHeaderText(value) {
      const raw = String(value || "").trim();
      return raw
        .replace(/^[^：:]{1,6}[:：]\s*/, "")
        .replace(/[明暗]线/g, "")
        .replace(/[。.!！?？]+$/g, "")
        .trim()
        .slice(0, 70);
    }

    function applyFeedbackToNextCard(card, chosen) {
      const nextYear = card.yearNumber + 1;
      if (nextYear > state.totalYears) return;
      const feedback = buildChoiceFeedback(card, chosen);
      state.feedbackByYear[nextYear] = {
        choiceKey: chosen === card.left ? "A" : "B",
        sceneTitle: card.eventTitle || card.scene,
        choice: chosen.title || chosen.tag,
        tag: chosen.tag,
        choiceText: chosen.label,
        feedback
      };
      const nextCard = state.deck[nextYear - 1];
      if (nextCard) applyPreviousInfoToCard(nextCard);
    }

    async function loadAnnualCard(yearNumber) {
      const path = yearNumber === 1 ? "/api/game/start" : "/api/game/next";
      resetStreamState();
      const payload = {
        profile: state.profile,
        history: yearNumber === 1 ? [] : state.history,
        year: yearNumber
      };
      const data = await apiPostStream(path, payload, updateStreamPreview);
      if (!data.card) throw new Error(`第 ${yearNumber} 年生成失败：接口没有返回卡片`);
      const card = normalizeRemoteCard(data.card);
      applyPreviousInfoToCard(card);
      state.deck[yearNumber - 1] = card;
      resetStreamState();
      return card;
    }

    function branchPrefetchSignature(card) {
      return JSON.stringify({
        profile: profileSignature(state.profile),
        index: state.index,
        historyLength: state.history.length,
        year: card?.yearNumber || state.index + 1,
        left: `${card?.left?.label || ""}|${card?.left?.consequence || ""}`,
        right: `${card?.right?.label || ""}|${card?.right?.consequence || ""}`
      });
    }

    function branchPrefetchPayload(card, direction, nextYear) {
      return {
        profile: state.profile,
        history: [...state.history, buildHistoryItem(card, direction, state.index)],
        year: nextYear
      };
    }

    function clearBranchPrefetch() {
      window.clearTimeout(state.branchPrefetchTimer);
      state.branchPrefetchTimer = null;
      state.branchPrefetch = null;
    }

    function scheduleBranchPrefetchForCurrentCard() {
      window.clearTimeout(state.branchPrefetchTimer);
      state.branchPrefetchTimer = null;
      if (state.isLoading || state.isAnimating || state.loadError || state.result) return;
      if (state.index >= state.totalYears - 1) return;
      const card = state.deck[state.index];
      if (!card) return;
      const signature = branchPrefetchSignature(card);
      if (state.branchPrefetch?.signature === signature) return;
      state.branchPrefetchTimer = window.setTimeout(() => {
        state.branchPrefetchTimer = null;
        startBranchPrefetchForCurrentCard(card, signature);
      }, 0);
    }

    function startBranchPrefetchForCurrentCard(card, signature) {
      if (state.branchPrefetch?.signature === signature) return state.branchPrefetch;
      if (signature !== branchPrefetchSignature(card)) return null;
      const nextYear = (card.yearNumber || state.index + 1) + 1;
      if (nextYear > state.totalYears) return null;
      prefetchCardArtForYearNumber(nextYear);
      const prefetch = {
        signature,
        index: state.index,
        nextYear,
        branches: {}
      };
      state.branchPrefetch = prefetch;
      ["left", "right"].forEach(direction => {
        const branch = {
          direction,
          payload: branchPrefetchPayload(card, direction, nextYear),
          pending: true,
          error: null
        };
        branch.promise = apiPost("/api/game/next", branch.payload)
          .then(data => data?.card || null)
          .catch(error => {
            branch.error = error;
            return null;
          })
          .finally(() => {
            branch.pending = false;
          });
        prefetch.branches[direction] = branch;
      });
      return prefetch;
    }

    function takeBranchPrefetch(direction, card) {
      const signature = branchPrefetchSignature(card);
      const branch = state.branchPrefetch?.signature === signature
        ? state.branchPrefetch.branches?.[direction]
        : null;
      clearBranchPrefetch();
      return branch || null;
    }

    async function loadAnnualCardAfterChoice(yearNumber, prefetchedBranch) {
      if (prefetchedBranch?.promise) {
        const rawCard = await prefetchedBranch.promise;
        if (rawCard) {
          const card = normalizeRemoteCard(rawCard);
          applyPreviousInfoToCard(card);
          state.deck[yearNumber - 1] = card;
          resetStreamState();
          return card;
        }
      }
      return loadAnnualCard(yearNumber);
    }

    function restoreFeedbackAfterUndo(previous) {
      const nextYear = previous.index + 2;
      delete state.feedbackByYear[nextYear];
      const nextCard = state.deck[nextYear - 1];
      if (nextCard) nextCard.previous = null;
    }

    function profileSignature(profile) {
      return JSON.stringify({
        name: profile.name,
        gender: profile.gender,
        province: profile.province,
        score: profile.score,
        dream: profile.dream,
        hope: profile.hope,
        keywords: profile.keywords,
        avatar: profile.avatar,
        major: profile.major,
        majorLabel: profile.majorLabel
      });
    }

    function hasProfileSignal(profile) {
      return Boolean(
        profile.major ||
        profile.name !== "未命名考生" ||
        profile.province !== "未知省份" ||
        profile.score !== "未知分数" ||
        profile.dream !== "暂未填写" ||
        profile.keywords !== "观察中"
      );
    }

    function scheduleWarmup() {
      window.clearTimeout(state.warmupTimer);
      state.warmupTimer = null;
      state.warmupPromise = null;
      state.warmupSignature = "";
      state.warmupCards = [];
    }

    function startWarmup() {
      if (document.body.dataset.flow !== "setup") return;
      const profile = readProfile();
      if (!hasProfileSignal(profile)) return;
      const signature = profileSignature(profile);
      if (state.warmupSignature === signature && (state.warmupPromise || state.warmupCards?.length)) return;
      state.warmupSignature = signature;
      state.warmupCards = [];
      state.warmupPromise = apiPost("/api/game/batch", {
        profile,
        history: [],
        startYear: 1,
        count: Math.min(firstCardSize, deepseekBatchSize)
      })
        .then(data => {
          const cards = Array.isArray(data.cards) ? data.cards.map(normalizeRemoteCard) : [];
          if (state.warmupSignature === signature) state.warmupCards = cards;
          return cards;
        })
        .catch(() => [])
        .finally(() => {
          if (state.warmupSignature === signature) state.warmupPromise = null;
        });
    }

    function useReadyWarmupDeck(signature) {
      if (state.warmupSignature !== signature || !state.warmupCards?.length) return false;
      state.deck = state.warmupCards.map(card => ({ ...card }));
      return true;
    }

    async function useWarmupDeck(signature) {
      if (state.warmupSignature !== signature) return false;
      if (state.warmupCards?.length) {
        state.deck = state.warmupCards.map(card => ({ ...card }));
        return true;
      }
      if (!state.warmupPromise) return false;
      const cards = await state.warmupPromise;
      if (state.warmupSignature !== signature || !cards?.length) return false;
      state.deck = cards.map(card => ({ ...card }));
      return true;
    }

    function appendGeneratedCards(cards) {
      const generatedHistoryDepth = state.history.length;
      cards.map(normalizeRemoteCard).forEach(card => {
        const index = Math.max(0, card.yearNumber - 1);
        const existing = state.deck[index];
        if (existing?.source === "fallback" && index <= state.index) return;
        if (isDuplicateQuestionCard(card, card.yearNumber)) {
          if (!existing || isReplaceableFallback(card.yearNumber)) {
            state.deck[index] = buildBridgeCard(card.yearNumber);
          }
          return;
        }
        card.generatedHistoryDepth = generatedHistoryDepth;
        applyPreviousInfoToCard(card);
        state.deck[index] = card;
      });
    }

    function appendFixedCard(yearNumber) {
      if (yearNumber < 1 || yearNumber > state.totalYears) return false;
      if (!isFixedSlot(yearNumber) || state.deck[yearNumber - 1]) return false;
      const card = buildFixedCard(yearNumber);
      if (!card) return false;
      applyPreviousInfoToCard(card);
      state.deck[yearNumber - 1] = card;
      return true;
    }

    async function ensureDeckBuffer(size = batchSize, options = {}) {
      if (state.bufferPromise) return state.bufferPromise;
      const targetLength = Math.min(state.totalYears, state.index + size);
      const firstMissing = findFirstMissingYear(targetLength);
      if (!firstMissing) return Promise.resolve();
      state.isBuffering = true;
      state.bufferPromise = (async () => {
        let startYear = firstMissing;
        while (startYear <= targetLength) {
          if (appendFixedCard(startYear)) {
            startYear += 1;
            continue;
          }
          if (state.deck[startYear - 1] && !isReplaceableFallback(startYear)) {
            startYear += 1;
            continue;
          }
          const requestedCount = options.exact ? Math.max(1, targetLength - startYear + 1) : deepseekBatchSize;
          const count = Math.min(
            countRemoteYearsFrom(startYear, requestedCount),
            state.totalYears - startYear + 1,
            deepseekBatchSize
          );
          if (count <= 0) {
            appendFixedCard(startYear);
            startYear += 1;
            continue;
          }
        const data = await apiPost("/api/game/batch", {
          profile: state.profile,
          history: state.history,
          startYear,
          count
        });
        appendGeneratedCards(Array.isArray(data.cards) ? data.cards : []);
          startYear += count;
          if (options.exact) break;
        }
        render();
      })();
      try {
        await state.bufferPromise;
      } finally {
        state.isBuffering = false;
        state.bufferPromise = null;
        render();
      }
    }

    async function ensureCurrentCard() {
      if (state.deck[state.index]) return;
      const startYear = state.index + 1;
      if (appendFixedCard(startYear)) {
        render();
        return;
      }
      state.deck[state.index] = buildBridgeCard(startYear);
      render();
      const data = await apiPost("/api/game/batch", {
        profile: state.profile,
        history: state.history,
        startYear,
        count: 1
      });
      appendGeneratedCards(Array.isArray(data.cards) ? data.cards : []);
      render();
    }

    function findFirstMissingYear(targetLength) {
      for (let year = 1; year <= targetLength; year += 1) {
        if (!state.deck[year - 1] || isReplaceableFallback(year)) return year;
      }
      return 0;
    }

    function isReplaceableFallback(yearNumber) {
      const card = state.deck[yearNumber - 1];
      return Boolean(card && card.source === "fallback" && yearNumber - 1 > state.index);
    }

    function questionTextForDuplicate(card) {
      return [card?.fixedKey, card?.eventTitle, card?.scene, card?.prompt]
        .filter(Boolean)
        .join(" ");
    }

    function isDuplicateQuestionCard(card, ignoreYear = 0) {
      const currentText = questionTextForDuplicate(card);
      if (!currentText) return false;
      const currentTitle = String(card?.eventTitle || card?.scene || "").trim();
      const fixedKey = card?.fixedKey || "";
      const seenCards = [
        ...state.deck.filter(Boolean),
        ...state.history.map(item => ({
          yearNumber: item.year,
          fixedKey: item.fixedKey || "",
          eventTitle: item.sceneTitle || "",
          prompt: item.scene || ""
        }))
      ];
      return seenCards.some(item => {
        if (!item || Number(item.yearNumber) === Number(ignoreYear)) return false;
        if (fixedKey && item.fixedKey === fixedKey) return true;
        const title = String(item.eventTitle || item.scene || "").trim();
        if (currentTitle && title && currentTitle === title) return true;
        return textSimilarityScore(currentText, questionTextForDuplicate(item)) >= 0.72;
      });
    }

    function parseSceneParts(value, fallbackEvent = "这一年的岔路口") {
      const raw = String(value || "").trim();
      const eventMatch = raw.match(/(?:^|\n)\s*事件[:：]\s*([^\n]+)/);
      const contextMatch = raw.match(/(?:^|\n)\s*情境[:：]\s*([\s\S]+)/);
      if (eventMatch || contextMatch) {
        return {
          event: (eventMatch?.[1] || fallbackEvent).trim(),
          context: (contextMatch?.[1] || raw.replace(eventMatch?.[0] || "", "")).trim()
        };
      }
      const sentenceMatch = raw.match(/^(.{8,34}?[。！？!?])([\s\S]*)$/);
      if (sentenceMatch && raw.length > 52) {
        return {
          event: sentenceMatch[1].replace(/[。！？!?]$/g, "").trim(),
          context: sentenceMatch[2].trim() || raw
        };
      }
      return {
        event: fallbackEvent,
        context: raw || "这一年的故事正在生成。"
      };
    }

    function formatAge(yearNumber) {
      return `${17 + Number(yearNumber || 1)} 岁`;
    }

    function previousInfoForYear(yearNumber) {
      const info = state.feedbackByYear[yearNumber];
      if (!info) return null;
      if (typeof info === "string") return { choiceKey: "", choiceText: info, feedback: info };
      return info;
    }

    function applyPreviousInfoToCard(card) {
      const info = previousInfoForYear(card.yearNumber);
      if (!info) return card;
      card.previous = info;
      return card;
    }

    function shouldShowPreviousFeedback(card) {
      if (Number(card?.yearNumber || 0) <= 1) return false;
      return Boolean(composePreviousFeedback(card));
    }

    function normalizeRemoteCard(card) {
      const yearNumber = Number(card.yearNumber || String(card.question || card.year || "").match(/\d+/)?.[0] || state.index + 1);
      const leftChoice = normalizeChoicePayload(card.a || card.left, "A");
      const rightChoice = normalizeChoicePayload(card.b || card.right, "B");
      const source = card.source || "deepseek";
      const hasStructuredScene = typeof card.scene === "object" && card.scene;
      const sceneTitle = hasStructuredScene ? card.scene.title : (card.sceneTitle || card.event || card.title || `第 ${yearNumber} 年事件`);
      const sceneBody = hasStructuredScene ? card.scene.body : (card.scene || card.prompt);
      const sceneParts = hasStructuredScene
        ? {
            event: String(sceneTitle || `第 ${yearNumber} 年事件`).trim(),
            context: String(sceneBody || "这一年的故事正在生成。").trim()
          }
        : parseSceneParts(sceneBody, sceneTitle);
      const normalizedCallbacks = Array.isArray(card.callbackSeeds)
        ? card.callbackSeeds.slice(0, 3)
        : (Array.isArray(card.callbacks) ? card.callbacks.slice(0, 3) : []);
      return {
        source,
        yearNumber,
        year: card.question || `第 ${yearNumber} 年 / ${state.totalYears}`,
        age: formatAge(yearNumber),
        scene: sceneParts.event,
        eventTitle: sceneParts.event,
        modelHeader: card.summary || card.context || "",
        prompt: sceneParts.context,
        context: card.summary || card.context || "",
        summary: card.summary || "",
        phase: card.phase || "",
        mainTrack: card.mainTrack || "",
        lifeTrack: card.lifeTrack || "",
        relationshipTrack: card.relationshipTrack || "",
        callbackSeeds: normalizedCallbacks,
        fixedKey: card.fixedKey || "",
        previous: null,
        leftHint: "A",
        rightHint: "B",
        left: {
          label: leftChoice.label || "选择 A",
          title: leftChoice.title,
          desc: leftChoice.desc,
          tag: leftChoice.tag || card.left?.tag || "A",
          consequence: leftChoice.consequence || card.left?.consequence || "",
          riasec: normalizeRiasecScores((card.a || card.left)?.riasec),
          delta: card.left?.delta || deriveDeltaFromRiasec((card.a || card.left)?.riasec, { stability: 3, discipline: 2, explore: -1 }),
          feedback: card.left?.feedback || draftChoiceFeedback(sceneParts.event, { ...leftChoice, label: leftChoice.label || "选择 A" }, "A")
        },
        right: {
          label: rightChoice.label || "选择 B",
          title: rightChoice.title,
          desc: rightChoice.desc,
          tag: rightChoice.tag || card.right?.tag || "B",
          consequence: rightChoice.consequence || card.right?.consequence || "",
          riasec: normalizeRiasecScores((card.b || card.right)?.riasec),
          delta: card.right?.delta || deriveDeltaFromRiasec((card.b || card.right)?.riasec, { explore: 3, ambition: 2, stability: -1 }),
          feedback: card.right?.feedback || draftChoiceFeedback(sceneParts.event, { ...rightChoice, label: rightChoice.label || "选择 B" }, "B")
        }
      };
    }

    function normalizeRiasecScores(value) {
      if (!value || typeof value !== "object" || Array.isArray(value)) return null;
      const keys = ["R", "I", "A", "S", "E", "C"];
      const scores = {};
      let hasValue = false;
      keys.forEach(key => {
        const numeric = Math.max(0, Number(value[key]) || 0);
        scores[key] = numeric;
        if (numeric > 0) hasValue = true;
      });
      return hasValue ? scores : null;
    }

    function deriveDeltaFromRiasec(value, fallback) {
      const riasec = normalizeRiasecScores(value);
      if (!riasec) return fallback;
      return {
        explore: riasec.I * 2 + riasec.A * 2,
        discipline: riasec.C * 2 + riasec.I,
        empathy: riasec.S * 2,
        stability: riasec.C * 2,
        ambition: riasec.E * 2,
        pressure: riasec.R + riasec.C
      };
    }

    function normalizeChoicePayload(value, fallbackTag) {
      if (value && typeof value === "object" && !Array.isArray(value)) {
        const title = String(value.title || value.label || "").replace(/^[AB][.。]\s*/, "").trim();
        const desc = String(value.desc || value.description || "").trim();
        const tag = String(value.tag || fallbackTag || "").replace(/^[AB]$/i, "").trim();
        const label = String(value.label || [title, desc].filter(Boolean).join("，")).replace(/^[AB][.。]\s*/, "").trim();
        const consequence = String(value.consequence || value.feedback || "").trim();
        return {
          title: title || conciseChoiceTitle(label || fallbackTag),
          desc: desc || choiceDescriptionFallback(label, title),
          tag: tag || title || fallbackTag,
          consequence,
          label: label || [title, desc].filter(Boolean).join("，")
        };
      }
      const raw = String(value || "").replace(/^[AB][.。]\s*/, "").trim();
      const title = conciseChoiceTitle(raw || fallbackTag);
      return {
        title,
        desc: choiceDescriptionFallback(raw, title),
        tag: title || fallbackTag,
        consequence: "",
        label: raw || title || fallbackTag
      };
    }

    function choiceDescriptionFallback(raw, title) {
      const text = String(raw || "")
        .replace(new RegExp(`^${escapeRegExp(title || "")}[，,。.!！?？；;\\s]*`), "")
        .trim();
      return text || String(raw || title || "").trim();
    }

    function cardTextClass(card) {
      const length = [card.scene, card.prompt, composePreviousFeedback(card), card.left?.label, card.right?.label]
        .map(value => String(value || "").length)
        .reduce((sum, value) => sum + value, 0);
      if (length > 175) return "layout-reading";
      if (length > 120) return "layout-balanced";
      return "layout-compact";
    }

    function fitCardContent(article) {
      window.requestAnimationFrame(() => {
        const illustration = article.querySelector(".card-illustration");
        const title = article.querySelector(".card-title");
        const prompt = article.querySelector(".card-prompt");
        const choiceTitles = [...article.querySelectorAll(".choice-pill b")];
        const choiceTexts = [...article.querySelectorAll(".choice-pill span, .choice-pill strong")];
        let guard = 0;
        while (article.scrollHeight > article.clientHeight + 1 && guard < 24) {
          const imageHeight = illustration?.getBoundingClientRect().height || 0;
          if (illustration && imageHeight > 4) {
            illustration.style.minHeight = "0px";
            illustration.style.flexBasis = `${Math.max(0, imageHeight - 12)}px`;
          } else {
            const promptSize = parseFloat(getComputedStyle(prompt).fontSize) || 16;
            const titleSize = parseFloat(getComputedStyle(title).fontSize) || 38;
            if (prompt && promptSize > 12) prompt.style.fontSize = `${promptSize - 0.5}px`;
            if (title && titleSize > 30) title.style.fontSize = `${titleSize - 1}px`;
            choiceTitles.forEach(el => {
              const size = parseFloat(getComputedStyle(el).fontSize) || 15;
              if (size > 12) el.style.fontSize = `${size - 0.5}px`;
            });
            choiceTexts.forEach(el => {
              const size = parseFloat(getComputedStyle(el).fontSize) || 11;
              if (size > 9) el.style.fontSize = `${size - 0.5}px`;
            });
          }
          guard += 1;
        }
      });
    }

    function choiceCardHTML(direction, choice, hint) {
      const parts = choiceDisplayParts(choice, hint);
      return `
        <button class="choice-pill ${direction}" type="button">
          <b class="choice-title">${escapeHTML(parts.title)}</b>
          <span class="choice-desc">${escapeHTML(parts.description)}</span>
        </button>
      `;
    }

    function choiceDisplayParts(choice, hint) {
      if (choice?.title || choice?.desc) {
        const title = String(choice.title || conciseChoiceTitle(choice.label || "")).trim();
        const description = String(choice.desc || choice.description || choiceDescriptionFallback(choice.label, title)).trim();
        const tag = String(choice.tag || hint || title).replace(/^[AB]$/i, "").trim();
        return {
          title: title || "做选择",
          description: description || String(choice.label || "").trim() || "按这个方向推进",
          tag: tag || title || "选择"
        };
      }
      const raw = String(choice?.label || "").trim();
      const cleanHint = String(hint || "").replace(/^[AB]$/i, "").trim();
      const tag = String(choice?.tag || cleanHint || "").replace(/^[AB]$/i, "").trim();
      const title = cleanHint || conciseChoiceTitle(raw);
      let description = raw
        .replace(new RegExp(`^${escapeRegExp(title)}[，,。.!！?？；;\\s]*`), "")
        .replace(/^把/, "")
        .replace(/这条路走到底[。.!！?？]?$/g, "")
        .trim();
      if (!description || description === raw) description = raw;
        return {
          title: title || "选择",
          description: description || raw || "沿着这条路继续走。",
          tag: tag || title || "人生岔路"
        };
      }

    function conciseChoiceTitle(value) {
      const raw = String(value || "").trim();
      const first = raw.split(/[，,。.!！?？；;]/).map(item => item.trim()).find(Boolean) || raw;
      return first.length > 7 ? first.slice(0, 7) : first;
    }

    function escapeRegExp(value) {
      return String(value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function renderDeck() {
      els.cardStack.innerHTML = "";
      if ((state.isLoading && !state.deck[state.index]) || state.loadError) {
        renderLoadingCard();
        return;
      }
      const card = state.deck[state.index];
      if (!card) {
        renderLoadingCard();
        return;
      }
      // 只有顶牌渲染真实内容，后面的牌一律用空白骨架垫底，避免滑动时剧透
      const article = document.createElement("article");
      article.className = "life-card";
      article.classList.add(cardTextClass(card));
      const yearNumber = Math.min(state.index + 1, state.totalYears);
      article.innerHTML = `
        ${shouldShowPreviousFeedback(card) ? previousFeedbackHTML(card) : ""}
        <div class="card-head">
          <h3 class="card-title">${escapeHTML(card.eventTitle || card.scene)}</h3>
        </div>
        <div class="card-illustration" aria-hidden="true"></div>
        <p class="card-prompt">${escapeHTML(card.prompt)}</p>
        <div class="choice-preview">
          ${choiceCardHTML("left", card.left, card.leftHint)}
          ${choiceCardHTML("right", card.right, card.rightHint)}
        </div>
      `;
      bindDrag(article);
      bindCardChoices(article);
      els.cardStack.appendChild(article);
      applyCardArt(article.querySelector(".card-illustration"), sceneArtUrls(state.index));
      fitCardContent(article);

      appendGhostCards(1);
      prefetchUpcomingArt();

      els.leftChoiceText.textContent = card.leftHint;
      els.rightChoiceText.textContent = card.rightHint;
    }

    function ghostCardHTML() {
      return `
        <span class="sk sk-title-bar"></span>
        <div class="sk sk-illus"></div>
        <span class="sk sk-line"></span>
        <span class="sk sk-line short"></span>
      `;
    }

    function appendGhostCards(loadedCount) {
      const expected = Math.min(stackSize, Math.max(0, state.totalYears - state.index));
      for (let stackIndex = Math.max(1, loadedCount); stackIndex < expected; stackIndex += 1) {
        const ghost = document.createElement("article");
        ghost.className = `life-card ghost-card ${stackIndex === 1 ? "behind-one" : "behind-two"}`;
        ghost.setAttribute("aria-hidden", "true");
        ghost.innerHTML = ghostCardHTML();
        els.cardStack.appendChild(ghost);
      }
    }

    function renderLoadingCard() {
      [2, 1].forEach(stackIndex => {
        if (state.index + stackIndex >= state.totalYears) return;
        const back = document.createElement("article");
        back.className = `life-card ghost-card ${stackIndex === 1 ? "behind-one" : "behind-two"}`;
        back.setAttribute("aria-hidden", "true");
        back.innerHTML = ghostCardHTML();
        els.cardStack.appendChild(back);
      });
      const article = document.createElement("article");
      article.className = `life-card ${state.loadError ? "" : "loading-card"}`;
      const stream = state.streamFields || {};
      const now = performance.now();
      const isNew = key => Number(state.streamNewFields?.[key] || 0) > now ? " is-stream-new" : "";
      const titleHTML = stream.sceneTitle
        ? `<span class="stream-field${isNew("sceneTitle")}">${escapeHTML(stream.sceneTitle)}</span>`
        : `<span class="stream-placeholder" aria-label="标题生成中"></span>`;
      const bodyHTML = stream.sceneBody
        ? `<span class="stream-field${isNew("sceneBody")}">${escapeHTML(stream.sceneBody)}</span>`
        : `<span class="stream-placeholder" aria-label="正文生成中"></span>`;
      const leftTitle = stream.leftTitle || "A";
      const leftDesc = stream.leftDesc || "";
      const rightTitle = stream.rightTitle || "B";
      const rightDesc = stream.rightDesc || "";
      const leftDescHTML = leftDesc
        ? `<span class="stream-field${isNew("leftDesc")}">${escapeHTML(leftDesc)}</span>`
        : `<span class="stream-placeholder" aria-label="选项生成中"></span>`;
      const rightDescHTML = rightDesc
        ? `<span class="stream-field${isNew("rightDesc")}">${escapeHTML(rightDesc)}</span>`
        : `<span class="stream-placeholder" aria-label="选项生成中"></span>`;
      article.innerHTML = `
        ${streamPreviousFeedbackHTML(stream, isNew)}
        <div class="card-head">
          <h3 class="card-title">${state.loadError ? "这一年卡住了" : titleHTML}</h3>
        </div>
        <div class="card-illustration" aria-hidden="true"></div>
        <p class="card-prompt">${state.loadError ? escapeHTML(state.loadError) : bodyHTML}</p>
        <div class="choice-preview">
          <button class="choice-pill left" type="button" ${state.loadError ? "" : "disabled"}>
            <b class="choice-title">${state.loadError ? "重试" : `<span class="stream-field${isNew("leftTitle")}">${escapeHTML(leftTitle)}</span>`}</b>
            <span class="choice-desc">${state.loadError ? "重新生成这一年" : leftDescHTML}</span>
          </button>
          <button class="choice-pill right" type="button" ${state.loadError ? "" : "disabled"}>
            <b class="choice-title">${state.loadError ? "返回" : `<span class="stream-field${isNew("rightTitle")}">${escapeHTML(rightTitle)}</span>`}</b>
            <span class="choice-desc">${state.loadError ? "回到资料页" : rightDescHTML}</span>
          </button>
        </div>
        ${state.loadError ? "" : `<div class="card-loading-orbit" aria-hidden="true"><i></i><i></i><i></i></div>`}
      `;
      if (state.loadError) {
        article.querySelector(".choice-pill.left").addEventListener("click", retryCurrentStep);
        article.querySelector(".choice-pill.right").disabled = false;
        article.querySelector(".choice-pill.right").addEventListener("click", () => showFlow("setup"));
      }
      els.cardStack.appendChild(article);
      fitCardContent(article);
      els.leftChoiceText.textContent = state.loadError ? "重试" : "A";
      els.rightChoiceText.textContent = state.loadError ? "等待" : "B";
    }

    const playTopPalette = ["#5fecd4", "#5fd9ec", "#6fc1ff", "#8da8ff", "#b596ff", "#f0a4d8", "#ff9fae", "#ffc465"];

    function syncPlayTopColor() {
      const total = Math.max(1, state.totalYears);
      const stage = Math.min(playTopPalette.length - 1, Math.floor((state.index / total) * playTopPalette.length));
      document.body.style.setProperty("--play-top", playTopPalette[stage]);
      document.documentElement.style.setProperty("--play-top", playTopPalette[stage]);
      if (document.body.dataset.flow === "play") syncThemeColor();
    }

    function renderProgress() {
      const total = state.totalYears;
      const current = state.deck[state.index] || state.deck[total - 1];
      const answered = Math.min(state.index, total);
      const shownYear = Math.min(state.index + 1, total);
      els.cardIndex.innerHTML = `<span class="play-year-age">${17 + shownYear}岁</span><span class="play-year-count">·${shownYear}/${total}年</span>`;
      els.progressFill.style.width = `${total ? (answered / total) * 100 : 0}%`;
      syncPlayTopColor();
      if (!current && !state.loadError) {
        els.chapterTitle.textContent = "牌堆准备中。";
        els.chapterNote.textContent = "第一张牌会先翻出来，后面的牌会继续叠进来。";
      } else if (state.loadError) {
        els.chapterTitle.textContent = "生成失败，等待重试。";
        els.chapterNote.textContent = "本年不会推进，重试成功后继续翻牌。";
      } else {
        els.chapterTitle.textContent = state.index < total ? pickChapterNote() : "第五幕 · 最终回响";
        els.chapterNote.textContent = state.index < total && current ? current.year : "最终身份已经合成。";
      }
      els.undoChoice.disabled = state.history.length === 0 || state.isAnimating || !current;
      els.leftChoice.disabled = state.isAnimating || Boolean(state.loadError) || !current;
      els.rightChoice.disabled = state.isAnimating || Boolean(state.loadError) || !current;
    }

    function pickChapterNote() {
      const ratio = state.totalYears ? state.index / state.totalYears : 0;
      if (ratio < 0.2) return "第一幕 · 开局身份";
      if (ratio < 0.45) return "第二幕 · 职业路线";
      if (ratio < 0.7) return "第三幕 · 中期反转";
      if (ratio < 0.95) return "第四幕 · 家庭与社会副本";
      return "第五幕 · 最终回响";
    }

    function renderTraits() {
      els.traitList.innerHTML = Object.entries(traits).map(([key, trait]) => {
        const value = clamp(state.values[key], 0, 100);
        return `
          <div class="trait" style="--trait-color: ${trait.color}">
            <div class="trait-top">
              <span>${trait.label}</span>
              <span>${value}</span>
            </div>
            <div class="bar"><span style="width:${value}%"></span></div>
          </div>
        `;
      }).join("");
    }

    function renderTags() {
      const profile = state.profile.name ? state.profile : readProfile();
      const topTraits = getTopTraits(3).map(([key]) => traits[key].label);
      const tags = [
        `${profile.province}${profile.score}分`,
        profile.hope,
        ...topTraits
      ];
      els.tagRow.innerHTML = tags.map(tag => `<span class="tag">${escapeHTML(tag)}</span>`).join("");
    }

    function renderTimeline() {
      const total = state.totalYears;
      const milestones = [
        { at: 5, title: "第一幕 开局身份", body: getCollegeNode() },
        { at: 10, title: "第二幕 职业路线", body: getCareerNode() },
        { at: 13, title: "第四幕 生活副本", body: getLifeNode() },
        { at: 18, title: "第五幕 最终回响", body: getFinalNode() }
      ];
      els.timeline.innerHTML = milestones.map(item => {
        const opened = state.index >= item.at;
        return `
          <div class="milestone ${opened ? "is-open" : ""}">
            <b>${item.title} ${opened ? "已露出" : `${item.at}/${total}`}</b>
            <p>${opened ? item.body : "继续翻牌后解锁。"}</p>
          </div>
        `;
      }).join("");
    }

    async function retryCurrentStep() {
      if (state.isLoading) return;
      state.loadError = "";
      state.isLoading = true;
      clearBranchPrefetch();
      render();
      try {
        await loadAnnualCard(state.index + 1);
      } catch (error) {
        state.loadError = normalizeFetchError(error, "生成失败");
      } finally {
        state.isLoading = false;
        render();
        if (!state.loadError) {
          revealTopCard();
          scheduleBranchPrefetchForCurrentCard();
        }
      }
    }

    function choose(direction) {
      if (state.isAnimating || state.isLoading || state.loadError || state.index >= state.totalYears) return;
      const card = state.deck[state.index];
      if (!card) return;
      const chosen = card[direction];
      const currentEl = els.cardStack.querySelector(".life-card:not(.behind-one):not(.behind-two)");
      const prefetchedBranch = takeBranchPrefetch(direction, card);
      state.isAnimating = true;
      hapticTap(40);
      state.history = [...state.history, buildHistoryItem(card, direction)];
      applyFeedbackToNextCard(card, chosen);
      applyDelta(chosen.delta, 1);
      state.isLoading = true;
      if (currentEl) {
        currentEl.classList.add(direction === "left" ? "is-exiting-left" : "is-exiting-right");
      }
      // 后面的卡片在飞出动画期间平滑摆正，避免重渲染时跳变
      els.cardStack.querySelectorAll(".life-card").forEach(el => {
        if (el === currentEl) return;
        if (el.classList.contains("behind-one")) {
          el.classList.remove("behind-one");
        } else if (el.classList.contains("behind-two")) {
          el.classList.remove("behind-two");
          el.classList.add("behind-one");
        }
      });
      window.setTimeout(() => {
        state.index += 1;
        state.isAnimating = false;
        if (state.index >= state.totalYears) {
          state.isLoading = false;
          render();
          keepPlayViewport();
          showResult();
        } else {
          state.deck = state.deck.slice(0, state.index);
          render();
          keepPlayViewport();
          loadAnnualCardAfterChoice(state.index + 1, prefetchedBranch)
            .catch(error => {
              state.loadError = normalizeFetchError(error, "生成失败");
            })
            .finally(() => {
              state.isLoading = false;
              render();
              if (!state.loadError) {
                revealTopCard();
                scheduleBranchPrefetchForCurrentCard();
              }
            });
        }
      }, 320);
    }

    function revealTopCard() {
    }

    function undo() {
      if (state.isAnimating || state.isLoading || state.history.length === 0) return;
      const previous = state.history.pop();
      applyDelta(previous.delta, -1);
      state.index = previous.index;
      state.loadError = "";
      state.bufferPromise = null;
      clearBranchPrefetch();
      state.deck = state.deck.slice(0, state.index + 1);
      restoreFeedbackAfterUndo(previous);
      render();
      revealTopCard();
      keepPlayViewport();
      scheduleBranchPrefetchForCurrentCard();
    }

    function invalidateStaleFutureCards() {
      const keepUntilIndex = Math.min(state.totalYears - 1, state.index + keepFutureAfterChoice);
      state.deck = state.deck.slice(0, keepUntilIndex + 1);
    }

    function applyDelta(delta, factor) {
      Object.entries(delta).forEach(([key, value]) => {
        state.values[key] = clamp(state.values[key] + value * factor, 0, 100);
      });
    }

    function bindDrag(cardEl) {
      cardEl.addEventListener("pointerdown", event => {
        if (state.isAnimating) return;
        state.drag = {
          startX: event.clientX,
          startY: event.clientY,
          currentX: event.clientX,
          pointerId: event.pointerId,
          pointerType: event.pointerType,
          isDragging: event.pointerType !== "touch",
          isScrolling: false
        };
        cardEl.setPointerCapture(event.pointerId);
        if (state.drag.isDragging) cardEl.style.transition = "none";
      });

      cardEl.addEventListener("pointermove", event => {
        if (!state.drag || state.drag.pointerId !== event.pointerId) return;
        state.drag.currentX = event.clientX;
        const dx = event.clientX - state.drag.startX;
        const dy = event.clientY - state.drag.startY;
        const absX = Math.abs(dx);
        const absY = Math.abs(dy);
        if (state.drag.pointerType === "touch" && !state.drag.isDragging) {
          if (state.drag.isScrolling || (absY > absX && absY > 8)) {
            state.drag.isScrolling = true;
            return;
          }
          if (absX < 12 || absX < absY * 1.15) return;
          state.drag.isDragging = true;
          cardEl.style.transition = "none";
        }
        if (!state.drag.isDragging) return;
        event.preventDefault();
        const rotate = clamp(dx / 18, -12, 12);
        cardEl.style.transform = `translate(${dx}px, ${dy * 0.18}px) rotate(${rotate}deg)`;
        updateSwipePreview(cardEl, dx);
      });

      cardEl.addEventListener("pointerup", event => finishDrag(cardEl, event.pointerId));
      cardEl.addEventListener("pointercancel", event => finishDrag(cardEl, event.pointerId));
    }

    function bindCardChoices(cardEl) {
      ["left", "right"].forEach(direction => {

      if (!state.drag || state.drag.pointerId !== pointerId) return;
      const dx = state.drag.currentX - state.drag.startX;
      const wasDragging = state.drag.isDragging;
      state.drag = null;
      cardEl.style.transition = "";
      clearSwipePreview(cardEl);
      if (wasDragging && Math.abs(dx) > 95) {

    function trendPath(points, width, height, padding) {
      const xSpan = width - padding * 2;
      const ySpan = height - padding * 2;
      return points.map((point, index) => {
        const x = padding + (xSpan * index) / Math.max(1, points.length - 1);
        const y = height - padding - (ySpan * clamp(point.value, 0, 100)) / 100;
        return `${index === 0 ? "M" : "L"} ${x.toFixed(2)} ${y.toFixed(2)}`;

    function addHollandScore(scores, code, value) {
      if (!Object.prototype.hasOwnProperty.call(scores, code)) return;
      scores[code] += value;
    }

    function scoreHollandText(scores, text, weight = 1) {
      const source = String(text || "");
      const keywordMap = {
        R: ["动手", "工具", "原型", "做出来", "修", "现场", "设备", "硬件", "工程", "落地", "实践", "实操", "搭建", "测试", "上手", "制作", "焊", "施工", "亲自"],
        I: ["分析", "研究", "证据", "数据", "规律", "验证", "实验", "推理", "问题", "复盘", "算法", "模型", "调查", "原因", "求证", "论文", "结构", "拆解", "观察"],
        A: ["表达", "创意", "设计", "作品", "内容", "故事", "审美", "风格", "写", "展示", "策划", "视频", "画", "讲清楚", "创作", "灵感", "品牌", "拍摄"],
        S: ["帮助", "沟通", "陪伴", "同学", "用户", "学生", "家人", "团队", "服务", "倾听", "公益", "咨询", "关系", "理解", "照顾", "支持", "安抚", "协作", "接住"],
        E: ["争取", "组织", "推动", "说服", "带队", "资源", "机会", "汇报", "谈", "管理", "商业", "客户", "负责", "主动", "冲", "公开", "带人", "经营", "市场", "影响"],
        C: ["规则", "流程", "计划", "表", "清单", "稳定", "证书", "整理", "标准", "秩序", "备份", "节点", "按步骤", "风险", "边界", "确认", "保底", "谨慎", "止损", "守住"]
      };
      Object.entries(keywordMap).forEach(([code, words]) => {
        words.forEach(word => {
          if (source.includes(word)) addHollandScore(scores, code, weight);
        });
      });
    }

    function scoreHollandDelta(scores, delta = {}, scale = 1) {
      const map = {
        explore: { I: 1.2, A: 1 },
        discipline: { C: 1.2, I: 0.7 },
        empathy: { S: 1.5 },
        stability: { C: 1.2 },
        ambition: { E: 1.4 },
        pressure: { R: 0.7, C: 0.6 }
      };
      Object.entries(delta || {}).forEach(([traitKey, value]) => {
        const positive = Math.max(0, Number(value) || 0);
        if (!positive || !map[traitKey]) return;
        Object.entries(map[traitKey]).forEach(([code, factor]) => addHollandScore(scores, code, positive * factor * scale));
      });
    }

    function mergeHollandScores(target, extra) {
      Object.entries(extra || {}).forEach(([code, value]) => addHollandScore(target, code, Number(value) || 0));
    }

    function inferChoiceHolland(choice = {}, direction = "") {
      const scores = { R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 };
      const text = [choice.title, choice.desc, choice.tag, choice.label].filter(Boolean).join(" ");
      scoreHollandText(scores, text, 1.4);

      const weightedPatterns = [
        ["R", /动手|上手|搭建|实操|制作|现场|施工|亲自|硬扛|落地|修好|焊出来/],
        ["I", /研究|分析|求证|验证|观察|拆解|复盘|读论文|做模型|先想清楚/],
        ["A", /创意|表达|设计|作品|风格|写出来|讲出来|做内容|拍出来/],
        ["S", /沟通|帮助|陪伴|支持|安抚|照顾|协作|接住|带人|一起扛/],
        ["E", /争取|推动|冲上去|主动拿下|公开表达|带队|谈下来|拉资源|报名|拍板/],
        ["C", /稳住|保底|按计划|先确认|整理清楚|守住|边界|止损|按流程|谨慎/]
      ];
      weightedPatterns.forEach(([code, pattern]) => {
        if (pattern.test(text)) addHollandScore(scores, code, 2.8);
      });

      if (!Object.values(scores).some(value => value > 0)) {
        scoreHollandDelta(scores, choice.delta || {}, 0.18);
        if (direction === "left") addHollandScore(scores, "C", 0.6);
        if (direction === "right") addHollandScore(scores, "E", 0.6);
      }

      return scores;
    }

    function getHollandScoresFromHistory() {
      const scores = { R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 };
      const usePureRiasec = state.history.length > 0 && state.history.every(item => item.holland && Object.values(item.holland || {}).some(value => Number(value) > 0));
      state.history.forEach(item => {
        if (item.holland) {
          mergeHollandScores(scores, item.holland);
        } else if (!usePureRiasec) {
          scoreHollandText(scores, [item.choice, item.choiceText, item.tag].join(" "), 1.4);
          scoreHollandDelta(scores, item.delta, 0.18);
        }
      });
      const total = Object.values(scores).reduce((sum, value) => sum + value, 0);
      if (!total) Object.keys(scores).forEach(code => { scores[code] = 1; });
      return scores;
    }

    function getHollandRank(scores = getHollandScoresFromHistory()) {
      return Object.entries(scores).sort((a, b) => b[1] - a[1]);
    }

    function getHollandPercent(code, scores) {
      const total = Math.max(Object.values(scores).reduce((sum, value) => sum + value, 0), 1);
      return Math.round((scores[code] / total) * 100);
    }

    function getHollandVisualPercents(scores) {
      const order = ["R", "I", "A", "S", "E", "C"];
      const values = order.map(key => Math.max(0, Number(scores?.[key] || 0)));
      const min = Math.min(...values);
      const max = Math.max(...values);
      if (max <= 0 || max === min) {
        return Object.fromEntries(order.map((key, index) => [key, index === 0 ? 76 : 58]));
      }
      const ranked = order
        .map((key, index) => ({ key, value: values[index] }))
        .sort((a, b) => b.value - a.value);
      const rankBoost = new Map(ranked.map((item, index) => [item.key, [16, 10, 6, 2, -2, -5][index] || 0]));
      return Object.fromEntries(order.map((key, index) => {
        const normalized = (values[index] - min) / (max - min);
        const curved = Math.pow(normalized, 0.7);
        const visual = 42 + curved * 42 + (rankBoost.get(key) || 0);
        return [key, clamp(Math.round(visual), 36, 96)];
      }));
    }

    function getHollandDirections(code) {
      const seen = new Set();
      code.split("").forEach(key => {
        (hollandTypes[key]?.directions || []).forEach(item => seen.add(item));
      });
      return Array.from(seen).slice(0, 7).join("、");
    }

    function formatHollandTypeLabel(code) {
      const meta = hollandTypes[code];
      return meta ? `${code}${meta.label}` : code;
    }

    function joinNaturalChinese(items) {
      const list = items.filter(Boolean);
      if (!list.length) return "";
      if (list.length === 1) return list[0];
      if (list.length === 2) return `${list[0]}和${list[1]}`;
      return `${list.slice(0, -1).join("、")}和${list[list.length - 1]}`;
    }

    function buildHollandNarrative(code) {
      const summary = typeof code === "string" ? getHollandSummaryData() : code;
      const { rank, scores } = summary;
      const keys = rank.slice(0, 3).map(([key]) => key).filter(key => hollandTypes[key]);
      const labelText = joinNaturalChinese(keys.map(formatHollandTypeLabel));
      const tendencyMap = {
        R: "先上手，把问题落到真实场景里",
        I: "先分析清楚，再决定怎么做",
        A: "把表达、风格和作品感做出来",
        S: "先顾到人，再推动事情往前",
        E: "把局面推开，把资源组织起来",
        C: "先把流程理顺，再稳稳落地"
      };
      const [first, second] = rank;
      const firstPercent = getHollandPercent(first?.[0] || "I", scores);
      const secondPercent = getHollandPercent(second?.[0] || "A", scores);
      const firstLabel = formatHollandTypeLabel(first?.[0] || "I");
      const mixText = firstPercent - secondPercent >= 12
        ? `${firstLabel}更突出`
        : `${firstLabel}和${formatHollandTypeLabel(second?.[0] || "A")}都很明显`;
      const tendencyText = joinNaturalChinese(keys.map(key => tendencyMap[key]));
      return `${mixText}。你的兴趣更偏向${labelText}，做选择时往往会自然靠近“${tendencyText}”这类路子。它不是专业判决书，还要结合学科能力、分数段、家庭风险承受力和就业目标一起看。`;
    }

    function hollandHeadline(code) {
      const primary = code.split("").find(key => hollandTypes[key]) || "I";
      const meta = hollandTypes[primary] || hollandTypes.I;
      return `${primary}${meta.label}-${meta.nick}`;
    }

    function hollandIntroText() {
      return "RIASEC 将人格分为 6 种类型，每一种人格类型都有相对应的职业兴趣，大家总是根据自己的人格类型所赋予的职业兴趣去选择职业。";
    }

    function radarPoint(index, value, center, radius) {
      const angle = -Math.PI / 2 + (Math.PI * 2 * index) / 6;
      const currentRadius = radius * (clamp(value, 0, 100) / 100);
      return {
        x: center + Math.cos(angle) * currentRadius,
        y: center + Math.sin(angle) * currentRadius
      };
    }

    function polygonPath(points) {
      return points.map((point, index) => `${index === 0 ? "M" : "L"} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ") + " Z";
    }

    function buildHollandRadarSVG(scores) {
      const size = 248;
      const center = size / 2;
      const radius = 70;
      const order = ["R", "I", "A", "S", "E", "C"];
      const gridLevels = [0.28, 0.5, 0.72, 1];
      const visualPercents = getHollandVisualPercents(scores);
      const points = order.map((key, index) => radarPoint(index, visualPercents[key], center, radius));
      const axes = order.map((key, index) => {
        const outer = radarPoint(index, 100, center, radius);
        const label = radarPoint(index, 100, center, radius + 16);
        const word = radarPoint(index, 100, center, radius + 32);
        return { key, outer, label, word, color: hollandTypes[key]?.color || "#315c9a" };
      });
      return `
        <svg class="ability-radar" viewBox="0 0 ${size} ${size}" role="img" aria-label="RIASEC 雷达图">
          ${gridLevels.map(level => {
            const gridPoints = order.map((_, index) => radarPoint(index, level * 100, center, radius));
            return `<path d="${polygonPath(gridPoints)}" class="ability-radar-grid level-${Math.round(level * 100)}"></path>`;
          }).join("")}
          ${axes.map(axis => `
            <line x1="${center}" y1="${center}" x2="${axis.outer.x.toFixed(2)}" y2="${axis.outer.y.toFixed(2)}" class="ability-radar-axis"></line>
            <text x="${axis.label.x.toFixed(2)}" y="${axis.label.y.toFixed(2)}" class="ability-radar-label" fill="${axis.color}">${escapeHTML(axis.key)}</text>
            <text x="${axis.word.x.toFixed(2)}" y="${axis.word.y.toFixed(2)}" class="ability-radar-word" fill="${axis.color}">${escapeHTML(hollandTypes[axis.key]?.label || "")}</text>
          `).join("")}
          <path d="${polygonPath(points)}" class="ability-radar-shape"></path>
          ${points.map(point => `<path d="M ${point.x.toFixed(2)} ${(point.y - 4).toFixed(2)} L ${(point.x + 4.6).toFixed(2)} ${point.y.toFixed(2)} L ${point.x.toFixed(2)} ${(point.y + 4).toFixed(2)} L ${(point.x - 4.6).toFixed(2)} ${point.y.toFixed(2)} Z" class="ability-radar-dot"></path>`).join("")}
        </svg>
      `;
    }

    function getHollandSummaryData() {
      const scores = getHollandScoresFromHistory();
      const rank = getHollandRank(scores);
      const code = rank.slice(0, 3).map(([key]) => key).join("");
      const primary = rank[0]?.[0] || "I";
      const titleLine = code.split("").map(key => hollandTypes[key]?.word || "").filter(Boolean).join(" + ");
      const directions = getHollandDirections(code);
      const total = Math.max(Object.values(scores).reduce((sum, value) => sum + value, 0), 1);
      return {
        scores,
        rank,
        code,
        primary,
        primaryMeta: hollandTypes[primary] || hollandTypes.I,
        titleLine,
        directions,
        total
      };
    }

    function buildAbilityPortraitHTML() {
      const summary = getHollandSummaryData();
      const { scores, code, titleLine, directions, primaryMeta } = summary;
      return `
        <section class="ability-section" style="--ability-accent:${primaryMeta.color};--ability-tint:color-mix(in srgb, ${primaryMeta.color} 18%, #ffffff);">
          <div class="ability-top">
            <div class="ability-copy">
              <h4>${escapeHTML(hollandHeadline(code))}</h4>
              <p class="ability-summary">${escapeHTML(`${code}：${titleLine}`)}</p>
              <p class="ability-note">适合 ${escapeHTML(directions)} 等方向</p>
            </div>
            <img class="ability-art" src="${hollandTypeArtUrl(summary.primary)}" alt="" aria-hidden="true" />
          </div>
          <div class="ability-box" aria-label="RIASEC 百分比分布">
            <p class="ability-intro">${escapeHTML(hollandIntroText())}</p>
            <div class="ability-radar-wrap">
              ${buildHollandRadarSVG(scores)}
            </div>
            <div class="ability-score-list">
            ${(() => {
              const visualPercents = getHollandVisualPercents(scores);
              return Object.entries(hollandTypes).map(([key, trait]) => {
                const value = visualPercents[key];
                return `
                  <div class="ability-row" style="--ability-color:${trait.color}">
                    <label>${escapeHTML(key)} ${escapeHTML(trait.label)}</label>
                    <div class="ability-track">
                      <span style="width:${value}%"></span>
                    </div>
                    <span class="ability-score">${value}%</span>
                  </div>
                `;
              }).join("");
            })()}
            </div>
          </div>
          <p class="ability-trend-body">${escapeHTML(buildHollandNarrative(summary))}</p>
        </section>
      `;
    }

    const personaMeta = {
      ambition: { label: "进取机会型", note: "你一次次主动推进，总想靠近更大的舞台和资源。" },
      stability: { label: "稳健骨干型", note: "你偏好把确定的路走深，不轻易冒无谓的险。" },
      empathy: { label: "共情服务型", note: "你总从真实的人出发，在意选择对别人的意义。" },
      explore: { label: "探索跨界型", note: "你不断尝试新方向，把人生过成一条持续改写的路线。" },
      pressure: { label: "抗压现实型", note: "你习惯先扛住、先解决问题，在压力里长出韧性。" },
      balanced: { label: "复合普通型", note: "你在稳和闯之间反复校准，慢慢逼近更像自己的答案。" }
    };

    function resolvePersona() {
      const { explore, discipline, empathy, stability, ambition, pressure } = state.values;
      if (empathy > 70 && ambition > 64) return "empathy";
      if (ambition > 72 && explore > 66) return "ambition";
      if (stability > 72 && discipline > 62) return "stability";
      if (explore > 72) return "explore";
      if (pressure > 72) return "pressure";
      return "balanced";
    }

    function getIdentity() {
      const persona = resolvePersona();
      const major = majors[state.major] || majors[majorKeys[0]];
      const career = (major.careers && major.careers[persona]) || major.careers.balanced;
      const meta = personaMeta[persona];
      return {
        persona,
        personaLabel: meta.label,
        personaNote: meta.note,
        majorKey: state.major,
        majorLabel: major.label,
        majorSummary: major.summary,
        title: career.title,
        first: career.first,
        line: career.line
      };
    }

    async function showResult() {
      els.progressFill.style.width = "100%";
      // API 等待期间只预载 hero 形象与 RIASEC 公仔图，等结果文案一起亮相
      heroArtUrls().forEach(url => probeArt(url));
      probeArt(hollandTypeArtUrl(getHollandSummaryData().primary));
      showFlow("result");
      renderResultLoading();
      try {
        let data;
        try {
          data = await apiPost("/api/game/result", { profile: state.profile, history: state.history });
        } catch (firstError) {
          console.warn("result request failed, retrying once:", firstError?.message);
          await new Promise(resolve => window.setTimeout(resolve, 1500));
          data = await apiPost("/api/game/result", { profile: state.profile, history: state.history });
        }
        state.result = data.result;
        renderResult(data.result);
      } catch (error) {
        renderResultError(error.message || "最终结果生成失败");
      }
      renderTimeline();
    }

    function renderResultLoading() {
      const card = document.querySelector(".result-card");
      card?.classList.add("is-loading");
      card?.classList.remove("is-revealed");
      els.resultHero?.classList.remove("is-img-ready");
      const resultEyebrow = document.querySelector("#resultEyebrow");
      if (resultEyebrow) resultEyebrow.textContent = `${state.totalYears}张牌后的你`;
      els.resultTitle.innerHTML = `<span class="sk"></span><span class="sk"></span>`;
      els.resultSummary.innerHTML = `<span class="result-loader">结果生成中<span><i></i><i></i><i></i></span></span>`;
      els.resultTags.innerHTML = "";
      const skeletonSection = lines => `
        <div class="glass-section sk-card">
          ${Array.from({ length: lines }, (_, index) => `<span class="sk sk-line${index === lines - 1 ? " short" : ""}" style="animation-delay:${index * 0.12}s"></span>`).join("")}
        </div>
      `;
      els.resultOverview.innerHTML = skeletonSection(3);
      els.resultInsights.innerHTML = skeletonSection(5);
      els.resultHighlights.innerHTML = skeletonSection(3);
      els.resultGuides.innerHTML = "";
    }

    function renderResultError(message) {
      const card = document.querySelector(".result-card");
      card?.classList.remove("is-loading");
      card?.classList.add("is-revealed");
      applyHeroArt();
      const resultEyebrow = document.querySelector("#resultEyebrow");
      if (resultEyebrow) resultEyebrow.textContent = `${state.totalYears}张牌后的你`;
      els.resultTitle.textContent = "这一页没装订成功";
      els.resultSummary.textContent = "";
      els.resultTags.innerHTML = "";
      els.resultOverview.innerHTML = `
        <div class="glass-section result-error-card">
          <p>${escapeHTML(message || "最终结果生成失败，请重试。")}</p>
          <button class="cta-button" id="retryResult" type="button">重新生成结果</button>
        </div>
      `;
      els.resultInsights.innerHTML = "";
      els.resultHighlights.innerHTML = "";
      els.resultGuides.innerHTML = "";
      document.querySelector("#retryResult")?.addEventListener("click", () => showResult());
    }

    function renderResult(result) {
      const card = document.querySelector(".result-card");
      card?.classList.remove("is-loading");
      card?.classList.add("is-revealed");
      applyHeroArt();
      const resultEyebrow = document.querySelector("#resultEyebrow");
      if (resultEyebrow) resultEyebrow.textContent = `${state.totalYears} 张牌后的你`;
      const hollandSummary = getHollandSummaryData();
      const tags = [majorLabel(), `霍兰德 ${hollandSummary.code}`, hollandTypes[hollandSummary.primary]?.label || "研究型"];
      const scenes = (Array.isArray(result.famousScenes) ? result.famousScenes : [])
        .slice(0, 3)
        .map(normalizeSceneBlock);
      const timelineBlocks = (Array.isArray(result.timelineBlocks) ? result.timelineBlocks : [])
        .slice(0, 3)
        .map(normalizeTimelineBlock);
      const safeScenes = scenes.length >= 3 ? scenes : fallbackSceneBlocks();
      const safeTimelineBlocks = timelineBlocks.length >= 3 ? timelineBlocks : fallbackTimelineBlocks();
      const choiceHabit = normalizeGuideCard(
        result.choiceHabit,
        "你习惯先看清后果，再决定往哪边压",
        getChoicePattern()
      );
      const mentalPrep = normalizeGuideCard(
        result.mentalPrep,
        "高回报的路，也要提前准备情绪缓冲",
        getRiskNode()
      );
      const letter18 = normalizeGuideCard(
        result.letter18,
        "志愿只是起点，后面每次改写都算数",
        getFutureMessage()
      );
      els.resultTitle.innerHTML = resultTitleHTML(result.title, result);
      els.resultSummary.textContent = normalizeResultStatus(result.status42, safeScenes);
      els.resultOverview.innerHTML = `
        <div class="glass-section">
          ${careerProbabilityHTML(result.majorCareerNote, result.careerPossibilities)}

      els.resultInsights.innerHTML = buildAbilityPortraitHTML();
      els.resultHighlights.innerHTML = `
        <div class="glass-section">
          ${safeScenes.map(scene => `
            <div class="result-scene">
              <b>${escapeHTML(scene.title)}</b>
              <span>${escapeHTML(scene.body)}</span>
            </div>
          `).join("")}
        </div>
        <div class="glass-section">
          <h3>18 年未来编年史</h3>
          ${safeTimelineBlocks.map(item => `
            <article class="result-chronicle-item">
              <b>${escapeHTML(item.title)}</b>
              <p>${escapeHTML(item.body)}</p>
            </article>

        </div>
        <div class="glass-section">
          <h3>朋友看完大概会这样回</h3>
          ${(Array.isArray(result.shareHooks) ? result.shareHooks : []).map(body => `<div class="result-hook">${escapeHTML(body)}</div>`).join("")}
        </div>

        <div class="glass-section">

            <b>${escapeHTML(choiceHabit.title)}</b>
            <p>${escapeHTML(choiceHabit.body)}</p>
          </article>
          <article class="result-guide-card">
            <b>${escapeHTML(mentalPrep.title)}</b>
            <p>${escapeHTML(mentalPrep.body)}</p>
          </article>

            <b>${escapeHTML(letter18.title)}</b>
            <p>${escapeHTML(letter18.body)}</p>
          </article>
        </div>
      `;
      els.resultTags.innerHTML = tags.map(tag => `<span class="tag">${escapeHTML(tag)}</span>`).join("");
